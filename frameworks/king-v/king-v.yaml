  blocks_scenarios:
  - scn-kingv-pi-score-threshold
  notes: >-
    PI Score is calculated per Companies Act formula (staff, turnover, beneficial interests,
    third-party liabilities). Knowing current value and trajectory enables architecture-ahead-of-
    requirement planning.
  created: '2026-05-10'
  resolved_value: null
  resolved_at: null
- id: oq-kingv-internal-audit-arrangement
  question: How does PrivateBox staff internal audit — co-sourced, outsourced, or build in-house?
  candidate_answers:
  - Co-sourced with named accountable executive (proportionate)
  - Fully outsourced
  - Build in-house CAE function
  decision_owner: Board + Audit/Risk/Tech committee
  decision_status: pending
  blocks_requirements:
  - king-v-p-12
  - king-v-rp-129
  blocks_scenarios: []
  notes: >-
    Practice 131c permits co-sourced for a scaling firm. External quality review every 5 years
    (Practice 131f) applies regardless of arrangement.
  created: '2026-05-10'
  resolved_value: null
  resolved_at: null
- id: oq-kingv-founder-succession
  question: Is the founder-CEO succession plan documented and refreshed?
  candidate_answers:
  - Documented + refreshed annually
  - Drafted but not refreshed
  - Not yet documented
  decision_owner: Board + Chair (or Lead Independent)
  decision_status: pending
  blocks_requirements:
  - king-v-p-7
  blocks_scenarios:
  - scn-kingv-founder-transition
  notes: >-
    Practice 79 explicit. Investor diligence pre-Series B will demand evidence. Key-person risk
    materialises if not documented.
  created: '2026-05-10'
  resolved_value: null
  resolved_at: null

requirements:

# ─────────────────────────────────────────────────────────────────────────────
# Principles (P1–P13)
# ─────────────────────────────────────────────────────────────────────────────

- id: king-v-p-1
  kind: principle
  native_id: P1
  group: leadership
  group_name: Leadership
  title: Leadership
  requirement: >-
    The governing body leads ethically and effectively as the focal point of corporate governance in
    the organisation, embodying tone-from-the-top through integrity, competence, responsibility,
    accountability, fairness and transparency.
  auditor_intent: >-
    Adviser / procurement / investor reviewer checks that founder-led culture is balanced with
    collective board accountability and that the board operates under a written charter.
  pb_interpretation: >-
    Founder-led culture must be balanced with collective board accountability. Board operates under a
    written charter (Practice 4) reviewed annually. Each director cultivates the six characteristics
    (Practice 1) with declared interests at least annually and at every meeting (Practices 39-40).
    Performance evaluation at least every two years (Practices 6-9).
  owner: PB
  role_applicability:
    governing_body: 'Y'
    chairperson: 'Y'
  documented_evidence:
  - Board Charter v1.0+
  - Signed director letters of appointment
  - Conflicts / Declaration of Interest Register
  - Board evaluation report (biennial)
  operational_evidence: >-
    Directors can describe the charter and how it was last reviewed; evaluation actions tracked.
  audit_methods:
  - Insp
  - Int
  cadence: Annual charter review + biennial evaluation
  failure_modes: >-
    Founder/CEO acting as both Chair and CEO without Lead Independent designation; charter copied
    from a template and not lived.
  maturity_target: AR
  external_safe_claim: >-
    PrivateBox's governing body operates under a board charter and director conduct expectations
    aligned with King V Principle 1.
  business_models:
  - on-prem
  - ai-factory
  crosswalk:
  - framework: iso-27001
    refs:
    - iso-27001-cl-5.1
    note: ISMS leadership maps to King V leadership at organisational level.
  - framework: iso-27701
    refs:
    - iso-27701-cl-5.1
    note: PIMS leadership analogue.
  - framework: iso-42001
    refs:
    - iso-42001-cl-5.1
    note: AIMS leadership analogue.
  - framework: popia
    refs:
    - popia-cond-1
    note: POPIA accountability principle is the statutory underpinning King V Principle 1 instantiates.

- id: king-v-p-2
  kind: principle
  native_id: P2
  group: ethics
  group_name: Ethics
  title: Ethics
  requirement: >-
    The governing body governs the ethics of the organisation in a way that enables an ethical
    culture and responsible corporate citizenship.
  auditor_intent: >-
    Procurement / investor reviewer tests that ethics is governed (board-approved code, training
    cadence, whistleblower channel, sanctions log) rather than assumed.
  pb_interpretation: >-
    Critical because clients trust PrivateBox not to misuse data. Board approves ethics policy / code
    of conduct (Practice 12), AI ethics statement (linked to Principle 10 AI values), anti-corruption
    / anti-fraud / anti-money-laundering programmes (Practice 12c), protected whistleblowing channel
    (Practice 13d). Ethics built into hiring, performance, supplier onboarding.
  owner: PB
  role_applicability:
    governing_body: 'Y'
    social_ethics_rem_committee: 'Y'
  documented_evidence:
  - Code of Ethics (board-approved)
  - AI Ethics Statement
  - Anti-Corruption Policy
  - Whistleblowing Policy + independent reporting channel
  - Training records
  - Whistleblower stats (anonymised) to S&E committee
  operational_evidence: >-
    Trace a reported ethics matter from intake to closure; periodic assurance on ethics effectiveness
    (Practice 14).
  audit_methods:
  - Insp
  - Int
  - Samp
  cadence: Annual review + continuous channel operation
  failure_modes: >-
    Ethics conflated with compliance; whistleblower channel that routes to the implicated party;
    "ethics" treated as a poster on the wall.
  maturity_target: AR
  external_safe_claim: >-
    PrivateBox's ethics framework, anti-corruption controls and protected whistleblowing process are
    governed by the board in accordance with King V Principle 2.
  business_models:
  - on-prem
  - ai-factory
  crosswalk:
  - framework: iso-27001
    refs:
    - iso-27001-a-5.4
    note: Management responsibilities; ethics overlay.
  - framework: iso-42001
    refs:
    - iso-42001-cl-5.2
    note: AI Policy operationalises the AI-specific portion of King V ethics.
  - framework: popia
    refs:
    - popia-cond-1
    note: POPIA accountability principle reaches ethics governance.

- id: king-v-p-3
  kind: principle
  native_id: P3
  group: strategy
  group_name: Strategy, performance and sustainable value creation
  title: Strategy, performance and sustainable value creation
  requirement: >-
    The governing body ensures that the organisation's purpose, strategy and business model support
    performance that creates sustainable value within the organisation's economic, social and
    environmental context.
  auditor_intent: >-
    Reviewer expects board-approved strategy with SMART KPIs, integrated-thinking framing across the
    six capitals, and explicit negative-impact mitigation.
  pb_interpretation: >-
    Articulate purpose, business model, strategy and KPIs. Tie product roadmap to sustainable client
    outcomes — data sovereignty, on-prem assurance, lower regulatory risk for clients. Apply
    integrated thinking to financial, intellectual, human, social/relationship, natural (energy
    footprint), manufactured capitals.
  owner: PB
  role_applicability:
    governing_body: 'Y'
    ceo_management: 'Y'
  documented_evidence:
  - Board-approved strategy
  - Operational plan with KPIs
  - Integrated narrative / capital-impact summary
  - Double-materiality assessment summary
  - CFO going-concern / solvency / liquidity reporting
  operational_evidence: >-
    Board minute approving strategy and budget; quarterly KPI review; founder/CEO performance review
    against strategic targets.
  audit_methods:
  - Insp
  - Int
  cadence: Annual strategy approval + quarterly review
  failure_modes: >-
    Performance reduced to ARR; no link to systems value; strategy not refreshed; sustainability
    ignored on assumption that "we're a small tech company".
  maturity_target: AR
  external_safe_claim: >-
    PrivateBox's strategy is approved and overseen by the governing body using integrated thinking
    aligned with King V Principle 3.
  business_models:
  - on-prem
  - ai-factory
  crosswalk:
  - framework: iso-27001
    refs:
    - iso-27001-cl-6.2
    note: ISMS objectives integrated with strategy.
  - framework: iso-42001
    refs:
    - iso-42001-cl-6.2
    note: AIMS objectives integrated with strategy.

- id: king-v-p-4
  kind: principle
  native_id: P4
  group: reporting
  group_name: Reporting
  title: Reporting
  requirement: >-
    The governing body ensures that external reports enable stakeholders to make informed assessments
    of how the organisation creates, preserves and erodes value, applying double-materiality concepts
    and integrity controls over reports.
  auditor_intent: >-
    Procurement / investor reviewer expects King V Disclosure Framework published on website with a
    concluding statement on the four outcomes; integrated narrative across strategy / risk / AI /
    security / privacy.
  pb_interpretation: >-
    Even as a private company, the trust pack, security disclosures, AI factsheets and governance
    section function as external reports. Board approves the suite (Practice 25b). Annual integrated
    report or proportionate equivalent. King V Disclosure Framework published on the website
    (Practice 27c). Double-materiality applied (Practice 26).
  owner: PB
  role_applicability:
    governing_body: 'Y'
    audit_risk_tech_committee: 'Y'
  documented_evidence:
  - King V Governance Disclosure (annual; website-published)
  - Integrated Trust & Governance Pack
  - AI factsheets / System Cards summary
  - Cybersecurity disclosure
  - Governance section on website
  - Board approval minutes for each external report
  operational_evidence: >-
    Each external report has a board approval minute and accessible publication record; concluding
    statement on outcomes signed off.
  audit_methods:
  - Insp
  - Int
  cadence: Annual + on material change
  failure_modes: >-
    Marketing copy mistaken for governance disclosure; King V Disclosure Framework absent (mandatory
    failure); concluding statement copied without evidence trail.
  maturity_target: AR
  external_safe_claim: >-
    PrivateBox publishes a governance disclosure structured in accordance with the King V Disclosure
    Framework.
  business_models:
  - on-prem
  - ai-factory
  crosswalk:
  - framework: iso-27001
    refs:
    - iso-27001-a-5.34
    note: Privacy / external disclosure overlap.
  - framework: iso-27701
    refs:
    - iso-27701-a1-3
    note: PIMS controllers transparency / notice obligation overlap.
  - framework: popia
    refs:
    - popia-cond-6
    note: POPIA s 17-18 openness condition; external disclosure obligations.

- id: king-v-p-5
  kind: principle
  native_id: P5
  group: composition
  group_name: Composition of the governing body
  title: Composition of the governing body
  requirement: >-
    The governing body ensures that its composition is balanced with respect to the mix of
    competencies, diversity and independence appropriate to the organisation's purpose and context.
  auditor_intent: >-
    Reviewer expects majority NED, most independent, diverse, with independence holistically assessed
    against Practice 42 nine factors.
  pb_interpretation: >-
    Founder-led — must consciously over-correct for independence. Target at least one independent NED
    at minimum, scaling to majority pre-IPO. CEO + at least one other executive on the board
    (Practice 30). Diversity across competencies, age, culture, race, gender (Practice 31). Staggered
    rotation (Practice 32). Succession plan (Practice 33). Skills matrix. Independence assessed
    against the nine Practice 42 factors. Background checks and verified qualifications for nominees
    (Practice 37c).
  owner: PB
  role_applicability:
    governing_body: 'Y'
    nominations_committee: 'Y'
  documented_evidence:
  - Skills matrix
  - Director CVs
  - Appointment letters
  - Conflicts register
  - Nominations committee TOR
  - Succession plan
  - Per-NED independence assessment memo (against Practice 42 nine factors)
  operational_evidence: >-
    Independence rationale documented for any director near the line; nine-year tenure reviewed
    annually.
  audit_methods:
  - Insp
  - Int
  cadence: Annual + on appointment
  failure_modes: >-
    Founder-controlled board with no independents; cosmetic NED who is in fact a customer/supplier;
    "independence by assertion".
  maturity_target: AR
  triggered_by_scenarios:
  - scn-kingv-pre-pi-score
  - scn-kingv-first-independent-ned
  - scn-kingv-series-b-investment
  external_safe_claim: >-
    PrivateBox's board composition is structured to deliver the balance of competencies, diversity
    and independence contemplated by King V Principle 5, applied proportionately to a scaling private
    technology company.
  business_models:
  - on-prem
  - ai-factory
  crosswalk:
  - framework: iso-27001
    refs:
    - iso-27001-cl-5.3
    note: Roles, responsibilities and authorities under ISMS map to board composition discipline.
  - framework: iso-27701
    refs:
    - iso-27701-cl-5.3
    note: PIMS roles analogue.
  - framework: iso-42001
    refs:
    - iso-42001-cl-5.3
    note: AIMS roles analogue.
  - framework: popia
    refs:
    - popia-s-information-officer
    note: Information Officer designation under POPIA overlaps with King V board composition discipline.

- id: king-v-p-6
  kind: principle
  native_id: P6
  group: committees
  group_name: Committees of the governing body
  title: Committees of the governing body
  requirement: >-
    Arrangements for delegation to committees and individuals promote the objective and effective
    discharge of the governing body's obligations.
  auditor_intent: >-
    Reviewer expects committees with written TORs, at least 3 members, balanced; combined committee
    architecture proportionate at smaller scale; statutory S&E committee triggered by PI Score.
  pb_interpretation: >-
    Proportionate model — combined Audit/Risk/Technology Committee (one TOR, 3 members, majority
    NED, at least one independent NED, chaired by independent NED who is not Chair of board);
    combined Social/Ethics/Remuneration Committee (incorporates corporate citizenship and
    remuneration governance); optional AI Oversight Sub-committee or working group reporting in. PI
    Score crossing triggers mandatory statutory S&E committee under Companies Act s 72(4) and
    Regulation 43.
  owner: PB
  role_applicability:
    governing_body: 'Y'
    audit_risk_tech_committee: 'Y'
    social_ethics_rem_committee: 'Y'
  documented_evidence:
  - Combined Audit/Risk/Technology Committee TOR
  - Combined Social/Ethics/Remuneration Committee TOR
  - Quarterly minutes
  - Chair reports to board
  - PI Score tracking (CFO)
  operational_evidence: >-
    Each committee has documented terms of reference, named members, attendance records, and chair
    reports to board.
  audit_methods:
  - Insp
  - Int
  cadence: Annual TOR review + quarterly minutes
  failure_modes: >-
    Chair of board chairing the audit committee (Practice 49a prohibits); CEO sitting on
    audit/remuneration/nominations as a member (Practice 78 prohibits, may attend by invitation).
  maturity_target: AR
  triggered_by_scenarios:
  - scn-kingv-pre-pi-score
  - scn-kingv-pi-score-threshold
  external_safe_claim: >-
    PrivateBox operates a proportionate committee architecture aligned to King V Principle 6,
    including a combined audit, risk and technology committee and a social, ethics and remuneration
    committee.
  business_models:
  - on-prem
  - ai-factory
  crosswalk:
  - framework: iso-27001
    refs:
    - iso-27001-cl-9.3.1
    - iso-27001-cl-9.3.2
    - iso-27001-cl-9.3.3
    note: ISMS management-review committees overlap with King V committee discipline.
  - framework: iso-27701
    refs:
    - iso-27701-cl-9.3
    note: PIMS management review analogue.
  - framework: iso-42001
    refs:
    - iso-42001-cl-9.3
    note: AIMS management review analogue.

- id: king-v-p-7
  kind: principle
  native_id: P7
  group: delegation
  group_name: Appointment and delegation to management
  title: Appointment and delegation to management
  requirement: >-
    Arrangements for appointment of and delegation to management promote operational effectiveness
    and ensure that the respective roles and decision-making powers of the governing body and
    management are clearly defined.
  auditor_intent: >-
    Reviewer expects CEO formally appointed, not on audit/remuneration/nominations (Practice 78),
    board-approved Delegation of Authority framework, CEO succession plan, access to professional
    corporate-governance services.
  pb_interpretation: >-
    Founder/CEO must not also chair (Practice 48); 3-year cooling-off applies before retired CEO can
    chair. CEO formally appointed (Practice 76). Board-approved Delegation of Authority framework
    (Practice 82). CEO succession plan (Practice 79). Cosec or equivalent provides independent
    corporate-governance services (Practices 84-90).
  owner: PB
  role_applicability:
    governing_body: 'Y'
    ceo_management: 'Y'
    company_secretary: 'Y'
  documented_evidence:
  - CEO appointment letter and mandate
  - Delegation of Authority Framework
  - CEO succession plan
  - Cosec engagement / mandate
  operational_evidence: >-
    DoA framework demonstrably operates — recent material decisions trace through documented authority.
  audit_methods:
  - Insp
  - Int
  cadence: Annual + on org change
  failure_modes: >-
    Founder retains undocumented decision-making power; no cosec equivalent; CEO succession plan
    absent.
  maturity_target: AR
  triggered_by_scenarios:
  - scn-kingv-founder-transition
  external_safe_claim: >-
    PrivateBox operates a board-approved delegation-of-authority framework and CEO succession
    discipline aligned with King V Principle 7.
  business_models:
  - on-prem
  - ai-factory
  crosswalk:
  - framework: iso-27001
    refs:
    - iso-27001-cl-5.3
    note: Roles and authorities under ISMS overlap with King V management delegation.
  - framework: iso-42001
    refs:
    - iso-42001-cl-5.3
    note: AIMS roles analogue.

- id: king-v-p-8
  kind: principle
  native_id: P8
  group: risk
  group_name: Risk
  title: Risk
  requirement: >-
    The governing body governs risk in a way that enables the organisation to sustain and optimise
    its strategy and objectives — opportunity-aware, integrated, iterative, resilient.
  auditor_intent: >-
    Reviewer expects approved risk policy, documented risk appetite and tolerance, integrated risk
    register, BCM with testing, iterative change-responsive process, periodic assurance.
  pb_interpretation: >-
    Cyber, AI model, supplier, business-continuity, key-person, regulatory, and reputational risks
    are the dominant cluster. Model drift, prompt-injection, supply-chain compromise of foundation
    models / model weights / containers, telemetry channel abuse, on-prem update channel integrity,
    key-person dependency on founder.
  owner: PB
  role_applicability:
    governing_body: 'Y'
    audit_risk_tech_committee: 'Y'
  documented_evidence:
  - Risk Management Policy
  - Risk Appetite Statement
  - Enterprise Risk Register (cyber, AI, supplier, key-person, BCM, regulatory, commercial sub-registers)
  - BCM/DR plan
  - Last BCM test report
  operational_evidence: >-
    Risk register reviewed quarterly; appetite breaches escalated; BCM exercised annually.
  audit_methods:
  - Insp
  - Int
  - Samp
  cadence: Quarterly register review + annual appetite review + annual BCM exercise
  failure_modes: >-
    Separate cyber/AI/privacy registers with no integration; treating ISO 27001 as a substitute for
    board-level risk governance; static appetite that never changes.
  maturity_target: AR
  triggered_by_scenarios:
  - scn-kingv-material-ai-incident
  external_safe_claim: >-
    Risk governance at PrivateBox is structured to deliver the outcomes contemplated by King V
    Principle 8, with explicit treatment of cyber, AI model, supplier, and business-continuity risks.
  business_models:
  - on-prem
  - ai-factory
  crosswalk:
  - framework: iso-27001
    refs:
    - iso-27001-cl-6.1.1
    - iso-27001-cl-6.1.2
    - iso-27001-cl-6.1.3
    note: ISMS risk framework feeds King V P8 enterprise risk view.
  - framework: iso-27701
    refs:
    - iso-27701-cl-6.1
    note: PIMS risk analogue.
  - framework: iso-42001
    refs:
    - iso-42001-cl-6.1.2
    note: AIMS risk methodology feeds King V P8 enterprise risk view.
  - framework: popia
    refs:
    - popia-cond-7
    note: POPIA security safeguards (s 19) are a sub-register of enterprise risk under King V P8.
  - framework: eu-ai-act
    refs:
    - eu-ai-act-art-9
    note: EU AI Act risk-management for high-risk AI feeds King V P8 enterprise risk.

- id: king-v-p-9
  kind: principle
  native_id: P9
  group: compliance
  group_name: Compliance
  title: Compliance
  requirement: >-
    The governing body governs compliance with applicable laws and adopted policies, non-binding
    rules, codes and standards in a way that promotes ethics and responsible corporate citizenship.
  auditor_intent: >-
    Reviewer expects board-approved compliance framework, obligations register naming binding and
    adopted standards, regulatory horizon scanning.
  pb_interpretation: >-
    Obligations register covers POPIA, Cybercrimes Act, ECTA, Companies Act, EU AI Act extra-
    territorial reach, sector pass-through obligations. Adopted non-binding standards explicitly
    listed (ISO 27001, ISO 27701, ISO 42001, NIST AI RMF, NIST SSDF, EU AI Act voluntary GPAI code,
    King V itself). Regulatory horizon scanning (Practice 98d). Periodic assurance on compliance
    function (Practice 99).
  owner: PB
  role_applicability:
    governing_body: 'Y'
    audit_risk_tech_committee: 'Y'
  documented_evidence:
  - Compliance Framework
  - Obligations Register
  - Adopted-standards register
  - Regulatory horizon-scanning log
  operational_evidence: >-
    Regulatory changes trace from horizon scan to register update to control adjustment.
  audit_methods:
  - Insp
  - Int
  cadence: Annual + per regulatory change
  failure_modes: >-
    Confusing King V (voluntary) with binding obligations; obligations register stale; no horizon
    scanning.
  maturity_target: AR
  triggered_by_scenarios:
  - scn-kingv-first-eu-customer
  external_safe_claim: >-
    PrivateBox's compliance framework is governed at board level and addresses both binding
    obligations and adopted non-binding standards in alignment with King V Principle 9.
  business_models:
  - on-prem
  - ai-factory
  crosswalk:
  - framework: iso-27001
    refs:
    - iso-27001-a-5.31
    - iso-27001-a-5.34
    note: Legal / regulatory / contractual compliance under ISMS; privacy and PII.
  - framework: popia
    refs:
    - popia-cond-1
    note: POPIA accountability principle underpins compliance governance.

- id: king-v-p-10
  kind: principle
  native_id: P10
  group: technology
  group_name: Data, information and technology (incl. AI)
  title: Data, information and technology
  requirement: >-
    The governing body governs data, information and technology in a way that enables the
    organisation to sustain and optimise its strategy and objectives — including emerging-technology
    risk and AI governance under Practice 109c covering ethics, human centricity, accountability,
    transparency, explainability, security, privacy, fairness, trustworthiness, and human oversight
    commensurate with risk.
  auditor_intent: >-
    Reviewer expects board-approved data and technology policies, AI governance under Practice 109c,
    cyber dashboard, privacy programme, third-party assurance. This is the King V flagship update
    versus King IV — the AI governance limb is the highest-leverage clause.
  pb_interpretation: >-
    Highest-leverage principle for PrivateBox. Data and Information branch (Practices 100-104):
    lifecycle controls, classification, CIA, privacy, third-party / cross-border risk, periodic
    assurance. Technology branch (Practices 105-110): legal compliance, resilience, benefit
    realisation, responsible disposal, effective cybersecurity, outsourced/third-party tech
    assurance. Emerging tech / AI checklist (109c): AI ethics, human centricity, accountability,
    transparency, explainability, security, privacy, fairness, trustworthiness; clear accountability
    for AI decisions/actions/outputs/outcomes; human oversight and override mechanisms commensurate
    with risk. On-prem architecture earns its keep here — policy explicitly states telemetry / update
    / support / connector channels, what data they touch, what consent and control client has, and
    how human override works for AI outputs.
  owner: PB
  role_applicability:
    governing_body: 'Y'
    audit_risk_tech_committee: 'Y'
    ai_oversight_working_group: 'Y'
  documented_evidence:
  - Technology and Information Governance Policy
  - Data classification scheme + lifecycle policy
  - Cybersecurity Policy + ISMS SoA (ISO 27001)
  - Privacy Governance Policy + POPIA Programme + IO designation
  - AI Governance Policy + AI Ethics Statement
  - AI System Cards per production model
  - Human Oversight SOP
  - Model evaluation / red-team records
  - AI Oversight Working Group charter + minutes
  - Sub-processor register with assurance evidence
  operational_evidence: >-
    Board pack includes cyber dashboard, AI risk dashboard, privacy dashboard; AI System Cards trace
    to production deployments; human-override mechanisms tested.
  audit_methods:
  - Insp
  - Int
  - Samp
  - Obs
  cadence: Annual policy review + per release / per AI change
  failure_modes: >-
    AI deployed before policy in place; "human in the loop" as decoration; telemetry treated as
    "metadata not personal" without analysis; CISO reporting only annually; cyber treated as IT;
    foundation-model provider treated as untouchable.
  maturity_target: AR
  triggered_by_scenarios:
  - scn-kingv-material-ai-incident
  - scn-kingv-first-eu-customer
  external_safe_claim: >-
    PrivateBox governs data, information, technology and AI through board-approved policies designed
    to deliver the human-oversight, accountability, transparency, explainability, security, privacy,
    fairness and trustworthiness expectations of King V Principle 10.
  business_models:
  - on-prem
  - ai-factory
  crosswalk:
  - framework: iso-27001
    refs:
    - iso-27001-a-5.9
    - iso-27001-a-5.12
    - iso-27001-a-5.34
    note: ISMS asset inventory + data classification + privacy overlay.
  - framework: iso-27701
    refs:
    - iso-27701-a1-12
    note: PIMS PIA / records underpin King V P10 data branch.
  - framework: iso-42001
    refs:
    - iso-42001-cl-6.1.4
    - iso-42001-a-6.2.3
    - iso-42001-a-6.1.4
    note: AIMS AISIA + human oversight + bias methodology operationalise Practice 109c.
  - framework: popia
    refs:
    - popia-cond-2
