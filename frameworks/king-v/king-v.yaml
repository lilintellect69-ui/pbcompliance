  requirement: >-
    The governing body adopts a stakeholder-inclusive approach in the execution of its duties in the
    long-term best interests of the organisation within its economic, social and environmental
    context, upholding Ubuntu-Botho.
  auditor_intent: >-
    Reviewer expects stakeholder map, engagement framework, dispute-resolution mechanism, periodic
