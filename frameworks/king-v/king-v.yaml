- id: king-v-p-11
  kind: principle
  native_id: P11
  group: remuneration
  group_name: Remuneration
  title: Remuneration
  requirement: >-
    The organisation remunerates fairly, responsibly and transparently to promote sustainable value
    creation. King V is less prescriptive than King IV, deferring to s 30(4) Companies Act and
    Companies Amendment Act 16 of 2024 (not yet in force at time of authoring).
  auditor_intent: >-
    Reviewer expects board-approved remuneration policy, fair-and-responsible test between executive
    and overall employee remuneration, malus/clawback for variable pay.
  pb_interpretation: >-
    Board-approved remuneration policy (Practice 113). Fair-and-responsible test between executive
    and overall employee remuneration (Practice 114b). Malus/clawback for variable pay (Practice
    114e). NED fee policy submitted to shareholders if applicable (Practice 115). Shareholder
    engagement on remuneration (Practice 116). For entities required to have a S&E committee, non-
    binding advisory votes on policy (every 3 years or material change) and on implementation report
    (annual) (Practice 118).
  owner: PB
  role_applicability:
    governing_body: 'Y'
    social_ethics_rem_committee: 'Y'
  documented_evidence:
  - Remuneration Policy
  - Implementation report
  - Fair-and-responsible analysis
  - Malus / clawback clauses for variable pay
  - Non-binding advisory vote records (when applicable)
  operational_evidence: >-
    Remuneration decisions trace through documented policy; fair-and-responsible test recalculated
    annually.
  audit_methods:
  - Insp
  - Int
  cadence: Annual + on material change
  failure_modes: >-
    Founder-set salaries with no committee discipline; absence of malus/clawback for AI-misuse-linked
    variable pay; no fair-and-responsible analysis.
  maturity_target: AR
  external_safe_claim: >-
    PrivateBox operates a fair, responsible and transparent remuneration framework aligned to King V
    Principle 11.
  business_models:
  - on-prem
  - ai-factory
