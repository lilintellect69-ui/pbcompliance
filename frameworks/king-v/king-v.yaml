- id: king-v-p-12
  kind: principle
  native_id: P12
  group: assurance
  group_name: Assurance
  title: Assurance
  requirement: >-
    Assurance functions and services promote an effective internal control environment and safeguard
    the integrity of external reports through combined assurance across line management, specialist
    functions, internal audit, external audit, specialist providers and regulators.
  auditor_intent: >-
    Reviewer expects combined assurance map covering all significant risks × assurance providers ×
    cadence; internal audit charter (co-sourced acceptable for proportionate scale); external IA
    quality review every 5 years.
  pb_interpretation: >-
    Combined assurance map covers ISO 27001/27701 surveillance, NIST AI RMF self-assessment, SOC 2
    Type II (if pursued), penetration testing, internal financial controls review, statutory audit
    (when triggered), product-level red-team / model-evaluation reports. For each external report
    state level of assurance and criteria (Practice 126). Internal audit charter and risk-based plan
    (Practices 129-130) — may be co-sourced (Practice 131c). External independent review of internal
    audit at least once every 5 years (Practice 131f).
  owner: PB
  role_applicability:
    governing_body: 'Y'
    audit_risk_tech_committee: 'Y'
    combined_assurance_providers: 'Y'
  documented_evidence:
  - Combined Assurance Map
  - Internal Audit Charter (co-sourced acceptable)
  - Risk-based internal audit plan
  - Pen-test reports
  - Model red-team reports
  - External IA quality review (Practice 131f)
  operational_evidence: >-
    Assurance providers operate per cadence; remediation tracked through closure; map refreshed
    annually.
  audit_methods:
  - Insp
  - Int
  cadence: Annual map review + per assurance cycle
  failure_modes: >-
