    with compensating measures, and the concluding statement on the four outcomes.
- id: companies-act-71-2008
  name: Companies Act 71 of 2008 (South Africa) and Companies Amendment Act 16 of 2024
  version: '2008 (as amended)'
  role: >-
    Statutory underpinning. Sections 7, 30, 66, 72, 75–76 and Regulation 43 set out fiduciary duties,
    statutory audit triggers (PI Score), and the social and ethics committee. Amendment Act 16 of
    2024 introduces new remuneration provisions (not yet in force at time of authoring).

pb_application:
  why_chosen: >-
    King V is the natural board-level overlay above PrivateBox's parallel work on ISO 27001, ISO 27701,
    POPIA, ISO 42001, NIST AI RMF, NIST SSDF, and the EU AI Act. PB is a South African private (Pty)
    Ltd, founder-led, scaling, not JSE-listed, but sells into JSE-listed and regulated enterprise
    clients (banks, insurers, law firms, healthcare, professional services). Those clients' procurement
    diligence expects evidence of governance maturity calibrated to the SA corporate-governance code
    of record. King V (binding for FYs commencing on or after 2026-01-01) supersedes King IV in its
    entirety and adds an explicit AI-governance flagship in Principle 10 Practice 109c covering
    ethics, human centricity, accountability, transparency, explainability, security, privacy,
    fairness, trustworthiness and human oversight. Commercially, King V lets PB consolidate cyber,
    privacy, AI, supplier and customer-trust governance under one board-evidenced narrative — one set
    of artefacts, one disclosure document, multiple framework labels. Apply-and-explain is the
    reporting model; certification is not a thing in King V.
  scope_decisions:
    on_prem:
      coverage: full
      rationale: >-
        King V applies to PrivateBox as a South African organisation regardless of deployment model.
        Proportionality means recommended practices are scaled to PB's stage and complexity; the
        thirteen principles themselves apply universally. Compensating measures are documented where
        full enterprise practices are not adopted (e.g., combined committees, co-sourced internal
        audit, cosec-as-a-service).
    ai_factory:
      coverage: partial
      rationale: >-
        AI Factory ringfenced multi-tenant deployment in a partner DC introduces additional board-level
        oversight questions: partner-DC supplier relationship governance (P10 108f third-party
        assurance), elevated AI risk profile (P8 + P10 109c), and cross-jurisdictional regulator
        exposure (P9). Until partner DC is selected (oq-partner-dc-selection), some King V P6
        committee work plans, P8 risk treatments, and P10 supplier assurance arrangements are
        provisional.
  top_risks:
  - >-
    Founder/CEO dual-hatting as Chair without a Lead Independent NED designated (Practice 48
    prohibits the former; Practice 47 requires the compensating measure). Visible governance gap in
    procurement diligence.
  - >-
    Independence-by-assertion — NED labelled "independent" without holistic assessment against the
    nine factors of Practice 42 (significant funder, securities-significance, former-executive within
    3 yrs, former-audit-team within 3 yrs, significant supplier/customer, related-party, >9 yrs
    tenure, performance-contingent remuneration). Webber Wentzel and ENSafrica both flag this as a
    common King IV-to-King V transition gap.
  - >-
    King V Disclosure Framework absent from website. Mandatory for any organisation claiming
    application of King V. Failure to publish weakens every external claim about King V alignment.
  - >-
    AI governance under Practice 109c not operationalised through System Cards, eval/red-team
    records, and human-override SOPs. "Human in the loop" as decoration is a known failure pattern.
  - >-
    Combined committees lack at least one independent NED member. King V requires independent NED
    on audit, risk and social-and-ethics committees; failure is a Practice 66 / Practice 75 gap.
  - >-
    Whistleblower channel routed to the implicated party rather than an independent provider
    (Practice 13d failure pattern).
  - >-
    Conflating ISO 27001 certification or SOC 2 attestation with "King V compliance" in marketing.
    These are complementary but not substitutable; equating them is a red-flag claim per source §16.
  - >-
    PI Score crossing Companies Act thresholds without architecture pre-built — statutory S&E
    committee and statutory audit suddenly required without preparation.
  - >-
    Going-concern, solvency, liquidity reporting absent from CFO board pack — Practice 22 obligation.

disclosure_framework:
  reporting_model: apply and explain
  primary_artefact: >-
    King V Governance Disclosure (annual; board-approved; published on PrivateBox website).
    Accompanies an integrated Trust & Governance Pack covering ISO 27001/27701, POPIA, ISO 42001,
    NIST AI RMF and EU AI Act posture for procurement diligence.
  proportionality_rules: >-
    Principles apply universally; recommended practices are scaled to PrivateBox's size, business-
    model complexity, ownership structure and economic/social/environmental impact. Compensating
    measures are documented where full enterprise practices are not adopted (e.g., combined
    Audit/Risk/Technology Committee; combined Social, Ethics and Remuneration Committee; co-sourced
    internal audit; cosec-as-a-service; AI Oversight Working Group at management level instead of a
    dedicated board AI committee). Proportionality is not licence to dilute the principles
    themselves.
  concluding_statement_required: true
  required_outcomes:
  - Ethical Culture
  - Performance and Value Creation
  - Conformance and Prudent Control
  - Legitimacy
  jse_listing_overlap: >-
    PrivateBox is not JSE-listed. Its customers (banks, insurers, listed enterprises) are subject to
    JSE Listings Requirements which incorporate King-style governance expectations. PB's King V
    alignment is therefore a downstream procurement / supplier-diligence signal rather than a direct
    listing obligation.

shared_responsibility_model:
- area: Governance leadership and oversight
  pb_owned: All King V principles, practices and disclosure obligations belong to PrivateBox as the organisation.
  cl_owned: Customer governs its own organisation under whatever governance code applies to them.
  shared_note: King V is PB-organisation-bound; customer governance is its own domain.
- area: AI governance (Practice 109c)
  pb_owned: PB Board-approved AI Governance Policy; AI System Cards; Human Oversight SOP for PB-built features.
  cl_owned: Customer's deployment-side AI governance for their use cases.
  shared_note: Practice 109c values (ethics, human centricity, accountability, transparency, explainability, security, privacy, fairness, trustworthiness) propagate to both governance domains.
- area: Supplier / sub-processor governance (Practice 108f)
  pb_owned: PB-side supplier programme covering model providers, sub-processors, hosting partners.
  cl_owned: Customer-side supplier programme covering PrivateBox as their vendor.
  shared_note: Visible bidirectional supplier diligence — PB carries DD on its suppliers; customers carry DD on PB.
- area: Trust pack and disclosure
  pb_owned: PB's King V Governance Disclosure (annual website publication); Trust & Governance Pack (NDA-gated).
  cl_owned: Customer determines what to include in its own disclosures about PB as supplier.
  shared_note: PB's disclosure aims to be procurement-ready so customer disclosure inherits substantive evidence.

evidence_families:
- id: board_charter_and_governance_anchors
  name: Board Charter and governance anchors
  examples:
  - Board Charter (King V-mapped; reserved matters; conflicts framework)
  - Director letters of appointment
  - Induction pack
  - Conflicts / Declaration of Interest Register
  why_auditor_cares: Anchors Principles 1, 5, 6, 7. First document procurement / investor diligence requests.
  cadence: Annual review + on appointment
  typical_owner: PB
- id: board_evaluation
  name: Board, committee and director evaluation
  examples:
  - Biennial evaluation methodology
  - Evaluation reports and action plans
  - External-facilitator engagement (Practice 8 trigger)
  why_auditor_cares: Practice 8 cadence; lack of follow-up is a known failure pattern.
  cadence: At least every 2 years; externally facilitated at maturity
  typical_owner: PB
- id: skills_and_composition
  name: Skills matrix and independence assessment
  examples:
  - Board Skills Matrix (cyber, AI, privacy, financial, sector)
  - Per-NED Independence Assessment Memo (against Practice 42 nine factors)
  - Director CVs
  - Diversity statement
  why_auditor_cares: Practice 42 holistic independence assessment is a common King V gap.
  cadence: Annual + on appointment
  typical_owner: PB
- id: committee_tors
  name: Committee terms of reference and minutes
  examples:
  - Combined Audit / Risk / Technology Committee TOR
  - Combined Social, Ethics and Remuneration Committee TOR
  - Nominations TOR (or section in Board Charter while combined)
  - Quarterly minutes; chair reports to board
  why_auditor_cares: Principle 6; committee architecture is procurement-visible.
  cadence: Annual TOR review + quarterly minutes
  typical_owner: PB
- id: code_of_ethics_and_whistleblower
  name: Code of Ethics, AI Ethics Statement, Whistleblowing
  examples:
  - Code of Ethics (board-approved)
  - AI Ethics Statement
  - Anti-Corruption Policy + Gifts Register
  - Whistleblowing Policy + independent reporting channel
  - Whistleblower stats (anonymised) to S&E committee
  why_auditor_cares: Principle 2; ethics treated as a poster on the wall is a common failure.
  cadence: Annual review + continuous channel operation
  typical_owner: PB
- id: strategy_and_kpis
  name: Strategy, KPIs and integrated thinking
  examples:
  - Board-approved strategy and operational plan
  - KPI scorecard
  - Integrated-thinking review of the six capitals (financial, intellectual, human, social, natural, manufactured)
  - Going-concern / solvency / liquidity reporting (CFO)
  why_auditor_cares: Principle 3; "strategy = sales targets" is a known failure pattern.
  cadence: Annual strategy approval + quarterly review
  typical_owner: PB
- id: external_reports_and_disclosure
  name: External reports and King V Disclosure Framework
  examples:
  - King V Governance Disclosure (annual; published on website)
  - Integrated Trust & Governance Pack (NDA-gated for procurement diligence)
  - Concluding statement on four outcomes
  - Double-materiality assessment summary
  - Board approval minutes for each external report
  why_auditor_cares: Principle 4; missing King V Disclosure is a mandatory-element failure.
  cadence: Annual + on material change
  typical_owner: PB
- id: ceo_mandate_and_doa
  name: CEO Mandate and Delegation of Authority Framework
  examples:
  - CEO appointment letter and mandate
  - Delegation of Authority Framework (monetary, contractual, hiring, sub-processor, security exception, AI deployment thresholds)
  - CEO succession plan
  why_auditor_cares: Principle 7; "founder retains undocumented decision-making power" is a known failure.
  cadence: Annual + on org change
  typical_owner: PB
- id: risk_governance
  name: Risk policy, register and appetite
  examples:
  - Risk Management Policy
  - Risk Appetite Statement
  - Enterprise Risk Register (with cyber, AI, supplier, key-person, BCM, regulatory, commercial sub-registers)
  - BCM / DR plan + last test report
  why_auditor_cares: Principle 8; separate cyber/AI/privacy registers with no integration is a failure pattern.
  cadence: Quarterly register review + annual appetite review
  typical_owner: PB
- id: compliance_governance
  name: Compliance framework and obligations register
  examples:
  - Compliance Framework
  - Obligations Register (POPIA, Cybercrimes, ECTA, Companies Act, EU AI Act, sector pass-through)
  - Adopted-standards register (ISO 27001, ISO 27701, ISO 42001, NIST AI RMF, NIST SSDF, King V)
  - Regulatory horizon-scanning log
  why_auditor_cares: Principle 9; conflating King V (voluntary) with binding obligations is a failure pattern.
  cadence: Annual + per regulatory change
  typical_owner: PB
- id: information_and_tech_governance
  name: Technology, information, data and AI governance policies
  examples:
  - Technology and Information Governance Policy
  - Data classification scheme + retention schedule
  - Privacy Governance Policy + POPIA Programme
  - Information Officer designation + Regulator registration
  - Cybersecurity Policy + ISMS SoA (ISO 27001)
  - AI Governance Policy + AI Ethics Statement
  - AI System Cards per production model
  - Human Oversight SOP
  - Model evaluation / red-team records
  why_auditor_cares: Principle 10 flagship — Practice 109c AI governance is the highest-leverage King V update.
  cadence: Annual policy review + per release / per AI change
  typical_owner: PB
- id: ai_oversight_working_group
  name: AI Oversight Working Group records
  examples:
  - Working-group charter (reports into Audit / Risk / Tech committee)
  - System Card change-control log
  - AI eval / red-team review minutes
  - AI incident log
  why_auditor_cares: Practice 109c human oversight commensurate with risk; proportionate substitute for a dedicated AI committee.
  cadence: Monthly working-group meetings + escalation to committee
  typical_owner: PB
- id: remuneration
  name: Remuneration policy and implementation report
  examples:
  - Remuneration Policy
  - Implementation report
  - Fair-and-responsible test between executive and overall employee remuneration
  - Malus / clawback clauses
  - Non-binding advisory votes (if S&E committee triggered)
  why_auditor_cares: Principle 11; founder-set salaries with no committee discipline is a failure pattern.
  cadence: Annual + on material change
  typical_owner: PB
- id: combined_assurance
  name: Combined assurance map and internal audit charter
  examples:
  - Combined Assurance Map (per significant risk × assurance provider × cadence)
  - Internal Audit Charter (co-sourced acceptable)
  - Risk-based internal audit plan
  - External IA quality review (Practice 131f — every 5 years)
  - Pen-test reports
  - Model red-team reports
  - Statutory audit (when triggered by PI Score)
  why_auditor_cares: Principle 12; audit fatigue with no remediation is a failure pattern.
  cadence: Continuous; assurance map refreshed annually
  typical_owner: PB
- id: stakeholder_engagement
  name: Stakeholder engagement framework and trust pack
  examples:
  - Stakeholder Engagement Framework
  - Stakeholder Map (clients, end-users, regulators, sub-processors, model providers, employees, investors, community)
  - Engagement log
  - AI Transparency Disclosure pack for clients
  - Investor briefing protocol
  why_auditor_cares: Principle 13; founder-only stakeholder relationships with no institutional memory is a failure pattern.
  cadence: Annual framework review + continuous engagement log
  typical_owner: PB

scenarios:
- id: scn-kingv-pre-pi-score
  name: Pre-PI-Score threshold (combined committees, founder-led)
  framework_specific_id: KV-Trigger-1
  description: >-
    PB is below Public Interest Score thresholds for statutory audit and Reg 43 social-and-ethics
    committee. Combined Audit/Risk/Technology and combined Social/Ethics/Remuneration committees are
    proportionate. Founder/CEO leads; at least one independent NED present.
  applies_to_business_models: [on-prem, ai-factory]
  pb_role: governing_body
  customer_role: not-applicable
  triggered_requirements:
  - requirement_id: king-v-p-5
    scenario_specific_note: Composition target — at least one independent NED, scaling toward majority NED.
  - requirement_id: king-v-p-6
    scenario_specific_note: Combined committee architecture proportionate at this stage.
  - requirement_id: king-v-rp-45
    scenario_specific_note: If founder is Chair, Lead Independent NED must be designated.
  notes: Starting posture; build statutory architecture pre-emptively.
- id: scn-kingv-pi-score-threshold
  name: PI Score crossing Reg 43 threshold (statutory S&E committee mandatory)
  framework_specific_id: KV-Trigger-2
  description: >-
    Public Interest Score crosses the threshold requiring a statutory Social and Ethics Committee
    under Companies Act s 72(4) and Regulation 43. Combined committee must be reconstituted.
  applies_to_business_models: [on-prem, ai-factory]
  pb_role: governing_body
  customer_role: not-applicable
  triggered_requirements:
  - requirement_id: king-v-p-6
    scenario_specific_note: Combined S&E/Remuneration committee splits into separate statutory S&E.
  - requirement_id: king-v-rp-74
    scenario_specific_note: Statutory S&E committee composition and Reg 43 reporting cadence triggers.
  notes: Architecture should be pre-built to make this transition incremental, not disruptive.
- id: scn-kingv-first-independent-ned
  name: First Independent NED appointed
  framework_specific_id: KV-Trigger-3
  description: >-
    First independent non-executive director joins the board. Independence assessment against the
    nine factors of Practice 42 documented. Lead Independent designation may transfer or be retired
    depending on Chair status.
  applies_to_business_models: [on-prem, ai-factory]
  pb_role: governing_body
  customer_role: not-applicable
  triggered_requirements:
  - requirement_id: king-v-p-5
    scenario_specific_note: Composition rebalanced toward NED majority target.
  - requirement_id: king-v-rp-42
    scenario_specific_note: Independence rationale documented in writing.
  - requirement_id: king-v-rp-45
    scenario_specific_note: Chair / Lead Independent status reassessed.
  notes: Procurement-visible milestone; signals governance maturity to enterprise buyers.
- id: scn-kingv-material-ai-incident
  name: First material AI incident
  framework_specific_id: KV-Trigger-4
  description: >-
    Material AI-related incident (significant model failure, harm to data subjects, regulator
    concern, customer-impacting outage). Triggers escalation from AI Oversight Working Group to
    Audit/Risk/Technology Committee, board notification, and external disclosure consideration.
  applies_to_business_models: [on-prem, ai-factory]
  pb_role: governing_body
  customer_role: affected_or_informed
  triggered_requirements:
  - requirement_id: king-v-p-10
    scenario_specific_note: AI governance under Practice 109c — incident triggers comprehensive review.
  - requirement_id: king-v-p-8
    scenario_specific_note: Risk governance — incident updates risk register and treatment plan.
  - requirement_id: king-v-rp-109
    scenario_specific_note: AI Oversight escalation to committee; post-incident System Card update.
  notes: Tests the human-oversight and accountability machinery; visible to regulators and customers.
- id: scn-kingv-first-eu-customer
  name: First EU enterprise customer onboarded
  framework_specific_id: KV-Trigger-5
  description: >-
    First EU-based enterprise customer activates EU AI Act extraterritorial reach. Triggers EU AI Act
    high-risk assessment, deployer/provider role analysis, and elevated disclosure obligations.
  applies_to_business_models: [on-prem, ai-factory]
  pb_role: governing_body
  customer_role: deployer
  triggered_requirements:
  - requirement_id: king-v-p-9
    scenario_specific_note: Compliance universe expands to include EU AI Act.
  - requirement_id: king-v-p-10
    scenario_specific_note: AI governance must satisfy EU AI Act Articles 9, 10, 13, 14, 15, 26.
  notes: Regulatory horizon-scanning signal; documented in obligations register.
- id: scn-kingv-founder-transition
  name: Founder transition / CEO succession activates
  framework_specific_id: KV-Trigger-6
  description: >-
    Founder-CEO succession plan activates — planned transition, departure, or incapacity. Tests
    Practice 79 succession plan and Practice 80 chair-led CEO performance review machinery.
  applies_to_business_models: [on-prem, ai-factory]
  pb_role: governing_body
  customer_role: not-applicable
  triggered_requirements:
  - requirement_id: king-v-p-7
    scenario_specific_note: Delegation framework and succession plan tested.
  - requirement_id: king-v-rp-82
    scenario_specific_note: DoA framework holds without founder personal authority.
  notes: Key-person risk realised; institutional memory and documented authority become critical.
- id: scn-kingv-series-b-investment
  name: Series B / institutional investment round
  framework_specific_id: KV-Trigger-7
  description: >-
    Institutional investment round (Series B+ or equivalent) — investor diligence demands board
    independence, externally facilitated evaluation, formal committee architecture, and integrated
    disclosure.
  applies_to_business_models: [on-prem, ai-factory]
  pb_role: governing_body
  customer_role: not-applicable
  triggered_requirements:
  - requirement_id: king-v-p-5
    scenario_specific_note: Majority NED / most independent target accelerated.
  - requirement_id: king-v-p-4
    scenario_specific_note: External reporting matures — investor-facing King V Disclosure becomes mandatory in diligence pack.
  - requirement_id: king-v-rp-8
    scenario_specific_note: Externally facilitated board evaluation expected by investor.
  notes: Trigger for "Later" phase of source pack §14 roadmap.

