# King V Code on Corporate Governance for South Africa, 2025 — PrivateBox alignment record (schema v2)
# Source-of-truth file for the GRC OS. Edits go in version control.
#
# Schema: see /docs/schema-v2.md
# PB-curated source pack: frameworks/king-v/source/privatebox-king-v-architecture-pack.md
#
# King V is voluntary, principles-based, outcomes-focused. Apply-and-explain model. Not certifiable.
# PrivateBox applies King V proportionately as a scaling private SA technology company. Disclosure
# Framework publication is mandatory for orgs claiming application of King V.
#
# Crosswalks: King V is a meta-governance OVERLAY that references INTO all other frameworks. King V
# outgoing crosswalks point at 27001, 27701, 42001, POPIA, EU AI Act. Reverse graph auto-derived.
# No retroactive edits to other YAMLs needed.

