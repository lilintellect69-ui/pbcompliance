- id: king-v-rp-109
  kind: practice
  native_id: Practice 109c
  group: technology
  group_name: Data, information and technology
  title: AI governance (the King V flagship)
  objective: >-
    The governing body ensures that AI systems adhere to ethics, human centricity, accountability,
    transparency, explainability, security, privacy, fairness and trustworthiness; that clear
    accountability is established for AI decisions, actions, outputs and outcomes; and that human
    oversight and override mechanisms commensurate with risk are implemented.
  pb_interpretation: >-
    Defining battleground for PrivateBox. AI inventory; AI risk classification (low / limited / high
    / prohibited per EU AI Act); AI System Cards; pre-deployment review; model eval / red-team;
    human-override SOP; training-data provenance; output traceability; bias monitoring; AI incident
    process; user disclosure when AI is in use. AI Oversight Working Group reports into Audit/Risk/
    Tech committee.
  owner: PB
  role_applicability:
    governing_body: 'Y'
    audit_risk_tech_committee: 'Y'
    ai_oversight_working_group: 'Y'
  documented_evidence:
  - AI Governance Policy
  - AI Ethics Statement
  - AI System Cards per production model
  - Human Oversight SOP
  - Model evaluation / red-team records
  - AI risk register
  - AI incident log
  - AI Oversight Working Group charter + minutes
  operational_evidence: >-
    Board pack includes AI risk dashboard, model changes, incidents; AI System Cards trace to
    production; human-override tested.
  audit_methods:
  - Insp
  - Int
  - Samp
  - Obs
  cadence: Annual policy review + per AI release / change
  failure_modes: >-
    AI deployed before policy in place; "human in the loop" as decoration; AI ethics treated as
    marketing.
  maturity_target: AR
  triggered_by_scenarios:
  - scn-kingv-material-ai-incident
  - scn-kingv-first-eu-customer
  external_safe_phrasing: >-
    PrivateBox's AI governance is overseen by the board through a board-approved AI policy that
    operationalises the King V Practice 109c values, requires human oversight commensurate with
    risk, and is supported by AI System Cards for all production models.
  business_models:
  - on-prem
  - ai-factory
  crosswalk:
  - framework: iso-42001
    refs:
    - iso-42001-cl-6.1.4
    - iso-42001-a-5.2
    - iso-42001-a-6.1.4
    - iso-42001-a-6.2.3
    note: AIMS AISIA + impact assessment + bias methodology + human oversight operationalise Practice 109c.
  - framework: popia
    refs:
    - popia-s-automated-decisions
    note: POPIA s 71 automated decision-making is the binding underpinning for human-override requirement.
  - framework: eu-ai-act
    refs:
    - eu-ai-act-art-9
    - eu-ai-act-art-13
    - eu-ai-act-art-14
    - eu-ai-act-art-15
    note: EU AI Act risk-mgmt + transparency + human oversight + accuracy/robustness align with Practice 109c values.

