# ─────────────────────────────────────────────────────────────────────────────
# Common Criteria — Logical and Physical Access Controls (CC6)
# ─────────────────────────────────────────────────────────────────────────────

- id: soc-2-cc-6.1
  kind: criterion
  native_id: CC6.1
  group: CC6
  group_name: Logical and physical access controls
  title: Access security architecture
  requirement: >-
    The entity implements logical access security software, infrastructure, and architectures over
    protected information assets to protect them from security events to meet the entity's
    objectives.
  pb_interpretation: >-
    Inventory product nodes, model artefacts, vectors, connectors, admin APIs, support tools.
    Require MFA and segmentation where feasible. Customer-hosted systems may implement part via
    CUECs.
  owner: PB/SH
  documented_evidence:
  - Asset inventory
  - Authentication standards (MFA)
  - Hardening baseline
  - Key management procedures
  - Network diagrams
  type_i_evidence: >-
    Inventory; auth standard; network diagrams; segmentation design.
  type_ii_evidence: >-
    MFA state samples across the period; inventory reconciliations; config samples; stale-key reviews.
  suggested_observation_period: Full period
  audit_methods:
  - Insp
  - Obs
  - Samp
  cadence: Ongoing + periodic review
  failure_modes: >-
    Unknown assets; MFA gaps; stale keys.
  maturity_target: AR
  external_safe_phrasing: >-
    PrivateBox designs access protections for product and support components.
  business_models:
  - on-prem
  - ai-factory
  crosswalk:
  - framework: iso-27001
    refs:
    - iso-27001-a-5.15
    - iso-27001-a-8.2
    - iso-27001-a-8.3
    - iso-27001-a-8.5
    note: ISMS access control + privileged access + secure authentication.

- id: soc-2-cc-6.2
  kind: criterion
  native_id: CC6.2
  group: CC6
  group_name: Logical and physical access controls
  title: User provisioning and deprovisioning
  requirement: >-
    Prior to issuing system credentials and granting system access, the entity registers and
    authorises new internal and external users whose access is administered by the entity.
  pb_interpretation: >-
    Ticketed approvals; named accounts; prompt deprovisioning of local and support access.
    Distinguish customer-local admins from PB remote-support users.
  owner: PB/SH
  documented_evidence:
  - Joiner / mover / leaver process
  - Account approval workflow
  - Access tickets
  - User listings
  - Termination records
  type_i_evidence: >-
    JML workflow; ticket form.
  type_ii_evidence: >-
    Access tickets across the period; terminations sampled; deprovisioning timeliness.
  suggested_observation_period: Full period
  audit_methods:
  - Insp
  - Samp
  cadence: Event-driven
  failure_modes: >-
    Shared accounts; no removal step; late deprovisioning; missing approval.
  maturity_target: AR
  external_safe_phrasing: >-
    PrivateBox operates controlled access onboarding and offboarding processes.
  business_models:
  - on-prem
  - ai-factory
  crosswalk:
  - framework: iso-27001
    refs:
    - iso-27001-a-5.16
    - iso-27001-a-5.17
    - iso-27001-a-5.18
    note: ISMS identity management + authentication information + access rights.

- id: soc-2-cc-6.3
  kind: criterion
  native_id: CC6.3
  group: CC6
  group_name: Logical and physical access controls
  title: Role-based access and least privilege
  requirement: >-
    The entity authorises, modifies, or removes access to data, software, functions, and other
    protected information assets based on roles, responsibilities, or the system design and
    changes, giving consideration to the concepts of least privilege and segregation of duties.
  pb_interpretation: >-
    Role matrix for support, engineering, deployment, and customer admins; review privileged
    access. Support break-glass access should be rare, approved, and logged.
  owner: PB/SH
  documented_evidence:
  - RBAC standard
  - Privileged access process
  - Role matrix
  - Admin account lists
  - Periodic access review records
  type_i_evidence: >-
    Role matrix; admin model; privileged review design.
  type_ii_evidence: >-
    Access review records across the period; admin lists; SoD checks.
  suggested_observation_period: Full period
  audit_methods:
  - Insp
  - Obs
  - Samp
  cadence: Periodic + event-driven
  failure_modes: >-
    Flat admin rights; no SoD; privilege creep.
  maturity_target: AR
  external_safe_phrasing: >-
    PrivateBox aligns system access to roles and least-privilege principles.
  business_models:
  - on-prem
  - ai-factory
  crosswalk:
  - framework: iso-27001
    refs:
    - iso-27001-a-8.2
    note: ISMS privileged access rights.

- id: soc-2-cc-6.4
  kind: criterion
  native_id: CC6.4
  group: CC6
  group_name: Logical and physical access controls
  title: Physical access restrictions
  requirement: >-
    The entity restricts physical access to facilities and protected information assets to
    authorised personnel to meet the entity's objectives.
  pb_interpretation: >-
    PB sites: badge / visitor / media controls. Customer-hosted nodes: minimum customer
    responsibilities defined as CUECs. In pure customer-hosted scope, much execution may sit with
    the customer.
  owner: PB/SH
  documented_evidence:
  - Physical security standard
  - Visitor controls
  - Customer deployment prerequisites
  - Facility access logs
  - Visitor logs
  type_i_evidence: >-
    Physical security standard; visitor controls; deployment prerequisites.
  type_ii_evidence: >-
    Badge logs and visitor logs across the period; periodic review.
  suggested_observation_period: Full period
  audit_methods:
  - Insp
  - Obs
  - Samp
  cadence: Ongoing + periodic review
  failure_modes: >-
    No physical-scope decision; no review of old badges; visitor gaps.
  maturity_target: AR
  external_safe_phrasing: >-
    PrivateBox defines and operates physical security controls relevant to its scope.
  business_models:
  - on-prem
  - ai-factory
  crosswalk:
  - framework: iso-27001
    refs:
    - iso-27001-a-7.2
    - iso-27001-a-7.3
    note: ISMS physical entry controls + securing offices.

- id: soc-2-cc-6.5
  kind: criterion
  native_id: CC6.5
  group: CC6
  group_name: Logical and physical access controls
  title: Secure asset disposal
  requirement: >-
    The entity discontinues logical and physical protections over physical assets only after the
    ability to read or recover data and software from those assets has been diminished and is no
    longer required to meet the entity's objectives.
  pb_interpretation: >-
    Secure wipe / dekey procedures for appliances, RMA devices, removable media, and support
    exports. Especially important for field hardware and removable support media.
  owner: PB/SH
  documented_evidence:
  - Media sanitisation standard
  - RMA process
  - Disposal certificates
  - Wipe logs
  - Dekey records
  type_i_evidence: >-
    Disposal / RMA procedure; crypto-erase or wipe validation.
  type_ii_evidence: >-
    Wipe / dekey evidence across the period; disposal records.
  suggested_observation_period: Full period
  audit_methods:
  - Insp
  - Obs
  - Samp
  cadence: Event-driven
  failure_modes: >-
    Disposal undefined for field hardware; missing sanitisation proof.
  maturity_target: AR
  external_safe_phrasing: >-
    PrivateBox uses secure disposal and sanitisation processes.
  business_models:
  - on-prem
  - ai-factory
  crosswalk:
  - framework: iso-27001
    refs:
    - iso-27001-a-7.14
    note: ISMS secure disposal or re-use of equipment.

- id: soc-2-cc-6.6
  kind: criterion
  native_id: CC6.6
  group: CC6
  group_name: Logical and physical access controls
  title: Boundary protection
  requirement: >-
    The entity implements logical access security measures to protect against threats from sources
    outside its system boundaries.
  pb_interpretation: >-
    Disable remote access by default; require customer approval, MFA, session logging, and network
    restrictions. Major shared-responsibility area for on-prem customers.
  owner: PB/SH
  documented_evidence:
  - Remote support policy
  - Network security baseline
  - Firewall configs
  - VPN / tunnel settings
  - Enablement approvals
  type_i_evidence: >-
    Network baseline; remote-support policy; default-off remote support and MFA design.
  type_ii_evidence: >-
    Firewall samples; tunnel approvals; session logs; permanent-exception reviews.
  suggested_observation_period: Full period
  audit_methods:
  - Insp
  - Obs
  - Samp
  cadence: Ongoing + periodic review
  failure_modes: >-
    Permanent always-on support tunnel; permanent exceptions; undocumented remote sessions.
  maturity_target: AR
  external_safe_phrasing: >-
    PrivateBox uses controlled boundary protection for remote access and administration.
  business_models:
  - on-prem
  - ai-factory
  crosswalk:
  - framework: iso-27001
    refs:
    - iso-27001-a-8.20
    - iso-27001-a-8.21
    - iso-27001-a-8.22
    note: ISMS network security + segregation + network services.

- id: soc-2-cc-6.7
  kind: criterion
  native_id: CC6.7
  group: CC6
  group_name: Logical and physical access controls
  title: Secure transmission and removal
  requirement: >-
    The entity restricts the transmission, movement, and removal of information to authorised
    internal and external users and processes, and protects it during transmission, movement, or
    removal to meet the entity's objectives.
  pb_interpretation: >-
    Encrypt exports, support bundles, backups, and updates; sign packages; document offline-
    transfer methods. Air-gapped deployments need explicit offline controls.
  owner: PB/SH
  documented_evidence:
  - Encryption standard
  - Transfer protocol standard
  - Code-signing process
  - TLS settings
  - Signed packages
  - Transfer approvals
  - Export logs
  type_i_evidence: >-
    Transfer standard; encryption requirements; signed updates and offline media procedures.
  type_ii_evidence: >-
    Signed releases across the period; export logs; encryption-evidence samples.
  suggested_observation_period: Full period
  audit_methods:
  - Insp
  - Obs
  - Samp
  cadence: Event-driven + ongoing
  failure_modes: >-
    Ad hoc file transfer methods; informal transfers; unsigned packages.
  maturity_target: AR
  external_safe_phrasing: >-
    PrivateBox uses protected mechanisms for transmitting and removing data.
  business_models:
  - on-prem
  - ai-factory
  crosswalk:
  - framework: iso-27001
    refs:
    - iso-27001-a-5.14
    - iso-27001-a-8.24
    note: ISMS information transfer + cryptography.

- id: soc-2-cc-6.8
  kind: criterion
  native_id: CC6.8
  group: CC6
  group_name: Logical and physical access controls
  title: Malicious software prevention
  requirement: >-
    The entity implements controls to prevent or detect and act upon the introduction of
    unauthorised or malicious software to meet the entity's objectives.
  pb_interpretation: >-
    Scan build artefacts, endpoints, support uploads, imported packages; restrict installs. In
    customer environments, some execution may be customer-owned.
  owner: PB/SH
  documented_evidence:
  - Anti-malware standard
  - Package validation process
  - Endpoint controls
  - Scan logs
  - EDR status
  - Package scan results
  type_i_evidence: >-
    EDR / AV standard; scan process; build / package scanning design.
  type_ii_evidence: >-
    Scan logs across the period; EDR status; agent activity.
  suggested_observation_period: Full period
  audit_methods:
  - Insp
  - Obs
  - Samp
  cadence: Ongoing
  failure_modes: >-
    Reliance on customer AV only; agents inactive; packages unscanned.
  maturity_target: AR
  external_safe_phrasing: >-
    PrivateBox applies malware and unauthorised-software controls across relevant environments.
  business_models:
  - on-prem
  - ai-factory
  crosswalk:
  - framework: iso-27001
    refs:
    - iso-27001-a-8.7
    note: ISMS protection against malware.

# ─────────────────────────────────────────────────────────────────────────────
# Common Criteria — System Operations (CC7)
# ─────────────────────────────────────────────────────────────────────────────

- id: soc-2-cc-7.1
  kind: criterion
  native_id: CC7.1
  group: CC7
  group_name: System operations
  title: Vulnerability and configuration monitoring
  requirement: >-
    To meet its objectives, the entity uses detection and monitoring procedures to identify
    changes to configurations that result in the introduction of new vulnerabilities, and
    susceptibilities to newly discovered vulnerabilities.
  pb_interpretation: >-
    Maintain hardening baselines; run infra, container, dependency, and configuration scans;
    issue advisories to customers. Telemetry-off customers may need to self-run some controls with
    PB guidance.
  owner: PB/SH
  documented_evidence:
  - Vulnerability management process
  - Baseline config standard
  - Scan reports
  - Remediation tickets
  - Customer advisories
  - FIM alerts
  type_i_evidence: >-
    Hardening baseline; scan schedule; FIM and remediation SLA design.
  type_ii_evidence: >-
    Scan reports across the period; remediation tickets; FIM alert handling.
  suggested_observation_period: Full period
  audit_methods:
  - Insp
  - Samp
  cadence: Weekly / monthly + after change
  failure_modes: >-
    Scans run but no response design; findings linger.
  maturity_target: AR
  external_safe_phrasing: >-
    PrivateBox monitors vulnerabilities and configuration drift relevant to its system.
  business_models:
  - on-prem
  - ai-factory
  crosswalk:
  - framework: iso-27001
    refs:
    - iso-27001-a-8.8
    - iso-27001-a-8.9
    note: ISMS management of technical vulnerabilities + configuration management.

- id: soc-2-cc-7.2
  kind: criterion
  native_id: CC7.2
  group: CC7
  group_name: System operations
  title: System and anomaly monitoring
  requirement: >-
    The entity monitors system components and the operation of those components for anomalies that
    are indicative of malicious acts, natural disasters, and errors affecting the entity's ability
    to meet its objectives; anomalies are analysed to determine whether they represent security
    events.
  pb_interpretation: >-
    Define minimum log set, SIEM integration points, alert catalogue, support-event logging. If
    customer disables telemetry, PB should clearly describe what it cannot observe.
  owner: PB/SH
  documented_evidence:
  - Logging and monitoring standard
  - Alert response runbooks
  - Log retention settings
  - Alerts / dashboards
  - Response records
  type_i_evidence: >-
    Logging standard; alert matrix; minimum log list.
  type_ii_evidence: >-
    Alert reviews across the period; dashboards; investigations.
  suggested_observation_period: Full period
  audit_methods:
  - Insp
  - Obs
  - Samp
  cadence: Daily / ongoing
  failure_modes: >-
    "We log everything" with no specifics; alert fatigue; no closed-loop review.
  maturity_target: AR
  external_safe_phrasing: >-
    PrivateBox defines monitoring requirements and operates its own in-scope monitoring controls.
  business_models:
  - on-prem
  - ai-factory
  crosswalk:
  - framework: iso-27001
    refs:
    - iso-27001-a-8.15
    - iso-27001-a-8.16
    - iso-27001-a-8.17
    note: ISMS logging + monitoring + clock synchronisation.
  - framework: iso-42001
    refs:
    - iso-42001-a-6.2.4
    note: AIMS AI event logs.

- id: soc-2-cc-7.3
  kind: criterion
  native_id: CC7.3
  group: CC7
  group_name: System operations
  title: Security event evaluation
  requirement: >-
    The entity evaluates security events to determine whether they could or have resulted in a
    failure of the entity to meet its objectives (security incidents) and, if so, takes actions to
    prevent or address such failures.
  pb_interpretation: >-
    Severity matrix and decision tree; include customer-impact and AI-misuse analysis. Customer-
    originated events still need to be routed into PB support / PSIRT decisions.
  owner: PB/SH
  documented_evidence:
  - Event triage process
  - Severity matrix
  - Incident tickets
  - Escalation records
  - Root-cause notes
  type_i_evidence: >-
    Triage workflow; severity matrix; impact-assessment design.
  type_ii_evidence: >-
    Triage tickets across the period; severity records; escalation logs.
  suggested_observation_period: Full period
  audit_methods:
  - Insp
  - Int
  - Samp
  cadence: Event-driven
  failure_modes: >-
    No event-to-incident decision rule; events never escalated; severity inconsistent.
  maturity_target: AR
  external_safe_phrasing: >-
    PrivateBox evaluates security events through a documented triage process.
  business_models:
  - on-prem
  - ai-factory
  crosswalk:
  - framework: iso-27001
    refs:
    - iso-27001-a-5.24
    - iso-27001-a-5.25
    note: ISMS incident management planning + assessment.

- id: soc-2-cc-7.4
  kind: criterion
  native_id: CC7.4
  group: CC7
  group_name: System operations
  title: Incident response execution
  requirement: >-
    The entity responds to identified security incidents by executing a defined incident-response
    program to understand, contain, remediate, and communicate security incidents, as appropriate.
  pb_interpretation: >-
    Joint-ready playbooks for product, support, customer-site, and subservice incidents. Include
    joint-response roles and evidence boundaries for customer-hosted nodes.
  owner: PB/SH
  documented_evidence:
  - Incident response plan
  - Communication templates
  - Tabletop programme
  - Tabletop results
  - Incident files
  - Notifications
  type_i_evidence: >-
    IR plan; playbooks; contact trees; tabletop plan.
  type_ii_evidence: >-
    Incident files across the period; tabletop records; notifications.
  suggested_observation_period: Full period
  audit_methods:
  - Insp
  - Obs
  - Samp
  cadence: Event-driven + periodic exercises
  failure_modes: >-
    Incident plan too generic; plan exists but not followed.
  maturity_target: AR
  external_safe_phrasing: >-
    PrivateBox maintains a documented incident-response programme.
  business_models:
  - on-prem
  - ai-factory
  crosswalk:
  - framework: iso-27001
    refs:
    - iso-27001-a-5.26
    - iso-27001-a-5.27
    note: ISMS incident response + learning from incidents.
  - framework: popia
    refs:
    - popia-cond-7
    note: POPIA security safeguards including s 22 breach notification.

- id: soc-2-cc-7.5
  kind: criterion
  native_id: CC7.5
  group: CC7
  group_name: System operations
  title: Recovery from incidents
  requirement: >-
    The entity identifies, develops, and implements activities to recover from identified security
    incidents.
  pb_interpretation: >-
    Restoration procedures, post-incident reviews, hardening follow-up. If customer environment
    is primary recovery domain, PB still documents its own obligations and dependencies.
  owner: PB/SH
  documented_evidence:
  - Recovery runbooks
  - PIR process
  - Recovery evidence
  - PIRs
  - Change records
  type_i_evidence: >-
    Recovery runbooks; PIR process; root-cause and prevention loop design.
  type_ii_evidence: >-
    PIRs across the period; recovery evidence; change records linked to incidents.
  suggested_observation_period: Full period
  audit_methods:
  - Insp
  - Samp
  cadence: Event-driven + periodic test
  failure_modes: >-
    No structured post-incident review; no root cause or recurrence-prevention action.
  maturity_target: AR
  external_safe_phrasing: >-
    PrivateBox uses recovery and lessons-learned processes after incidents.
  business_models:
  - on-prem
  - ai-factory
  crosswalk:
  - framework: iso-27001
    refs:
    - iso-27001-a-5.27
    note: ISMS learning from information security incidents.

