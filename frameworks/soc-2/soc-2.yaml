  - SOP library
  - SOPs with version history + review records
  type_i_evidence: >-
    SOP set; periodic review records.
  type_ii_evidence: >-
    SOP-linked tickets / execution logs across the period; staff don't rely on memory.
  suggested_observation_period: Full period
  audit_methods:
  - Insp
  - Int
  cadence: Per procedure
  failure_modes: >-
    Policy-only programme; staff rely on memory or chats.
  maturity_target: AR
  external_safe_phrasing: >-
    PrivateBox operationalises documented policies through repeatable procedures.
  business_models:
