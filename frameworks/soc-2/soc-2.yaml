- id: soc-2-cc-9.2
  kind: criterion
  native_id: CC9.2
  group: CC9
  group_name: Risk mitigation
  title: Vendor and business partner risk
  requirement: >-
    The entity assesses and manages risks associated with vendors and business partners.
