- id: soc-2-cc-5.3
  kind: criterion
  native_id: CC5.3
  group: CC5
  group_name: Control activities
  title: Policies and procedures
  requirement: >-
    The entity deploys control activities through policies that establish what is expected and
    procedures that put policies into action.
  pb_interpretation: >-
    Convert policy to step-by-step SOPs for provisioning, support, change, incident, and release.
    If only policies exist, Type II evidence usually collapses.
  owner: PB
  documented_evidence:
