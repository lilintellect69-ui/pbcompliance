  cadence: Annual + on change
  failure_modes: >-
    Plan stops at "call support"; plan stale; no exercise.
  maturity_target: AR
  external_safe_phrasing: >-
    PrivateBox maintains continuity and disruption-response planning.
  business_models:
  - on-prem
  - ai-factory
  crosswalk:
  - framework: iso-27001
    refs:
    - iso-27001-a-5.29
    - iso-27001-a-5.30
