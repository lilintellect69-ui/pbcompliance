  created: '2026-05-11'
  resolved_value: null
  resolved_at: null
- id: oq-nist-model-registry-tool
  question: Which model registry / approval tooling does PrivateBox use?
  candidate_answers:
  - Hugging Face Hub private mirror
  - MLflow Model Registry
  - Custom internal registry with manual approval workflow
  - Cloud-vendor registry (AWS / Azure / GCP)
  decision_owner: AI Security Lead + Head of AI
  decision_status: pending
  blocks_requirements:
