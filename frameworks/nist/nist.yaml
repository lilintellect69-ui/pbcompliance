  decision_owner: AI Governance Lead
  decision_status: pending
  blocks_requirements:
  - nist-gov-6.1
  - nist-218a-x-third-party-model-governance
  blocks_scenarios: []
  notes: >-
    GOV 6.1 + 218A third-party model governance are the highest-leverage AI supply-chain controls.
