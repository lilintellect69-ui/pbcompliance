# NIST AI / Cybersecurity Bundle — PrivateBox alignment record (schema v2)
# Three NIST documents authored as one framework with sub_frameworks[]:
#   - AI RMF 1.0 (Jan 2023) + GenAI Profile (Jul 2024) — function_outcome
#   - SSDF 1.1 (NIST SP 800-218, Feb 2022) — task
#   - SP 800-218A AI Overlay (Final May 2024) — overlay
#
# Schema: see /docs/schema-v2.md (sub_frameworks[] feature lines 143-165).
# Source pack: frameworks/nist/source/privatebox-nist-architecture-pack.md

schema_version: '2.0'
id: nist
version: 'AI RMF 1.0 + GenAI Profile Jul 2024 + SSDF 1.1 + SP 800-218A Final May 2024'
full_name: NIST AI Risk Management Framework + Secure Software Development Framework + AI Overlay
type: voluntary_framework
issuer: NIST
audit_type: self_attestation
certifiable: false
pb_interpretation_version: '1.0'
pb_interpretation_owner: null
pb_interpretation_last_reviewed: null
roles: []
tiers: []
effective_dates:
- milestone: AI RMF 1.0 published
  date: '2023-01-26'
  obligations: []
- milestone: SSDF 1.1 published (NIST SP 800-218)
  date: '2022-02-03'
  obligations: []
- milestone: AI RMF GenAI Profile published (NIST AI 600-1)
  date: '2024-07-26'
  obligations: []
- milestone: SP 800-218A AI Overlay final
  date: '2024-05-01'
  obligations: []

sub_frameworks:
- id: rmf
  name: AI Risk Management Framework
  version: 1.0 + GenAI Profile Jul 2024
  issuer: NIST
- id: ssdf
  name: Secure Software Development Framework (NIST SP 800-218)
  version: '1.1'
  issuer: NIST
- id: 218a
  name: SP 800-218A AI Overlay
  version: Final May 2024
  issuer: NIST
  overlay_on: ssdf

pb_application:
  why_chosen: >-
    NIST's AI RMF + SSDF + 218A bundle is the dominant US-government-and-enterprise voluntary
    framework family for AI and secure software development. AI RMF 1.0 sets the four-function
    structure (GOVERN / MAP / MEASURE / MANAGE) that has become the lingua franca for AI risk
    governance in US procurement; SSDF 1.1 is the federally-mandated baseline for secure software
    development under EO 14028 and subsequent OMB guidance (M-22-18 / M-23-16) — vendors selling
    into US federal agencies attest against SSDF practices; SP 800-218A overlays AI-model-specific
    additions onto SSDF covering training-data protection, model weights, adversarial testing,
    prompt-injection risk, and AI supply chain. PB's commercial reality: US enterprise procurement
    (especially financial services, healthcare, federal-adjacent) expects evidence of AI RMF
    alignment and SSDF attestation alongside ISO 27001 / SOC 2. Unlike ISO standards (certifiable)
    or POPIA (binding law), NIST frameworks are voluntary — self-attestation is the standard
    model. PB's positioning: "designed in alignment with NIST AI RMF 1.0 and SSDF 1.1, with AI
    Overlay (SP 800-218A) recommendations applied to the AI development pipeline." Never claim
    "NIST certified" — there is no such thing.
  scope_decisions:
    on_prem:
      coverage: full
      rationale: >-
        AI RMF outcomes apply to PB-as-AI-developer regardless of deployment. SSDF tasks apply to
        the development pipeline that builds PB on its own infrastructure — customer deployment
        environment is mostly out of SSDF scope. 218A overlay covers PB model sourcing, training
        data handling, model weights, adversarial testing — entirely PB-side. Customer-hosted
        runtime monitoring uses the AI RMF MANAGE function with shared responsibility (PB
        provides the design and the optional telemetry, customer operates in their environment).
    ai_factory:
      coverage: partial
      rationale: >-
        AI Factory partner-DC deployment introduces a subprocessor relationship that AI RMF GOV
        6.1 / 6.2 and SSDF PO.1.3 cover. Pending partner-DC selection, supplier-governance
        evidence is provisional. 218A overlay applies identically since it concerns PB's model
        development pipeline regardless of deployment substrate.
  top_risks:
  - >-
    AI RMF treated as marketing alignment rather than operational implementation — outcomes named
    in procurement responses without corresponding evidence in the engineering process.
  - >-
    SSDF tasks attested without recurring evidence collection across SDLC — Type II-style
    operating-effectiveness evidence absent at audit time.
  - >-
    218A overlay items skipped because "AI Overlay is voluntary" — but the items it adds (model
    weight protection, training-data integrity, adversarial testing, prompt-injection coverage)
    are the highest-leverage AI-security controls.
  - >-
    Model provenance and dataset provenance undocumented — particularly for open-weight models
    pulled from public hubs without signed verification.
  - >-
    Prompt-injection and jailbreak testing skipped in favour of generic security testing — known
    218A gap pattern.
  - >-
    Third-party AI components (foundation models, embedding services, vector stores) entering the
    pipeline without intake review — AI RMF GOV 6.1 / SSDF PW.4.1 high-risk gap.
  - >-
    No documented kill-switch / disengagement procedure for production AI features — MANAGE 2.4
    + 218A model update/rollback failure mode.
  - >-
    Evaluation suites not versioned or reproducible — MEASURE 2.1 / SSDF PW.8.1 gap that
    undermines every other AI quality claim.

shared_responsibility_model:
- area: AI governance pack (AI RMF GOV + SSDF PO)
  pb_owned: AI policy, RACI, launch criteria, exception process, supplier governance pack.
  cl_owned: Customer's own AI governance for their use of PrivateBox.
  shared_note: Unified governance pack aligns AI RMF GOV 1-6 with SSDF PO.1-PO.5.
- area: System and model inventory (AI RMF GOV 1.6 + SSDF PS.3.2 + 218A model registry)
  pb_owned: System inventory, approved model inventory, component register, SBOM / MBOM.
  cl_owned: Customer's deployment-side inventory of which models are in use.
  shared_note: PB ships the approved-models list; customer logs which are activated.
- area: Secure SDLC (SSDF PO.3 / PW + 218A 218a-PO.5.3)
  pb_owned: SDLC SOPs, branch protections, CI/CD hardening, code review, testing artefacts.
  cl_owned: N/A — SDLC is PB's pipeline.
  shared_note: 218A overlay extends SDLC into model artefacts and training environments.
- area: Model and data provenance (AI RMF MAP 4.1 + SSDF PS.3.2 + 218A model/dataset provenance)
  pb_owned: Source records, model source approval, dataset lineage, signatures, digests.
  cl_owned: Customer's own knowledge-base / RAG provenance.
  shared_note: PB provides templates; customer applies them to their corpus.
- area: TEVV and red teaming (AI RMF MAP 2.3 + MEASURE 1-4 + SSDF PW.7-8 + 218A adversarial)
  pb_owned: TEVV plan, red-team reports, evaluation sets, regression suite, security findings.
  cl_owned: Customer's deployment-context evaluation where applicable.
  shared_note: PB delivers eval baseline; customer extends with sector-specific scenarios.
- area: Runtime and incident operations (AI RMF MANAGE + SSDF RV)
  pb_owned: Monitoring plan, incident SOP, customer communication templates, kill-switch runbook.
  cl_owned: Customer's local monitoring of deployed system per agreed telemetry scope.
  shared_note: 15-day EU AI Act + 72-hour POPIA notification timing baked into PB SOPs.
- area: Customer handoff and shared responsibility (AI RMF MAP 1.1 + 3.5 + MANAGE 1.4)
  pb_owned: Deployment guide, hardening guide, shared-responsibility matrix, residual-risk statement.
  cl_owned: Customer reads, configures, and operates per handoff.
  shared_note: Procurement-gold artefact set — Workday / Microsoft Service Trust Portal pattern.

evidence_families:
- id: ai_governance_pack
  name: AI governance policy set (AI RMF GOV + SSDF PO anchor)
  examples:
  - AI policy with accountability, risk tiers, approvals, exceptions
  - Third-party AI rules and approved-models list
  - Human-oversight requirements
  - Customer-safe-use guidelines
  why_auditor_cares: AI RMF GOV outcomes can't be evidenced without a policy stack tying back to engineering.
  cadence: Annual review + per material change
  typical_owner: PB
- id: system_and_model_inventory
  name: System and model inventory (AI RMF GOV 1.6 / MANAGE 3.2 + SSDF PS.3.2 + 218A registry)
  examples:
  - Approved-models register (version, source, approval, retirement triggers)
  - Feature inventory + deployment inventory
  - Connector inventory
  - Component register / SBOM / MBOM
  - Per-customer instance log
  why_auditor_cares: Essential for AI RMF GOV 1.6 / MANAGE 3.2 and SSDF provenance. Cannot test what you cannot inventory.
  cadence: Continuous
  typical_owner: PB
- id: secure_sdlc_pack
  name: Secure SDLC SOP + RACI + toolchain artefacts (SSDF PO.3 / PW + 218A)
  examples:
  - SDLC SOPs covering repos, CI/CD, code review, testing, signing, release gating
  - Toolchain register
  - Branch protection settings
  - Pipeline configurations
  - 218A-extended scope to model artefacts and training environments
  why_auditor_cares: Core evidence for SSDF and 218A readiness; highest-volume audit area for software vendors.
  cadence: Continuous + per release
  typical_owner: PB
- id: sbom_provenance_release_integrity
  name: SBOM / provenance / release integrity bundle (SSDF PS.3.2 + 218A model provenance)
  examples:
  - Component inventory with origins and licences
  - Hashes and signatures per release
  - Build provenance metadata
  - Release archive (immutable)
  - Model provenance per approved model
  - Dataset lineage for training / fine-tuning data
  why_auditor_cares: One of the strongest attestation-style artefact families; expected in US federal procurement under M-22-18.
  cadence: Per release
  typical_owner: PB
- id: model_system_card
  name: Model / system card (AI RMF transparency artefact)
  examples:
  - Intended use + prohibited use statement
  - Data boundaries and known limits
  - Evaluation summary (representative metrics)
  - Residual risks
  - Support assumptions
  - Customer-facing version
  why_auditor_cares: Key AI RMF transparency artefact (GOV 4.2 / MAP 2.2 / MEASURE 2.8 / 2.9).
  cadence: Per release + on material change
  typical_owner: PB
- id: evaluation_and_red_team_pack
  name: Evaluation and red-team pack (AI RMF MEASURE + SSDF PW.7-8 + 218A adversarial)
  examples:
  - TEVV plan
  - Versioned test datasets (including adversarial cases)
  - Results, severity ratings, remediation log
  - AI red-team reports (prompt injection, jailbreak, exfiltration)
  - Regression suite outputs
  why_auditor_cares: Converts AI governance into auditable evidence; SSDF Type II evidence collapses without it.
  cadence: Per release + drift trigger + scheduled red-team cycle
  typical_owner: PB
- id: vuln_and_incident_sop
  name: Vulnerability and incident SOP (SSDF RV + AI RMF MANAGE)
  examples:
  - Vulnerability disclosure policy (VDP) + intake workflow
  - Triage + severity matrix
  - Disclosure templates
  - Patching SOPs
  - Model-disablement / kill-switch runbook
  - Communications templates
  - RCA records + CAPA register
  why_auditor_cares: Bridges SSDF RV and AI RMF MANAGE; visible to customers as advisories.
  cadence: Continuous + per incident
  typical_owner: PB
- id: customer_deployment_guide
  name: Customer deployment and shared-responsibility guide (AI RMF MAP 1.1 + 3.5 + MANAGE)
  examples:
  - Hardening tasks per customer
  - Monitored-responsibility matrix
  - Support-access rules
  - Telemetry options + opt-in
  - Patching responsibilities
  - Fallback paths and disablement procedures
  why_auditor_cares: Critical for on-prem credibility; mirrors SOC 2 CUEC pattern and ISO 42001 customer-relationship controls.
  cadence: Annual + per release
  typical_owner: PB
- id: training_and_competence
  name: AI training and competence records (AI RMF GOV 2.2 + SSDF PO.2.2)
  examples:
  - Role-based AI security training curriculum
  - Prompt-injection awareness module
  - Model misuse awareness
  - Support-access training
  - Refresher cycle records
  why_auditor_cares: GOV 2.2 + PO.2.2 cross-cut all other outcomes; sampling-friendly Type II evidence.
  cadence: Annual + per hire / role change
  typical_owner: PB
- id: third_party_model_governance
  name: Third-party AI component governance (AI RMF GOV 6 + SSDF PW.4 + 218A)
  examples:
  - Supplier assessment per model / library / dataset
  - Licence review
  - Approved-source list
  - Model card dossier per third-party model
  - Vulnerability monitoring per upstream
  why_auditor_cares: GOV 6.1 / 6.2 is the most-asked third-party-AI question in procurement.
  cadence: Per onboarding + annual + on upstream change
  typical_owner: PB
- id: ai_risk_treatment_plan
  name: AI risk register and treatment plan (AI RMF MANAGE 1)
  examples:
  - Risk register with AI-specific entries (hallucination, prompt injection, drift, abuse)
  - Prioritisation by impact / likelihood / resources
  - Treatment plans per high-priority risk
  - Residual-risk statement
  why_auditor_cares: MANAGE 1.1-1.4 traceable from risk to treatment to acceptance.
  cadence: Quarterly + on material change
  typical_owner: PB

scenarios:
- id: scn-nist-rmf-baseline-profile
  name: AI RMF baseline profile (general AI systems)
  framework_specific_id: NIST-Profile-1
  description: >-
    PrivateBox applies AI RMF 1.0 outcomes to its on-prem AI platform as a general AI system.
    GenAI Profile considerations applied where generative features are material.
  applies_to_business_models: [on-prem, ai-factory]
  pb_role: ai_developer_and_provider
  customer_role: ai_user_deployer
  triggered_requirements:
  - requirement_id: nist-gov-1.1
    scenario_specific_note: Legal / regulatory register covers AI-specific obligations.
  - requirement_id: nist-map-1.1
    scenario_specific_note: Intended-use register per deployment.
  notes: Baseline posture for procurement responses.
- id: scn-nist-rmf-genai-profile
  name: AI RMF GenAI Profile (NIST AI 600-1) activated
  framework_specific_id: NIST-Profile-2
  description: >-
    Generative AI features (chat, summarisation, generation) trigger the GenAI Profile (NIST AI
    600-1, Jul 2024). Adds CBRN, confabulation, intellectual-property, harmful-content, environmental
    impact, human-AI configuration considerations.
  applies_to_business_models: [on-prem, ai-factory]
  pb_role: genai_provider
  customer_role: genai_deployer
  triggered_requirements:
  - requirement_id: nist-measure-2.7
    scenario_specific_note: GenAI security testing (jailbreak, prompt injection) becomes mandatory.
  - requirement_id: nist-measure-2.10
    scenario_specific_note: Privacy risk in GenAI prompts and outputs.
  notes: PB's primary AI feature set is generative; profile applies.
- id: scn-nist-ssdf-readiness
  name: SSDF 1.1 readiness for US federal procurement (M-22-18 / M-23-16)
  framework_specific_id: NIST-Profile-3
  description: >-
    SSDF 1.1 self-attestation per OMB M-22-18 / M-23-16 — required for software sold to US federal
    agencies. PB attests its own production of the platform per CISA's SSDF attestation form.
  applies_to_business_models: [on-prem, ai-factory]
  pb_role: software_producer
  customer_role: software_consumer
  triggered_requirements:
  - requirement_id: nist-po-1.1
    scenario_specific_note: Foundational PO tasks must be attested.
  - requirement_id: nist-ps-3.2
    scenario_specific_note: SBOM / provenance is the M-22-18 high-bar item.
  notes: Trigger for any US-federal-adjacent deal.
- id: scn-nist-218a-overlay-activated
  name: 218A AI Overlay activated for AI model pipeline
  framework_specific_id: NIST-Profile-4
  description: >-
    SP 800-218A overlay applied on top of SSDF for PB's AI model pipeline — training data
    protection, model weight protection, adversarial testing, AI vulnerability intake.
  applies_to_business_models: [on-prem, ai-factory]
  pb_role: ai_model_producer
  customer_role: model_consumer
  triggered_requirements:
  - requirement_id: nist-218a-ps-1.2
    scenario_specific_note: Training / fine-tuning data protected against unauthorised modification.
  - requirement_id: nist-218a-ps-1.3
    scenario_specific_note: Model weights protected.
  notes: Activated when PB does any fine-tuning or guardrail-model production.
- id: scn-nist-incident-disclosure
  name: AI-specific incident disclosure pathway
  framework_specific_id: NIST-Profile-5
  description: >-
    Behavioural AI incident (harmful output, prompt-injection breach, model exfiltration attempt)
    triggers cross-framework notification — MANAGE 4.3 + SSDF RV.1.3 + EU AI Act Art. 73 + POPIA
    s 22 where personal information involved.
  applies_to_business_models: [on-prem, ai-factory]
  pb_role: incident_owner
  customer_role: notified_party
  triggered_requirements:
  - requirement_id: nist-manage-4.3
    scenario_specific_note: Communication plan invoked.
  - requirement_id: nist-rv-1.3
    scenario_specific_note: VDP coordination.
  notes: Aligns with established EU AI Act 15-day and POPIA 72-hour windows.

open_questions:
- id: oq-nist-rmf-profile-choice
  question: Does PrivateBox attest against AI RMF general profile only, or also activate GenAI Profile (NIST AI 600-1)?
  candidate_answers:
  - General AI RMF only (lighter scope)
  - GenAI Profile activated (covers PB's generative features explicitly)
  - Both — general baseline plus GenAI overlay on chat / summarisation features
  decision_owner: AI Governance Lead + Top Management
  decision_status: pending
  blocks_requirements: []
  blocks_scenarios:
  - scn-nist-rmf-genai-profile
  notes: >-
    PB's primary feature set is generative. GenAI Profile activation strengthens procurement story
    for high-stakes use cases but adds CBRN / confabulation / IP-specific evidence requirements.
  created: '2026-05-11'
  resolved_value: null
  resolved_at: null
- id: oq-nist-ssdf-attestation-timing
