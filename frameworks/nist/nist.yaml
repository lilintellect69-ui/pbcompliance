  resolved_value: null
  resolved_at: null

requirements:

# ═══════════════════════════════════════════════════════════════════════════════
# AI RMF — GOVERN (19 outcomes)
# ═══════════════════════════════════════════════════════════════════════════════

- id: nist-gov-1.1
  kind: function_outcome
  sub_framework: rmf
  native_id: GOV 1.1
  group: GOVERN
  group_name: Govern
  title: Legal and regulatory AI requirements understood and documented
  requirement: >-
    Legal and regulatory requirements involving AI are understood, managed and documented.
  pb_interpretation: >-
    PB-owned with customer input. AI legal and obligations register covering contract clauses,
    model / data / IP / privacy duties; reviewed before releases and major customer deployments.
  owner: PB
  documented_evidence:
  - AI legal and obligations register
  - Pre-release legal review records
  audit_methods:
  - Insp
  - Int
  cadence: Per release + on regulatory change
  failure_modes: Assuming on-prem removes compliance analysis.
  maturity_target: AR
  external_safe_claim: PrivateBox is designed with documented AI legal and contractual controls aligned to NIST AI RMF GOV 1.1.
  business_models:
  - on-prem
  - ai-factory
  crosswalk:
  - framework: iso-42001
    refs:
    - iso-42001-cl-4.1
    note: AIMS context (Clause 4.1) parallels AI RMF GOV 1.1 legal / regulatory understanding.

- id: nist-gov-1.2
  kind: function_outcome
  sub_framework: rmf
  native_id: GOV 1.2
  group: GOVERN
  group_name: Govern
  title: Trustworthy-AI characteristics integrated into policies
  requirement: >-
    Trustworthy AI characteristics are integrated into organisational policies and practices.
  pb_interpretation: >-
    AI Policy set covering security, reliability, privacy, transparency, human oversight. SDLC
    gates enforce trustworthy-AI characteristics at design and release.
  owner: PB
  documented_evidence:
  - AI Policy set (security / reliability / privacy / transparency / oversight)
  - SDLC gate checklist mapped to trustworthy-AI characteristics
  audit_methods:
  - Insp
  - Int
  cadence: Annual policy review + per release gate
  failure_modes: Values statement with no operational checks.
  maturity_target: AR
  external_safe_claim: PrivateBox implements documented controls aligned to NIST AI RMF trustworthy-AI characteristics.
  business_models:
  - on-prem
  - ai-factory
  crosswalk:
  - framework: iso-42001
    refs:
    - iso-42001-cl-5.2
    note: AIMS AI Policy (Clause 5.2) operationalises trustworthy-AI characteristics.

- id: nist-gov-1.3
  kind: function_outcome
  sub_framework: rmf
  native_id: GOV 1.3
  group: GOVERN
  group_name: Govern
  title: Risk-management activity level matches organisational risk tolerance
  requirement: >-
    Processes are in place to determine the activity level of risk-management based on
    organisational risk tolerance.
  pb_interpretation: >-
    AI risk-tiering standard with low / medium / high tiers. Healthcare, HR, legal, autonomous-agent
    features escalate to high-risk treatment.
  owner: PB
  documented_evidence:
  - AI risk-tiering rubric
  - Exception register
  audit_methods:
  - Insp
  - Int
  cadence: Per feature design + annual rubric review
  failure_modes: Identical treatment for trivial and sensitive uses.
  maturity_target: AR
  external_safe_claim: PrivateBox uses risk-proportionate AI governance and testing.
  business_models:
  - on-prem
  - ai-factory
  crosswalk:
  - framework: iso-42001
    refs:
    - iso-42001-cl-6.1.2
    note: AIMS AI risk methodology covers tiered treatment.

- id: nist-gov-1.4
  kind: function_outcome
  sub_framework: rmf
  native_id: GOV 1.4
  group: GOVERN
  group_name: Govern
  title: Transparent AI risk-management process
  requirement: >-
    The risk-management process and its outcomes are established through transparent policies,
    procedures and other controls.
  pb_interpretation: >-
    End-to-end AI risk procedure with stages, approvers, required artefacts, escalation,
    acceptance authority. Consistent use across releases.
  owner: PB
  documented_evidence:
  - AI risk SOP
  - Approval workflow + release checklist
  audit_methods:
  - Insp
  - Int
  cadence: Per release
  failure_modes: Informal approvals in chat.
  maturity_target: AR
  external_safe_claim: PrivateBox is managed through documented AI governance procedures.
  business_models:
  - on-prem
  - ai-factory
  crosswalk:
  - framework: iso-42001
    refs:
    - iso-42001-cl-6.1.3
    note: AIMS risk treatment / SoA pattern.

- id: nist-gov-1.5
  kind: function_outcome
  sub_framework: rmf
  native_id: GOV 1.5
  group: GOVERN
  group_name: Govern
  title: Ongoing monitoring and periodic review planned with roles defined
