    218A explicitly requires controlled model registry. Tooling choice affects every model-related
    218A overlay item.
  created: '2026-05-11'
  resolved_value: null
  resolved_at: null
- id: oq-nist-redteam-cadence
  question: What is PrivateBox's AI red-team cadence?
  candidate_answers:
  - Per material release + quarterly scheduled
  - Annual external red-team + continuous internal regression
  - Triggered by significant model change only
  decision_owner: AI Security Lead
  decision_status: pending
  blocks_requirements:
  - nist-measure-2.7
  blocks_scenarios: []
  notes: >-
    218A overlay emphasises adversarial testing. Cadence affects MEASURE 2.7 evidence depth.
  created: '2026-05-11'
  resolved_value: null
  resolved_at: null
- id: oq-nist-third-party-model-workflow
  question: What is the documented workflow for approving a new third-party / foundation model?
