  created: '2026-05-11'
  resolved_value: null
  resolved_at: null
- id: oq-nist-sbom-tooling
  question: Which SBOM generation and signing tooling does PrivateBox standardise on?
  candidate_answers:
  - Syft / Grype + Cosign (CNCF standard)
  - GitHub Dependency Graph + dependabot (lighter)
  - In-toto + SLSA-equivalent attestation (advanced)
  decision_owner: AI Security Lead + DevOps
