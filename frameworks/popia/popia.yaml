requirements:

# ─────────────────────────────────────────────────────────────────────────────
# Eight Conditions for Lawful Processing (Chapter 3, ss 8-25)
# ─────────────────────────────────────────────────────────────────────────────

- id: popia-cond-1
  kind: condition
  native_id: Condition 1 (s 8)
  group: chapter-3
  group_name: Conditions for lawful processing
  title: Accountability
  requirement: >-
    The responsible party must ensure that the conditions set out in Chapter 3, and all the measures
    that give effect to those conditions, are complied with at the time of determining the purpose and
    means of processing, and during the processing itself.
  auditor_intent: >-
    Regulator / auditor checks that privacy controls exist from design through operation, not only in
    policy documents — privacy-by-design rather than privacy-by-brochure.
  pb_interpretation: >-
    Embed compliance into product governance. Privacy review gate in SDLC; release checklist; exception
    approval; risk register. Customer accountable for its purposes; PrivateBox accountable for product
    and service-design controls and for its own corporate processing as RP.
  owner: SH
  role_applicability:
    responsible_party: 'Y'
    operator: 'Y'
    information_officer: 'Y'
  documented_evidence:
  - PrivateBox compliance framework (Regulation 4)
  - RACI for privacy responsibilities
  - Privacy-by-design SOP / SDLC privacy gate
  - Risk register
  operational_evidence: >-
    Sample releases checked for privacy sign-off; risk register reviewed at management cadence.
  audit_methods:
  - Insp
  - Int
  cadence: Annual + on material change
  failure_modes: >-
    Treating accountability as "customer problem"; policy with no approvals, no cadence, no owner.
  maturity_target: AR
  triggered_by_scenarios:
  - scn-popia-pure-on-prem
  - scn-popia-pb-corporate
  external_safe_claim: >-
    PrivateBox implements controls designed to support POPIA-aligned processing from deployment through
    operations.
  business_models:
  - on-prem
  - ai-factory
  crosswalk: []

- id: popia-cond-2
  kind: condition
  native_id: Condition 2 (ss 9-12)
  group: chapter-3
  group_name: Conditions for lawful processing
  title: Processing limitation
  requirement: >-
    Processing must be lawful, in a reasonable manner that does not infringe the privacy of the data
    subject, adequate, relevant and not excessive (minimality). Processing must have a justification
    (consent, contract performance, legal obligation, legitimate interests, etc.). Personal information
    must be collected directly from the data subject unless an exception applies.
  auditor_intent: >-
    Regulator / auditor verifies collection is necessary, justified and minimised; logs / debug
    bundles / telemetry reflect minimisation; indirect collection has documented basis.
  pb_interpretation: >-
    Default-minimise data captured by the product and vendor tooling. Disable unnecessary prompt
    retention by default; minimise telemetry fields; restrict support file collection; define lawful
    purposes for any vendor-side data received. Indirect-collection sources (connectors, imports,
    admin syncs) tagged and explicit.
  owner: SH
  role_applicability:
    responsible_party: 'Y'
    operator: 'Y'
  documented_evidence:
  - Data minimisation standard
  - Logging standard
  - Support data handling SOP
  - Telemetry data dictionary
  - Connector / import inventory
  operational_evidence: >-
    Default configurations show minimisation; sample telemetry payload confirms PII-free; sample
    support bundle confirms scoping.
  audit_methods:
  - Insp
  - Samp
  - Obs
  cadence: Annual + per change
  failure_modes: >-
    "Debug everything" culture; undefined support collections; collecting "just in case" data; silent
    background imports.
  maturity_target: AR
  triggered_by_scenarios:
  - scn-popia-telemetry
  - scn-popia-support-access
  - scn-popia-rag-setup
  external_safe_claim: >-
    PrivateBox is designed to minimise vendor-side handling of customer personal information.
  business_models:
  - on-prem
  - ai-factory
  crosswalk: []

- id: popia-cond-3
  kind: condition
  native_id: Condition 3 (ss 13-14)
  group: chapter-3
  group_name: Conditions for lawful processing
  title: Purpose specification
  requirement: >-
    Personal information must be collected for a specific, explicitly defined and lawful purpose.
    Records must not be retained longer than necessary for the purpose, subject to limited statutory
    exceptions. On expiry of retention, records must be destroyed or de-identified in a manner that
    prevents reconstruction.
  auditor_intent: >-
    Regulator / auditor checks every dataset, log, cache, backup and exported report has a defined
    purpose and retention rule, and that destruction is verified.
  pb_interpretation: >-
    Define retention by data class; auto-deletion workflows; decommission wipe standard; backup
    retention logic; local cache expiry. Customer owns primary in-environment retention; PrivateBox
    owns vendor-side copies and guides customer retention defaults.
  owner: SH
  role_applicability:
    responsible_party: 'Y'
    operator: 'Y'
  documented_evidence:
  - Retention schedule per data class (logs, backups, support bundles, repositories)
  - Deletion SOP
  - Decommission checklist
  - Wipe certificates / proofs
  operational_evidence: >-
    Sample expired data shows deletion proof; backup retention configuration matches schedule.
  audit_methods:
  - Insp
  - Samp
  cadence: Annual schedule review + per change
  failure_modes: >-
    Forgotten support bundles; stale backups; persistent logs; backups outliving production.
  maturity_target: AR
  triggered_by_scenarios:
  - scn-popia-vendor-backup
  external_safe_claim: >-
    PrivateBox supports customer-defined retention and secure deletion processes for local deployments.
  business_models:
  - on-prem
  - ai-factory
  crosswalk: []

- id: popia-cond-4
  kind: condition
  native_id: Condition 4 (s 15)
  group: chapter-3
  group_name: Conditions for lawful processing
  title: Further processing limitation
  requirement: >-
    Further processing of personal information must be in accordance with, or compatible with, the
    purpose for which it was collected. Compatibility is assessed against the relationship between
    purposes, the nature of the information, the consequences of further processing, the manner of
    collection, and any contractual rights and obligations.
  auditor_intent: >-
    Regulator / auditor scrutinises whether vendor reuses customer data for analytics, model
    improvement, support training or demos without explicit lawful basis and customer agreement.
  pb_interpretation: >-
    Ban unapproved secondary use. Contract clause forbidding model training on customer data without
    explicit agreement; separate support data from product improvement data; approval workflow for
    any reuse. "De-identified if possible" is not a blanket excuse.
  owner: SH
  role_applicability:
    responsible_party: 'Y'
    operator: 'Y'
  documented_evidence:
  - DPA / operator agreement with reuse-prohibition clause
  - Internal reuse-approval workflow
  - Product analytics boundary documentation
  - Separation of support data from product improvement data
  operational_evidence: >-
    Sample vendor-side dataset traces show no customer data beyond support case scope.
  audit_methods:
  - Insp
  - Int
  cadence: Annual + per material change
  failure_modes: >-
    Using support data for product training; "operational analytics" becoming secondary use without
    review; treating "anonymised" as automatic permission.
  maturity_target: AR
  triggered_by_scenarios:
  - scn-popia-rag-setup
  - scn-popia-support-access
  external_safe_claim: >-
    PrivateBox does not assume any right to repurpose customer data beyond agreed services.
  business_models:
  - on-prem
  - ai-factory
  crosswalk: []

- id: popia-cond-5
  kind: condition
  native_id: Condition 5 (s 16)
  group: chapter-3
  group_name: Conditions for lawful processing
  title: Information quality
  requirement: >-
    The responsible party must take reasonably practicable steps to ensure that personal information
    is complete, accurate, not misleading and updated where necessary, having regard to the purpose
    for which it is collected or processed.
  auditor_intent: >-
    Regulator / auditor checks that ingested records, identity data, tickets, logs and customer-
    maintained knowledge bases have refresh and correction processes.
  pb_interpretation: >-
    For PrivateBox, this is mainly about imported records, identity data, tickets, logs and customer-
    maintained knowledge bases. Knowledge-base refresh process; metadata versioning; ticket correction
    process; customer guidance on stale or duplicated data.
  owner: SH
  role_applicability:
    responsible_party: 'Y'
    operator: 'Y'
  documented_evidence:
  - Data quality SOP
  - Ingestion rules
  - Version history
  - Refresh / correction workflow
  operational_evidence: >-
    Refresh logs; change history; source metadata visible in samples.
  audit_methods:
  - Insp
  - Samp
  cadence: Per dataset + annual review
  failure_modes: >-
    "Garbage in, garbage out" with no accountability; static knowledge bases that quietly age.
  maturity_target: AR
  external_safe_claim: >-
    PrivateBox supports controlled ingestion and versioned content updates to improve information
    quality.
  business_models:
  - on-prem
  - ai-factory
  crosswalk: []

- id: popia-cond-6
  kind: condition
  native_id: Condition 6 (ss 17-18)
  group: chapter-3
  group_name: Conditions for lawful processing
  title: Openness
  requirement: >-
    The responsible party must maintain the documentation of all processing operations under its
    responsibility (s 17) and must take reasonably practicable steps to ensure the data subject is
    aware of specified information at or as soon as reasonably practicable after collection (s 18 —
    purpose, source, voluntariness, consequences, law, recipients, transfer plans, rights).
  auditor_intent: >-
    Regulator / auditor checks both internal records (RoPA-equivalent) and outward-facing notices
    are maintained and reflect actual processing.
  pb_interpretation: >-
    Maintain documented processing inventory and notice set. Record all processing operations;
    maintain PrivateBox privacy notice; create customer deployment notice template; keep version
    control. Customer notices end-user processing; PrivateBox notices its own website, sales,
    support, telemetry and staff processing.
  owner: SH
  role_applicability:
    responsible_party: 'Y'
    operator: 'Y'
    information_officer: 'Y'
  documented_evidence:
  - Processing inventory (RoPA-style)
  - PrivateBox privacy notice (current version)
  - Marketing-specific notice
  - Customer deployment notice template
  - PAIA Manual
  - Notice version history
  operational_evidence: >-
    Published notices match actual data flows; version history shows refresh cadence.
  audit_methods:
  - Insp
  - Samp
  cadence: Annual + per material change
  failure_modes: >-
    Template notices that do not match reality; generic notices that omit telemetry or support flows;
    inventory and notices drift apart over time.
  maturity_target: AR
  triggered_by_scenarios:
  - scn-popia-telemetry
  - scn-popia-pb-corporate
  external_safe_claim: >-
    We document our processing and provide customers with deployment guidance to support POPIA
    transparency duties.
  business_models:
  - on-prem
  - ai-factory
  crosswalk: []

- id: popia-cond-7
  kind: condition
  native_id: Condition 7 (ss 19-22)
  group: chapter-3
  group_name: Conditions for lawful processing
  title: Security safeguards
  requirement: >-
    Secure the integrity and confidentiality of personal information by taking appropriate, reasonable
    technical and organisational measures (s 19). Operators must process personal information only
    with the responsible party's knowledge or authorisation, treat the information as confidential
    and be contractually bound to maintain s 19 security (s 20-21). Notify the Regulator and affected
    data subjects of security compromises as soon as reasonably possible; operators notify the
    responsible party immediately (s 22).
  auditor_intent: >-
    Regulator / auditor scrutinises both prevention (controls) and response (notification timeliness).
    Dis-Chem enforcement notice and Department of Basic Education infringement notice are visible
    indicators of Regulator priorities.
  pb_interpretation: >-
    This is the operational centre of POPIA for PrivateBox. Produce a complete security control
    baseline. MFA; strong password rules; PAM; audit logs; encryption where applicable; signing of
    updates; secure config baseline; vulnerability management; secure support access; regular review.
    Operator scenario: mandatory DPA with confidentiality + immediate-notification clauses;
    sub-processor flow-down. Section 22 dual-track: PB-as-operator notifies customer-as-RP
    immediately; customer has statutory notification duty to Regulator + data subjects.
  owner: SH
  role_applicability:
    responsible_party: 'Y'
    operator: 'Y'
    information_officer: 'Y'
  documented_evidence:
  - Security policy and hardening guide
  - Access control matrix; PAM / MFA configuration
  - Vulnerability management programme
  - Code-signing key management
  - Operator DPA template
  - IR plan with section 22 workflow
  - 15-day Art. 73 / 72-hour s 22 notification SOPs
  - Sub-processor register
  - Joint customer-vendor breach tabletop records
  operational_evidence: >-
    Pen-test reports; config reviews; access reviews; tabletop exercise records; past incidents trace
    through notification timelines.
  audit_methods:
  - Insp
  - Int
  - Samp
  - Obs
  cadence: Annual + per architecture change + per incident
  failure_modes: >-
    Stopping at "customer hosts it"; ad-hoc Slack/WhatsApp support and screen photos; weak admin
    controls (Dis-Chem pattern); shared admin passwords; "friendly support" with no operator contract;
    undeclared subprocessors; waiting for forensic certainty before s 22 notification.
  maturity_target: AR
  triggered_by_scenarios:
  - scn-popia-update-delivery
  - scn-popia-remote-admin
  - scn-popia-support-access
  - scn-popia-rag-setup
  - scn-popia-vendor-backup
  - scn-popia-offshore-support
  external_safe_claim: >-
    PrivateBox implements security and incident controls consistent with POPIA's safeguard
    requirements, with clear customer and vendor responsibilities.
  business_models:
  - on-prem
  - ai-factory
  crosswalk: []

- id: popia-cond-8
  kind: condition
  native_id: Condition 8 (ss 23-25)
  group: chapter-3
  group_name: Conditions for lawful processing
  title: Data subject participation
  requirement: >-
    A data subject has the right to request confirmation of whether personal information about them
    is held (s 23), to request access to that information (s 23-25 in the manner provided by PAIA),
    and to request correction or deletion of inaccurate or non-compliant information (s 24).
  auditor_intent: >-
    Regulator / auditor / buyer tests routing — does the right request get to the right party (vendor
    records vs deployment records), and does the response complete within reasonable time?
  pb_interpretation: >-
    Build rights-routing and support workflows. Rights matrix; customer-facing routing clause; admin
    tools to search / export / delete logs or support bundles; identity verification steps. Customer
    answers customer-data requests; PrivateBox answers requests about its own records and supports
    customer retrieval where contractually required.
  owner: SH
  role_applicability:
    responsible_party: 'Y'
    operator: 'Y'
    information_officer: 'Y'
  documented_evidence:
  - Rights SOP (access / correction / deletion / objection)
  - Rights routing matrix (vendor vs deployment data)
  - Identity verification procedure
  - Response templates
  - Case log
  operational_evidence: >-
    Sample rights request traces from intake to response; routing decisions documented.
  audit_methods:
  - Insp
  - Samp
  cadence: Continuous + annual SOP review
  failure_modes: >-
    Telling data subjects to contact "whoever" with no routing logic; no distinction between vendor
    records and customer records; no identity verification.
  maturity_target: AR
  external_safe_claim: >-
    PrivateBox provides documented request-routing and support processes to help customers address
    POPIA rights requests.
  business_models:
  - on-prem
  - ai-factory
  crosswalk: []

# ─────────────────────────────────────────────────────────────────────────────
# Strategic statutory sections outside the 8 conditions
# ─────────────────────────────────────────────────────────────────────────────

- id: popia-s-special-pi
  kind: section
  native_id: ss 26-33
  group: chapter-3
  group_name: Special personal information
  title: Special personal information
  requirement: >-
    Processing of special personal information — religious or philosophical beliefs, race or ethnic
    origin, trade union membership, political persuasion, health or sex life, biometric information,
    criminal behaviour — is generally prohibited unless a POPIA exception applies (consent, public
    interest, legal obligation, etc.).
  auditor_intent: >-
    Regulator / auditor scrutinises that special-PI processing has documented lawful basis, enhanced
    safeguards, and segregated controls. PrivateBox is sold into pharmacy / healthcare / HR contexts —
    high-likelihood deployment area.
  pb_interpretation: >-
    Treat special PI as an enhanced control class. Special-data classification scheme; stricter
    access controls; safe defaults for logs; no vendor training use; incident severity upgrade;
    contractual flags. Customer usually decides lawful basis; PrivateBox supports restricted access,
    segregation, auditability and no unauthorised reuse.
  owner: SH/CL
  role_applicability:
    responsible_party: 'Y'
    operator: 'Y'
  documented_evidence:
  - Special-data SOP / classification scheme
  - Use-case screening forms
  - Restricted-control configurations
  - Sector-specific deployment addenda
  operational_evidence: >-
    Pharmacy / healthcare / HR deployments show enhanced-control configurations and sign-off.
  audit_methods:
  - Insp
  - Samp
  cadence: Per deal screening + annual profile review
  failure_modes: >-
    Assuming health data is "safe" merely because hosted locally; treating "student data" as ordinary
    data; voice / image AI processed without recognising biometric category.
  maturity_target: AR
  external_safe_claim: >-
    PrivateBox supports higher-control deployments for environments handling special personal
    information.
  business_models:
  - on-prem
  - ai-factory
  crosswalk: []

- id: popia-s-children
  kind: section
  native_id: ss 34-35
  group: chapter-3
  group_name: Children's personal information
  title: Children's personal information
  requirement: >-
    Processing of personal information of children is generally prohibited unless a statutory
    exception applies (e.g., consent of competent person, necessity for legal proceedings, public
    interest). Re-use of legacy collection requires authorisation.
  auditor_intent: >-
    Regulator / auditor scrutinises whether child-data scenarios have explicit lawful basis and
    enhanced controls. Education and family-services deployments are key triggers.
  pb_interpretation: >-
    Add a children-data decision gate. Pre-sales screening for child-data use; parental / competent-
    person routing guidance; stricter data handling and support rules. No child-data deployment
    without explicit approval.
  owner: SH/CL
  role_applicability:
    responsible_party: 'Y'
    operator: 'Y'
  documented_evidence:
  - Use-case screening form (child-data)
  - Child-data deployment checklist
  - Parental / competent-person routing guidance
  operational_evidence: >-
    Education / youth-service deals show completed child-data screening and contract limiters.
  audit_methods:
  - Insp
  - Int
  cadence: Per deal screening
  failure_modes: >-
    Treating "student data" as ordinary data; using family or school data without recognising that
    children are included.
  maturity_target: AR
  external_safe_claim: >-
    Where clients intend to process children's information, PrivateBox applies additional scoping
    and control measures.
  business_models:
  - on-prem
  - ai-factory
  crosswalk: []

- id: popia-s-information-officer
  kind: section
  native_id: ss 55-56
  group: chapter-5
  group_name: Information Officer
  title: Information Officer designation, duties and registration
  requirement: >-
    The head of a private body is the Information Officer for POPIA purposes (s 55) and may delegate
    in writing. The Information Officer's duties include encouraging compliance, dealing with requests,
    cooperating with the Regulator, providing the Regulator with information, and additional duties
    set out in Regulation 4 (compliance framework, PIIA, PAIA Manual maintenance, internal measures,
    awareness). Registration of the Information Officer with the Information Regulator is required.
  auditor_intent: >-
    Regulator registration is publicly verifiable. Operating cadence (training, awareness, framework
    review, deputies) is the additional bar. Buyers verify both within minutes of asking.
  pb_interpretation: >-
    Make privacy governance visible and functioning. Register IO; designate deputies where needed;
    define RACI; maintain framework; annual review; internal awareness training. PrivateBox IO governs
    its own organisation; customer IO governs theirs; cross-engagement on incidents.
  owner: PB
  role_applicability:
    information_officer: 'Y'
    responsible_party: 'Y'
  documented_evidence:
  - IO appointment record
  - Information Regulator registration confirmation
  - Deputy IO appointments
  - PrivateBox compliance framework (Regulation 4)
  - Annual programme review records
  - Awareness training attendance
  operational_evidence: >-
    Public registration verifiable on Regulator portal; current training records; framework recently
    reviewed.
  audit_methods:
  - Insp
  - Int
  cadence: Annual + on org change
  failure_modes: >-
    Having a policy owner but no registered or active IO; named IO with no operating system around
    them; framework drafted but not used.
  maturity_target: AR
  triggered_by_scenarios:
  - scn-popia-pure-on-prem
  - scn-popia-remote-admin
  - scn-popia-pb-corporate
  external_safe_claim: >-
    PrivateBox maintains formal privacy governance and information officer responsibilities for its
    own operations.
  business_models:
  - on-prem
  - ai-factory
  crosswalk: []

- id: popia-s-prior-auth
  kind: section
  native_id: ss 57-58
  group: chapter-6
  group_name: Prior authorisation
  title: Prior authorisation triggers and procedure
  requirement: >-
    Prior authorisation by the Information Regulator is required for certain high-risk processing
    activities, including: processing unique identifiers for purposes other than originally specified
    in conjunction with another responsible party's processing; processing information on criminal
    behaviour or unlawful or objectionable conduct on behalf of third parties; processing for credit
    reporting; transferring special personal information or personal information of children to a
    third country that does not provide an adequate level of protection.
  auditor_intent: >-
    Regulator / auditor / buyer checks PrivateBox can identify prior-authorisation triggers in
    scoping and does not blithely assume "not our issue."
  pb_interpretation: >-
    Make prior-authorisation screening mandatory for high-risk deals. Pre-sales legal questionnaire;
    unique-identifier linking review; foreign support review; special-data transfer review. Customer
    generally applies as RP; PrivateBox identifies triggers and supports evidence.
  owner: SH
  role_applicability:
    responsible_party: 'Y'
    operator: 'Y'
  documented_evidence:
  - Pre-sales legal questionnaire
  - Prior-authorisation decision log
  - Deal review checklist
  - Trigger criteria definition
  operational_evidence: >-
    Sample regulated-sector opportunity shows completed screening and decision record.
  audit_methods:
  - Insp
  - Samp
  cadence: Per deal + annual screening review
  failure_modes: >-
    Missing trigger because nobody mapped optional support flows; treating "matching" as purely
    technical when unique-identifier linking is a statutory trigger.
  maturity_target: AR
  external_safe_claim: >-
    PrivateBox highlights scenarios that may require additional POPIA authorisation or customer
    legal review.
  business_models:
  - on-prem
  - ai-factory
  crosswalk: []

- id: popia-s-direct-marketing
  kind: section
  native_id: s 69
  group: chapter-8
  group_name: Direct marketing
  title: Direct marketing by means of unsolicited electronic communications
  requirement: >-
    Processing of personal information for the purpose of direct marketing by means of any form of
    electronic communication is prohibited unless the data subject has given consent or is a customer
    of the responsible party (subject to limited conditions). Each communication must include details
    of the sender and a means to opt out.
  auditor_intent: >-
    Regulator / auditor checks consent records, opt-out workflow and suppression list maintenance.
    Form 4 (objection form) readiness is the additional indicator.
  pb_interpretation: >-
    PrivateBox's own marketing operations are in scope. Obtain proper marketing consent; maintain
    opt-out; suppression list; Form 4 readiness. B2B is in scope (POPIA does not exempt B2B from s 69).
  owner: PB
  role_applicability:
    responsible_party: 'Y'
  documented_evidence:
  - Marketing consent records
  - Opt-out workflow / unsubscribe capability
  - Suppression list
  - Form 4 readiness
  operational_evidence: >-
    Sample CRM records show consent capture date and source; suppression list reconciles to opt-outs.
  audit_methods:
  - Insp
  - Samp
  cadence: Continuous
  failure_modes: >-
    Treating "POPIA does not affect B2B marketing" as a defence; informal opt-out without suppression
    list; missing consent date / source.
  maturity_target: AR
  triggered_by_scenarios:
  - scn-popia-pb-corporate
  external_safe_claim: >-
    Our own marketing practices are governed by consent and objection handling controls.
  business_models:
  - on-prem
  - ai-factory
  crosswalk: []

- id: popia-s-automated-decisions
  kind: section
  native_id: s 71
  group: chapter-8
  group_name: Automated decision-making
  title: Automated decision-making
  requirement: >-
    A data subject may not be subject to a decision which results in legal consequences for them, or
    which affects them substantially, that is based solely on the basis of automated processing of
    personal information intended to provide a profile of them — subject to specific exceptions
    (necessary for entering into / performance of a contract subject to safeguards; required by law).
    Where exception applies, suitable measures must safeguard the data subject's legitimate interests,
    including the opportunity to make representations.
  auditor_intent: >-
    Regulator / auditor / buyer scrutinises whether AI workflows make automated decisions that
    materially affect individuals. Healthcare diagnosis, credit scoring, hiring recommendations,
    legal advice are key triggers.
  pb_interpretation: >-
    Critical for legal / finance / healthcare sector deployments. Disable "fully autonomous
    adjudication" without human review support; document all such workflows; provide human-in-the-loop
    by default for consequential outputs. PB designs controls; customer owns final business decision.
    Section 71 ↔ EU AI Act Art. 22 (automated processing) + Art. 14 (human oversight) — single
    integrated approach recommended.
  owner: SH
  role_applicability:
    responsible_party: 'Y'
    operator: 'Y'
  documented_evidence:
  - Automated-decision use-case register
  - Human-in-the-loop design records per use case
  - Customer-facing scope disclosure on automated workflows
  - Representation / appeal pathway for affected data subjects
  operational_evidence: >-
    Sample customer deployment shows human review point; customer ack of automated-decision scope.
  audit_methods:
  - Insp
  - Int
  - Samp
  cadence: Per release + per deployment
  failure_modes: >-
    Saying "AI recommendation" and "automated decision" are obviously different without analysis;
    workflow that makes the AI determinative in practice while marketed as advisory.
  maturity_target: AR
  external_safe_claim: >-
    PrivateBox is designed to support customer-controlled decision processes with human-review
