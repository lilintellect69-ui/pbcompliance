- id: popia-s-cross-border
  kind: section
  native_id: s 72
  group: chapter-9
  group_name: Trans-border information flows
  title: Trans-border flows of personal information
  requirement: >-
    A responsible party may not transfer personal information about a data subject to a third party
    in a foreign country unless one of the following applies: the recipient is subject to law / binding
    corporate rules / binding agreement that provides adequate protection; the data subject consents
    to the transfer; the transfer is necessary for performance of a contract; the transfer is for the
    benefit of the data subject; or the transfer is necessary for legal proceedings.
  auditor_intent: >-
    Regulator / auditor / buyer scrutinises offshore support, cloud telemetry, hosted services. Even
    "temporary support access" by a foreign engineer is a transfer.
  pb_interpretation: >-
    Default local deployment strongly reduces transfer risk. Where transfers occur (offshore support,
    sub-processors, telemetry endpoints), maintain transfer register with adequacy / binding
    agreement / consent record per transfer. Cross-border-aware support routing; regional sub-processor
    selection; customer notice template for cross-border disclosures.
  owner: SH
  role_applicability:
    responsible_party: 'Y'
    operator: 'Y'
  documented_evidence:
  - Transfer register (per cross-border data flow)
  - Adequacy / binding agreement / consent record per transfer
  - Sub-processor list with country / safeguard
  - Customer cross-border notice template
  - Support geography disclosure
  operational_evidence: >-
    Each transfer has documented basis; sub-processor list reconciles to live deployments; support
    routing matches approved-country list.
  audit_methods:
  - Insp
  - Int
  - Samp
  cadence: Per change + annual review
  failure_modes: >-
    Assuming remote support access is not a transfer; "temporary" support by foreign engineer
    treated as ad-hoc rather than transfer; cloud telemetry routed through default offshore endpoint
    without disclosure.
  maturity_target: AR
  triggered_by_scenarios:
  - scn-popia-update-delivery
  - scn-popia-telemetry
  - scn-popia-vendor-backup
  - scn-popia-offshore-support
  external_safe_claim: >-
    Cross-border exposures, where present, are separately scoped and governed; the default local
    deployment minimises section 72 exposure.
  business_models:
  - on-prem
  - ai-factory
  crosswalk: []

- id: popia-s-enforcement
  kind: section
  native_id: ss 60-68, 89-109
  group: chapter-7-and-11
  group_name: Codes of conduct, enforcement, penalties
  title: Codes of conduct, enforcement and penalties
  requirement: >-
    POPIA empowers the Information Regulator to issue, monitor and enforce. Chapter 7 provides for
    sectoral Codes of Conduct that bind responsible parties in the sector. Chapter 10 sets out
    enforcement powers (assessments, enforcement notices, civil remedies). Chapter 11 sets out
    offences, penalties, and administrative fines (up to R10 million or 10 years imprisonment for
    serious offences).
  auditor_intent: >-
    Visible Regulator enforcement (Dis-Chem, Department of Basic Education) signals priorities and
    sets the bar for evidence quality. "Good intentions" does not satisfy enforcement.
  pb_interpretation: >-
    Build for inspectability. Keep complete evidence pack; maintain assessment-ready documentation;
    monitor sector codes; keep incident and rights logs. Marketing claims must lag evidence maturity,
    not lead it.
  owner: SH
  role_applicability:
    responsible_party: 'Y'
    operator: 'Y'
    information_officer: 'Y'
  documented_evidence:
  - Evidence index
  - Legal register
  - Control matrix
  - Sector code tracking
  - Internal audit / mock assessment records
  operational_evidence: >-
    Procurement and legal review can be answered from one evidence pack; mock assessment held
    annually.
  audit_methods:
  - Insp
  - Int
  cadence: Annual mock assessment + continuous evidence maintenance
  failure_modes: >-
    Marketing claims ahead of evidence maturity; treating Regulator enforcement as theoretical;
    sector codes ignored.
  maturity_target: AR
  external_safe_claim: >-
    PrivateBox maps its controls to POPIA requirements and maintains evidence to support customer
    due diligence and Regulator engagement.
  business_models:
  - on-prem
  - ai-factory
  crosswalk: []
