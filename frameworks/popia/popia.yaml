# Protection of Personal Information Act, 2013 (Act No. 4 of 2013) — PrivateBox alignment record (schema v2)
# Source-of-truth file for the GRC OS. Edits go in version control.
#
# Schema: see /docs/schema-v2.md
# PB-curated source pack: frameworks/popia/source/privatebox-popia-architecture-pack.md
#
# POPIA is the South African statutory baseline for personal-information processing. PB has dual posture:
# (1) RESPONSIBLE PARTY for PB's own corporate processing — website, CRM, billing, staff, marketing.
# (2) OPERATOR when processing customer personal information under contract — support, telemetry, managed services.
# Both postures generate distinct duties; this YAML captures both via role_applicability per requirement.
#
# Crosswalks: POPIA carries no outgoing crosswalks in v1 (foundational law). Other frameworks reference INTO POPIA.
# Retroactive edits to iso-42001.yaml, iso-27701.yaml and eu-ai-act.yaml add the incoming crosswalks.

schema_version: '2.0'
id: popia
version: '2013'
full_name: Protection of Personal Information Act, 2013 (Act No. 4 of 2013)
type: regulation
issuer: Republic of South Africa (Parliament)
audit_type: regulatory_inspection
certifiable: false
pb_interpretation_version: '1.0'
pb_interpretation_owner: null
pb_interpretation_last_reviewed: null
roles:
- responsible_party
- operator
- information_officer
tiers: []
effective_dates:
- milestone: POPIA full commencement (1-year transitional period ended)
  date: '2021-07-01'
  obligations: []

pb_application:
  why_chosen: >-
    POPIA is the binding South African statutory baseline for processing personal information. PrivateBox
    targets SA legal, finance and healthcare buyers as primary market — every procurement engagement asks
    about POPIA posture. Unlike ISO 42001 (alignment standard), POPIA is law: enforcement notices, fines
    and civil remedies are real and visible (Dis-Chem enforcement notice; Department of Basic Education
    infringement notice). PrivateBox carries dual POPIA roles — responsible party for its own corporate
    processing (website, CRM, billing, staff, marketing) and operator when handling customer personal
    information under contract (support, telemetry, managed services). On-prem architecture materially
    reduces operator-scenario exposure but does NOT remove POPIA duties; "on-prem = compliant" is a
    red-flag claim. PB's external position: "designed in alignment with POPIA, with explicit
    responsible-party / operator role allocation per deployment scenario."
  scope_decisions:
    on_prem:
      coverage: full
      rationale: >-
        PB's responsible-party duties for its own corporate processing apply regardless of customer
        deployment model. PB's operator duties activate per scenario (Table 3 in source pack): pure
        on-prem with no remote support has minimal operator exposure; on-prem with telemetry / support
        access / managed services creates operator scenarios with full ss 19-22 duties. Default
        contractual posture: customer is responsible party for in-environment processing; PB is operator
        only for explicitly-scoped service layers. The dual-role schedule is published as part of the
        Customer Shared-Responsibility Matrix.
    ai_factory:
      coverage: partial
      rationale: >-
        AI Factory ringfenced multi-tenant deployment in a partner DC introduces additional operator and
        sub-processor relationships. Cross-border concerns (s 72) activate if the partner DC is offshore.
        Until partner DC is selected (oq-partner-dc-selection), specific operator-chain documentation
        (s 21 sub-operator notification, s 22 incident notification flow, transfer register under s 72)
        is incomplete. AI Factory POPIA scope is provisional pending partner-DC decision.
  top_risks:
  - >-
    Misclassification of role — assuming "software vendor only / on-prem means out of scope" when
    optional services (telemetry, support access, backups, RAG ingestion assistance) make PB an operator
    under s 20-21. Documented role allocation per deployment scenario is the primary control.
  - >-
    Hidden secondary use of customer data for vendor analytics or model training (s 15). High-likelihood
    challenge from buyers. Mitigation: contractual prohibition + technical separation + no-vendor-training
    default in DPA.
  - >-
    Telemetry leakage of personal information (ss 9-12, 17-18, 19). Telemetry pipeline must have a
    field-level data dictionary, default-off for customer content, opt-in for operational metadata.
  - >-
    Standing or undocumented support access (s 20-21). Just-in-time, customer-approved, fully logged
    sessions are mandatory; ad-hoc access via Slack / WhatsApp / screen-photos is a finding pattern.
  - >-
    Late or partial breach notification (s 22). PB-as-operator must notify customer-as-responsible-party
    "immediately"; customer then has the s 22 statutory notification duty to Regulator + data subjects.
    Joint-response tabletop exercise is the maturity indicator.
  - >-
    Cross-border support transferring personal information offshore (s 72) without adequacy / binding
    agreements / consent. Even "temporary support access" by foreign engineer is a transfer.
  - >-
    Information Officer designated but not registered with the Regulator (s 55-56 + Regulation 4).
    Registration is a public filing; auditors and clients verify it. Active operating cadence (training,
    awareness, framework review) is the additional bar.
  - >-
    Special / children's data deployments (ss 26-35) without enhanced controls profile and lawful-basis
    documentation. Pharmacy / healthcare / education sectors are high-likelihood PB customer
    deployments — generic deployment templates fail in these sectors.

shared_responsibility_model:
- area: Responsible-party governance
  pb_owned: PB's own RP duties for corporate processing — website, CRM, billing, staff, marketing.
  cl_owned: Customer's RP duties for their AI use cases inside their environment.
  shared_note: Two parallel RP postures; one trust interface (DPA / MSA).
- area: Operator (processor) duties when PB processes customer data
  pb_owned: ss 20-21 operator duties — confidentiality, security same-as-RP, immediate breach notice to RP.
  cl_owned: RP-side oversight of PB-as-operator including DD and contractual flow-down.
  shared_note: Activates only for scenarios where PB sees / handles customer personal information.
- area: Information Officer
  pb_owned: PB designates and registers its own IO with the Information Regulator.
  cl_owned: Customer designates its own IO; routes data-subject requests via PB only when contractually agreed.
  shared_note: Two IOs — distinct legal duties, occasional cross-engagement on incidents.
- area: Privacy notices
  pb_owned: PrivateBox's own privacy notice, PAIA manual, marketing notice.
  cl_owned: Customer's deployment-specific notice to its end-users.
  shared_note: PB provides deployment-notice template inputs; customer adapts to its context.
- area: Security safeguards (s 19)
  pb_owned: Product hardening, signed updates, support-access controls, telemetry boundary, vendor-side stores.
  cl_owned: Environment-level security (network, physical, endpoint, identity).
  shared_note: PB ships a security baseline and minimum-spec sheet; customer operates above that baseline.
- area: Breach notification (s 22)
  pb_owned: PB-as-operator notifies customer-as-RP "immediately" on suspected unauthorised access.
  cl_owned: RP statutory notification duty to Regulator + data subjects (within "as soon as reasonably possible").
  shared_note: Joint IR plan + escalation contacts; tabletop exercise per year.
- area: Data subject rights (ss 23-25)
  pb_owned: PB-side records (PB website, billing, support tickets, marketing) — PB answers directly.
  cl_owned: Customer-side records (in-deployment data, conversations, RAG content) — customer answers.
  shared_note: PB tooling supports search / export / deletion; routing matrix in MSA.
- area: Telemetry / vendor-side metadata
  pb_owned: Telemetry pipeline; data dictionary; PII-free statement; opt-in / opt-out controls.
  cl_owned: Customer accepts / declines telemetry per opt-in; configures telemetry scope in product.
  shared_note: Telemetry crosses trust boundary — most-tested control by procurement.
- area: Support access
  pb_owned: Just-in-time access workflow; session recording; access reviews; deletion of copied artefacts.
  cl_owned: Per-session approval; incident-specific authorisation.
  shared_note: Standing access is forbidden — POPIA-relevant operator scenario.
- area: RAG / data ingestion
  pb_owned: Ingestion framework, quality gates, sensitive-data handling controls, ingestion SOP.
  cl_owned: Customer owns the corpus, content rights, end-of-life data handling.
  shared_note: PB advisory engagement may briefly process customer documents — operator scenario.
- area: Backup support
  pb_owned: Backup infrastructure (when vendor-managed) — encryption, location, retention, customer-managed keys.
  cl_owned: Customer authorises and configures backups; receives restore approval authority.
  shared_note: Backups are operator-scenario data flows; cross-border issue if backup location is offshore.
- area: Cross-border support / sub-processors
  pb_owned: Foreign-touchpoint review, transfer register, sub-processor list.
  cl_owned: Customer notice + consent for cross-border transfer where required.
  shared_note: Section 72 transfer rules apply; offshore engineer access is a transfer.
- area: Direct marketing (PB's own operations)
  pb_owned: Consent records; opt-out workflow; suppression lists.
  cl_owned: N/A (customer's marketing is customer's responsibility).
  shared_note: Section 69 applies to PB's B2B marketing.

evidence_families:
- id: governance_and_io
  name: Information Officer governance and PB privacy programme
  examples:
  - IO appointment + Regulator registration record
  - Deputy IO appointments (where applicable)
  - PrivateBox Compliance Framework (Regulation 4 duties)
  - Annual programme review
  - Training records
  why_auditor_cares: Without an active IO, POPIA accountability has no anchor; Regulator registration is publicly verifiable.
  cadence: Annual review + on org change
  typical_owner: PB
- id: notices_and_paia
  name: Privacy notices and PAIA materials
  examples:
  - PrivateBox privacy notice (website, customer-facing)
  - Marketing-specific notice / consent disclosure
  - Customer deployment notice template
  - PAIA Manual + access request forms
  - Notice version history
  why_auditor_cares: Section 18 collection notice obligations; PAIA manual is hygiene factor for buyers.
  cadence: Annual review + per material change
  typical_owner: PB
- id: dpa_and_operator_terms
  name: Data Processing Agreement / operator addenda
  examples:
  - PB Operator DPA template (s 20-21 covering)
  - Customer-specific DPAs / addenda
  - Sub-operator notifications and contractual flow-down
  - Support-access agreement / authorisation forms
  why_auditor_cares: Section 20-21 require written operator agreements; missing DPAs is a finding pattern.
  cadence: Per onboarding + annual review
  typical_owner: PB
- id: processing_inventory
  name: Processing inventory (RoPA-equivalent)
  examples:
  - PB processing register (RoPA-style)
  - Per-processing lawful-basis column
  - Source / collection method tagging
  - Cross-border / sub-processor map
  why_auditor_cares: Section 17 documentation of processing; RoPA-style inventories are common Regulator-request artefact.
  cadence: Quarterly review + per material change
  typical_owner: PB
- id: pia_and_riskassessment
  name: Personal Information Impact Assessment / privacy risk
  examples:
  - PIIA methodology (POPIA Regulation 4 duty)
  - Per-system PIIA records
  - Privacy risk register
  - Treatment plan
  why_auditor_cares: Regulation 4 duty for IO; PIIA evidences accountability.
  cadence: Annual + per material change
  typical_owner: PB
- id: rights_workflows
  name: Data subject rights handling
  examples:
  - Rights SOP (access / correction / deletion / objection)
  - Identity verification procedure
  - Routing matrix (vendor records vs deployment records)
  - Response templates
  - Case log
  why_auditor_cares: Sections 23-25 + PAIA interface; buyers test the workflow live.
  cadence: Continuous + annual SOP review
  typical_owner: PB
- id: security_baseline_and_admin
  name: Security baseline and administrative controls
  examples:
  - Security policy and hardening guide
  - Access control matrix; PAM / MFA configuration
  - Vulnerability management programme
  - Code-signing key management
  - Annual review records
  why_auditor_cares: Section 19; Dis-Chem case made admin-access controls a Regulator priority.
  cadence: Annual + per architecture change
  typical_owner: PB
- id: support_access
  name: Support access governance
  examples:
  - Support-Access SOP (just-in-time, customer-approved, recorded)
  - Bastion / session recording records
  - Access-approval workflow
  - Per-incident data-handling protocol
  why_auditor_cares: Section 20-21 operator scenario; standing access is a finding pattern.
  cadence: Annual SOP review + continuous operation
  typical_owner: PB-SH
- id: telemetry_governance
  name: Telemetry and vendor-side data governance
  examples:
  - Telemetry data dictionary
  - PII-free guarantee statement
  - Opt-in / opt-out controls
  - Telemetry sampling proof
  - Cross-border routing disclosure
  why_auditor_cares: Sections 9-12 minimisation + s 17-18 transparency + s 72 transfer rules.
  cadence: Annual SOP review + per change
  typical_owner: PB-SH
- id: incident_response
  name: Incident response and section 22 notification
  examples:
  - IR plan with severity tiers
  - Section 22 customer-notification template
  - Operator-to-RP "immediate" notification SOP
  - Regulator notification form pack (SCN1 readiness)
  - Tabletop exercise records
  why_auditor_cares: Section 22 has explicit timing; late notification is regulatory exposure.
  cadence: Annual exercise + per incident
  typical_owner: PB
- id: retention_and_deletion
  name: Retention schedules and deletion / decommission proof
  examples:
  - Retention schedule per data class (incl. logs, backups, support bundles)
  - Auto-expiry configuration
  - Decommission / wipe SOP
  - Wipe / destruction certificates
  why_auditor_cares: Section 14 retention + s 19 destruction discipline; orphan support copies are a finding pattern.
  cadence: Per change + annual schedule review
  typical_owner: PB-SH
- id: special_data_profile
  name: Special PI / children deployment profile
  examples:
  - Special-data classification scheme
  - Use-case screening forms (health / biometric / criminal / children)
  - Restricted-control configurations
  - Sector-specific deployment addenda (pharmacy, healthcare, education)
  why_auditor_cares: Sections 26-35; sector deployments are high-stakes customer engagements.
  cadence: Per deal screening + annual profile review
  typical_owner: PB
- id: marketing_consent
  name: Direct marketing consent and objection records
  examples:
  - Marketing consent records
  - Opt-out / objection workflow
  - Suppression list
  - Form 4 (objection form) readiness
  why_auditor_cares: Section 69 governs PB's own B2B marketing; consent records are sampled.
  cadence: Continuous
  typical_owner: PB
- id: cross_border_register
  name: Cross-border transfer register and sub-processor disclosures
  examples:
  - Transfer register (per cross-border data flow)
  - Adequacy / binding agreement / consent record per transfer
  - Sub-processor list with country / safeguard
  - Customer cross-border notice template
  why_auditor_cares: Section 72; offshore support / cloud telemetry / hosted services trigger this.
  cadence: Per change + annual review
  typical_owner: PB
- id: trust_pack_and_external_claims
  name: Trust Pack language and external claims register
  examples:
  - Trust-Pack Language Guide (per source pack Table 8)
  - Public Trust Centre POPIA section
  - Procurement-response boilerplates
  - External-claims register with evidence pointers
  why_auditor_cares: Overclaim creates separate exposure under POPIA + consumer protection.
  cadence: Quarterly review + per material event
  typical_owner: PB

scenarios:
- id: scn-popia-pure-on-prem
  name: Pure on-prem deployment, no remote support, no telemetry
  framework_specific_id: PB-Deploy-1
  description: >-
    Customer runs PrivateBox entirely within its own infrastructure with no PB telemetry, support
    access or remote operations. PB's POPIA exposure is limited to its own corporate records (no
    customer personal information processed by PB).
  applies_to_business_models: [on-prem]
  pb_role: out-of-scope
  customer_role: responsible_party
  triggered_requirements:
  - requirement_id: popia-cond-1
    scenario_specific_note: Customer carries full RP accountability; PB documents non-processing posture.
  - requirement_id: popia-s-information-officer
    scenario_specific_note: PB IO governs its own records; customer IO governs deployment.
  notes: Lowest PB POPIA exposure; documentation rigour the primary control.
- id: scn-popia-update-delivery
  name: On-prem with signed offline / pull-only updates
  framework_specific_id: PB-Deploy-2
  description: >-
    PB delivers updates with cryptographic signing and SBOM; customer pulls on schedule. PB does not
    receive customer personal information through the update channel.
  applies_to_business_models: [on-prem, ai-factory]
  pb_role: out-of-scope-for-customer-data
  customer_role: responsible_party
  triggered_requirements:
  - requirement_id: popia-cond-7
    scenario_specific_note: Update integrity is a security safeguard control PB owns.
  - requirement_id: popia-s-cross-border
    scenario_specific_note: Update repository hosting location may be cross-border; disclosed in transfer register.
  notes: Update channel itself rarely processes PI but supply chain integrity is in scope.
- id: scn-popia-remote-admin
  name: On-prem with remote admin
  framework_specific_id: PB-Deploy-3
  description: >-
    PB engineers can perform remote administration of customer environment. Engineering personnel
    can affect means of processing and may see personal information during admin tasks.
  applies_to_business_models: [on-prem, ai-factory]
  pb_role: operator
  customer_role: responsible_party
  triggered_requirements:
  - requirement_id: popia-cond-7
    scenario_specific_note: Just-in-time access; session logging; MFA; operator confidentiality.
  - requirement_id: popia-s-information-officer
    scenario_specific_note: IO involvement on incidents.
  notes: Operator scenario; DPA / operator addendum mandatory.
- id: scn-popia-telemetry
  name: On-prem with operational telemetry
  framework_specific_id: PB-Deploy-4
  description: >-
    Telemetry pipeline returns operational metadata to PB. May contain identifiers, user IDs, device
    data or usage traces depending on design. PB may be operator OR independent responsible party for
    the telemetry stream.
  applies_to_business_models: [on-prem, ai-factory]
  pb_role: operator-or-rp
  customer_role: responsible_party
  triggered_requirements:
  - requirement_id: popia-cond-2
    scenario_specific_note: Minimisation — telemetry must collect only what's needed.
  - requirement_id: popia-cond-6
    scenario_specific_note: Telemetry must be in privacy notice / data dictionary.
  - requirement_id: popia-s-cross-border
    scenario_specific_note: Telemetry endpoint location is cross-border concern.
  notes: Hidden monitoring becomes notice + transfer problem; opt-in + data dictionary controls.
- id: scn-popia-support-access
  name: Support-access troubleshooting using live customer prompts or documents
  framework_specific_id: PB-Deploy-5
  description: >-
    PB engineers gain time-bounded access to customer environment for troubleshooting. May see live
    prompts, documents, or customer data.
  applies_to_business_models: [on-prem, ai-factory]
  pb_role: operator
  customer_role: responsible_party
  triggered_requirements:
  - requirement_id: popia-cond-7
    scenario_specific_note: ss 20-21 operator confidentiality + s 22 immediate notification on incident.
  - requirement_id: popia-cond-2
    scenario_specific_note: Local redaction; support-bundle expiry; minimisation.
  notes: Strongest operator scenario; per-session authorisation + recording mandatory.
- id: scn-popia-rag-setup
  name: Managed RAG / document-ingestion assistance
  framework_specific_id: PB-Deploy-6
  description: >-
    PB advises customer on RAG corpus structure, ingestion pipeline. May stage / inspect / transform
    documents during implementation. Customer owns content rights and PI decisions.
  applies_to_business_models: [on-prem, ai-factory]
  pb_role: operator
  customer_role: responsible_party
  triggered_requirements:
  - requirement_id: popia-cond-7
    scenario_specific_note: Staging restrictions; secure deletion of staging copies.
  - requirement_id: popia-cond-4
    scenario_specific_note: No reuse of staged documents for analytics or model training.
  notes: SOW + DPA + secure deletion confirmation. "Implementation services" can become ungoverned processing.
- id: scn-popia-update-repo
  name: Hosted update repository / model package distribution
  framework_specific_id: PB-Deploy-7
  description: >-
    PB serves software supply chain — signed updates, model packages, SBOMs, vulnerability disclosure.
    Repository may collect subscriber / admin metadata.
  applies_to_business_models: [on-prem, ai-factory]
  pb_role: responsible_party-for-own-records
  customer_role: responsible_party
  triggered_requirements:
  - requirement_id: popia-cond-2
    scenario_specific_note: Repository metadata minimisation.
  - requirement_id: popia-cond-7
    scenario_specific_note: Repository security baseline; abuse monitoring.
  notes: Vendor-operated; PB is RP for its own repository operations.
- id: scn-popia-vendor-backup
  name: Vendor-run backup support involving customer data copy
  framework_specific_id: PB-Deploy-8
  description: >-
    PB provides backup infrastructure that stores customer personal information.
  applies_to_business_models: [on-prem, ai-factory]
  pb_role: operator
  customer_role: responsible_party
  triggered_requirements:
  - requirement_id: popia-cond-7
    scenario_specific_note: Backup encryption; customer-managed keys; restore authority.
  - requirement_id: popia-s-cross-border
    scenario_specific_note: Backup location may be cross-border; s 72 applies.
  - requirement_id: popia-cond-3
    scenario_specific_note: Backup retention bound by customer's primary retention policy.
  notes: Strong DPA + sub-processor terms; cross-border-aware deployment.
- id: scn-popia-offshore-support
  name: Offshore support engineer accesses incident data
  framework_specific_id: PB-Deploy-9
  description: >-
    Foreign engineer accesses customer environment / incident data during support. Transfer of
    personal information across jurisdiction.
  applies_to_business_models: [on-prem, ai-factory]
  pb_role: operator
  customer_role: responsible_party
  triggered_requirements:
  - requirement_id: popia-s-cross-border
    scenario_specific_note: s 72 transfer rules; adequacy / binding agreement / consent required.
  - requirement_id: popia-cond-7
    scenario_specific_note: Operator + cross-border-aware support.
  - requirement_id: popia-s-prior-auth
    scenario_specific_note: Foreign transfer of special / children PI may need prior authorisation.
  notes: '"Temporary" support is still a transfer; regional support routing is the control.'
- id: scn-popia-pb-corporate
  name: PrivateBox website, CRM, bids, billing, staff data (PB's own corporate processing)
  framework_specific_id: PB-Deploy-10
  description: >-
    PrivateBox's own corporate processing of personal information — customer prospects, account
    contacts, billing data, employees, marketing.
  applies_to_business_models: [on-prem, ai-factory]
  pb_role: responsible_party
  customer_role: not-applicable
  triggered_requirements:
  - requirement_id: popia-cond-1
    scenario_specific_note: PB-as-RP accountability for own processing.
  - requirement_id: popia-cond-6
    scenario_specific_note: PB privacy notice + PAIA manual.
  - requirement_id: popia-s-direct-marketing
    scenario_specific_note: PB B2B marketing consent + objection workflow.
  - requirement_id: popia-s-information-officer
    scenario_specific_note: PB IO governs this processing.
  notes: Easy to overlook while focused on product; PB is fully accountable as RP.

open_questions:
- id: oq-popia-io-registration
  question: Is PrivateBox's Information Officer designated and registered with the Information Regulator?
  candidate_answers:
  - Designated and registered (current state should be verified)
  - Designated, registration pending
  - Not yet designated
  decision_owner: Top Management + AI Governance Lead (potentially same as IO)
  decision_status: pending
  blocks_requirements:
  - popia-s-information-officer
  blocks_scenarios: []
  notes: >-
    Section 55 requires designation; Section 56 + Regulation 4 set out the duties. Registration with
    the Information Regulator is a public filing — buyers verify it. Active operating cadence (training,
    awareness, framework review) is the additional bar.
  created: '2026-05-10'
  resolved_value: null
  resolved_at: null
