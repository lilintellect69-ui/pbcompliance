- id: eu-ai-act-art-73
  kind: article
  native_id: Article 73
  group: Articles
  group_name: EU AI Act Articles
  title: Serious-Incident Reporting (high-risk)
  requirement: 'Providers of high-risk systems must report serious incidents to market surveillance authorities
    of the Member State where the incident occurred. Timing: immediately and at most 15 days after the
    provider becomes aware of the serious incident or of the causal link; 2 days for widespread infringement
    or serious malfunction of critical infrastructure; 10 days for incidents resulting in death.'
  pb_interpretation: Conditional on high-risk status. Decision tree with the four timing buckets is a
    small but critical artifact; failure of timing is visible non-compliance. PB drills the decision tree
    annually even outside high-risk scope.
  owner: PB/SH
  applies: C
  applies_rationale: Binding for high-risk; deployer also reports under Art 26(5).
  tier: high-risk
  triggered_by_scenarios:
  - scn-eu-e
  - scn-eu-f
  - scn-eu-g
  documented_evidence:
  - Serious-incident decision tree
  - Communication templates per timing bucket
  - Liaison list per Member State market surveillance authority
  operational_evidence: Run a tabletop exercise; verify timing decisions match the four buckets (2/10/15
    days, plus 'immediately').
  audit_methods:
  - Insp
  - Int
  cadence: Per incident + annual drill
  pitfall: Confusing the timing buckets. Treating 'serious malfunction' too narrowly.
  maturity_target: AR
  external_safe_claim: PrivateBox maintains a serious-incident decision tree and reporting playbook aligned
    with the timing requirements of Article 73 of the EU AI Act for any high-risk variant.
  crosswalk:
  - framework: iso-27001
    refs:
    - iso-27001-a-5.24
    note: >-
      Incident management planning — Art 73 has stricter timing
  - framework: iso-27001
