  - Obs
  cadence: Per release
  pitfall: Treating oversight as a UX afterthought rather than a core design requirement. Oversight that
    depends on monitoring volumes a human cannot realistically sustain.
  maturity_target: AR
  external_safe_claim: PrivateBox provides human-oversight controls — including override paths, intervention,
    and interruption — designed into the product to support Article 14 of the EU AI Act.
