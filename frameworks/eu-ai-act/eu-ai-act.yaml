scenarios:
- id: scn-eu-a
  name: Pure on-prem enterprise chat assistant, customer-supplied data only
  framework_specific_id: Scenario A
  description: PrivateBox runs locally inside customer's environment. Customer's employees use it for
    general drafting, Q&A, summarisation. No third-party model invoked over the internet at runtime. No
    customer data leaves the customer environment.
  applies_to_business_models:
  - on-prem
  pb_role: provider
  customer_role: deployer
  risk_tier: minimal
  legal_basis: Art 2(1)(a)–(b); Art 3(1) AI system definition; Commission Guidelines on AI System Definition
    (Feb 2025).
  on_prem_note: On-prem deployment does not change 'placing on the market' / 'putting into service'. Act
    applies.
  shared_responsibility: 'PrivateBox: Art 4 literacy, Art 5 prohibited-use screening, AI system documentation,
    Art 50 transparency by design. Customer: deployer-side Art 4 literacy, lawful use, workplace consultation
    if applicable.'
  common_misclassification: Believing 'on-prem means out of scope'. Wrong.
  sales_safe_wording: PrivateBox is an AI system within the meaning of Article 3(1) of the EU AI Act and
    is placed on the market in the EU when delivered to EU customers, regardless of the on-prem deployment
    topology.
  triggered_requirements:
  - requirement_id: eu-ai-act-art-2
    scenario_specific_note: Putting into service in the EU.
  - requirement_id: eu-ai-act-art-4
    scenario_specific_note: Both PB and customer have AI literacy duty.
  - requirement_id: eu-ai-act-art-5
    scenario_specific_note: Prohibited-use screening at customer onboarding.
  - requirement_id: eu-ai-act-art-50
    scenario_specific_note: Persistent disclosure that user is interacting with AI.
- id: scn-eu-b
  name: On-prem enterprise search / RAG over customer documents
  framework_specific_id: Scenario B
  description: Same as A but with retrieval-augmented generation over customer's own documents. Customer
    corpus stays local; no internet retrieval.
  applies_to_business_models:
  - on-prem
  pb_role: provider
  customer_role: deployer
  risk_tier: minimal
  legal_basis: Art 2(1)(a)–(b); Art 3(1).
  on_prem_note: Same as A — RAG over local corpus does not change scope or topology analysis.
  shared_responsibility: 'PrivateBox: same as A plus document-source citation, retrieval guardrails. Customer:
    same as A plus corpus quality (Art 16 deployer''s input-data appropriateness duty applies if high-risk
    variant).'
  common_misclassification: Treating RAG as 'just search' — outputs are still AI generation under Art
    50(2).
  sales_safe_wording: PrivateBox supports retrieval-augmented generation over customer-supplied documents
    within the customer environment, with citations preserved at point of use.
  triggered_requirements:
  - requirement_id: eu-ai-act-art-2
    scenario_specific_note: Same as A.
  - requirement_id: eu-ai-act-art-4
    scenario_specific_note: Same as A.
  - requirement_id: eu-ai-act-art-5
    scenario_specific_note: Same as A.
  - requirement_id: eu-ai-act-art-50
    scenario_specific_note: Same as A; output marking applies to generated summaries.
- id: scn-eu-c
  name: PrivateBox embeds a third-party GPAI model unmodified
  framework_specific_id: Scenario C
  description: PrivateBox bundles an unmodified third-party GPAI model (e.g., Llama, Mistral) as the runtime
    LLM. Model is shipped to customer environment via the PrivateBox installer.
  applies_to_business_models:
  - on-prem
  - ai-factory
  pb_role: provider
  customer_role: deployer
  risk_tier: gpai
  legal_basis: Art 2; Art 3(63) GPAI model definition; Art 53 GPAI provider documentation; Art 25(4) supplier
    agreements.
  on_prem_note: Topology irrelevant — GPAI obligations attach to model layer.
  shared_responsibility: 'PrivateBox: due diligence on upstream GPAI provider, preserve Annex XII downstream
    documentation, pass through to customer, do not strip provenance. Upstream GPAI provider: Art 53 documentation
    duties (their problem, not PB''s). Customer: deployer duties.'
  common_misclassification: Confusing GPAI **model** obligations with GPAI **system** obligations. PB
    ships a system; the model is upstream.
  sales_safe_wording: PrivateBox documents the third-party general-purpose AI models it integrates and
    preserves the downstream documentation those providers supply under Article 53.
  triggered_requirements:
  - requirement_id: eu-ai-act-art-3
    scenario_specific_note: Confirm model is GPAI under Art 3(63) (≥10²³ FLOP + generative).
  - requirement_id: eu-ai-act-art-53
    scenario_specific_note: 'Pass-through duty: preserve and forward Annex XII docs.'
  - requirement_id: eu-ai-act-art-25
    scenario_specific_note: Art 25(4) written-agreement template for upstream supplier.
- id: scn-eu-d
  name: PrivateBox fine-tunes / substantially modifies a model and ships modified weights
  framework_specific_id: Scenario D
  description: PrivateBox takes a base GPAI model, fine-tunes or substantially modifies it, and ships
    the modified model as part of the platform.
  applies_to_business_models:
  - on-prem
  - ai-factory
  pb_role: provider
  customer_role: deployer
  risk_tier: gpai
  legal_basis: Art 25(1)(b) substantial modification; Art 53 (own GPAI duties for modifications); Annex
    XI, XII; Commission GPAI Guidelines (Jul 2025) one-third compute threshold.
  on_prem_note: Irrelevant to model-layer obligations.
  shared_responsibility: 'PrivateBox: documentation of fine-tune dataset, copyright policy for fine-tune
    data, training-data summary covering the fine-tune, evaluation results, intended purpose; decide whether
    to sign GPAI Code of Practice. Customer: deployer obligations.'
  common_misclassification: Assuming 'we just fine-tuned' means 'we have no GPAI duties'. Threshold is
    one-third of compute used to train base.
  sales_safe_wording: PrivateBox-modified models are accompanied by documentation describing the modifications,
    the data used for fine-tuning, and a copyright policy applicable to those modifications.
  triggered_requirements:
  - requirement_id: eu-ai-act-art-25
    scenario_specific_note: Art 25(1)(b) substantial modification triggers GPAI provider role.
  - requirement_id: eu-ai-act-art-53
    scenario_specific_note: Annex XI internal docs + Annex XII downstream pack + copyright policy + training-data
      summary, all specific to the fine-tune.
  - requirement_id: eu-ai-act-art-54
    scenario_specific_note: AR required if PB is non-EU and triggers GPAI provider role.
  - requirement_id: eu-ai-act-art-56
    scenario_specific_note: Decide whether to sign GPAI CoP.
- id: scn-eu-e
  name: Customer uses PrivateBox to build an HR screening / ranking tool
  framework_specific_id: Scenario E
  description: Customer uses PrivateBox to ingest CVs and produce candidate rankings, sift, scoring, or
    interview questions personalised to candidates.
  applies_to_business_models:
  - on-prem
  - ai-factory
  pb_role: provider
  customer_role: provider
  risk_tier: high-risk
  legal_basis: Annex III(4)(a)–(b) recruitment/selection; Art 6(2); Art 6(3) profiling carve-out unavailable;
    Art 25(1)(c) role-flip.
  on_prem_note: On-prem does not lower the risk class.
  shared_responsibility: 'PrivateBox: clear instructions stating the system is **not intended** for high-risk
    Annex III use without further deployer assessment; technical preconditions (logging, oversight) for
    high-risk operation; pass-through GPAI documentation. Customer: full Article 9-15 compliance, Art
    49 registration, Art 27 FRIA, Art 26(7) worker information.'
  common_misclassification: Letting the customer slip into Annex III use without acknowledging it; PB
    pulled into Art 25(1)(c) provider status because a salesperson said 'yes you can use it for that'.
  sales_safe_wording: PrivateBox is not intended to be used as a high-risk AI system under Annex III of
    the EU AI Act, including for HR screening, ranking, or selection. Customers who choose to operate
    PrivateBox in such a use case become providers of a high-risk AI system under Article 25(1)(c) and
    must independently meet the obligations in Articles 9-15, 16, 26, 27, and 49.
  triggered_requirements:
  - requirement_id: eu-ai-act-art-6
    scenario_specific_note: Annex III(4) classification.
  - requirement_id: eu-ai-act-art-25
    scenario_specific_note: 'Art 25(1)(c) role-flip: customer becomes provider of high-risk system.'
  - requirement_id: eu-ai-act-art-26
    scenario_specific_note: Customer-side deployer duties.
  - requirement_id: eu-ai-act-art-27
    scenario_specific_note: FRIA required.
  - requirement_id: eu-ai-act-art-49
    scenario_specific_note: Customer registers in EU database.
- id: scn-eu-f
  name: Customer uses PrivateBox for credit scoring / insurance pricing decisions
  framework_specific_id: Scenario F
  description: Customer (bank or insurer) uses PrivateBox to support creditworthiness decisions or pricing
    of life/health insurance for natural persons.
  applies_to_business_models:
  - on-prem
  - ai-factory
  pb_role: provider
  customer_role: provider
  risk_tier: high-risk
  legal_basis: Annex III(5)(b)/(c) creditworthiness, life/health insurance pricing; Art 25(1)(c); DORA
    in parallel.
  on_prem_note: Reduces sub-processor and DORA-third-party risks but does not lower AI Act class.
  shared_responsibility: 'PrivateBox: instructions excluding such use without sign-off; logging hooks;
    deployer oversight tooling. Customer: full provider obligations, FRIA (financial actors listed in
    Art 27), registration.'
  common_misclassification: Same as E. Customer may try to claim 'fraud detection' carve-out incorrectly
    — narrow.
  sales_safe_wording: PrivateBox is not intended to be used to evaluate the creditworthiness of natural
    persons or to assess risk and price life or health insurance. Customers who use PrivateBox for those
    purposes assume provider obligations for a high-risk AI system.
  triggered_requirements:
  - requirement_id: eu-ai-act-art-6
    scenario_specific_note: Annex III(5)(b)/(c).
  - requirement_id: eu-ai-act-art-25
    scenario_specific_note: Role-flip same as E.
  - requirement_id: eu-ai-act-art-27
    scenario_specific_note: FRIA required for financial actors.
- id: scn-eu-g
  name: Healthcare / medical decision support
  framework_specific_id: Scenario G
  description: Customer (hospital, clinic, pharma) uses PrivateBox for clinical decision support, triage,
    or patient-facing chat.
  applies_to_business_models:
  - on-prem
  - ai-factory
  pb_role: provider
  customer_role: deployer
  risk_tier: high-risk
  legal_basis: Art 6(1) + Annex I (MDR/IVDR safety components); Annex III(5)(d) eligibility for essential
    public services.
  on_prem_note: Reduces patient-data exposure. Does not by itself lower risk class.
  shared_responsibility: 'PrivateBox: written instructions for use, AUP excluding medical-device incorporation
    absent contractual route, logging hooks. Customer: clinical validation, MDR/IVDR conformity if applicable.
    Note Art 25(3): if customer integrates into a regulated medical device, the device manufacturer becomes
    the provider of the AI system.'
  common_misclassification: Underestimating MDR/IVDR overlap. Treating 'administrative' hospital tools
    as not high-risk when in fact they touch eligibility decisions.
  sales_safe_wording: PrivateBox is not a medical device and is not intended to be a safety component
    of any product subject to EU medical-device legislation. Use cases requiring conformity under MDR/IVDR
    or under Annex III(5)(d) require a separate scoping discussion.
  triggered_requirements:
  - requirement_id: eu-ai-act-art-6
    scenario_specific_note: Annex I + Annex III(5)(d).
  - requirement_id: eu-ai-act-art-25
    scenario_specific_note: Art 25(3) device-manufacturer-as-provider rule.
  - requirement_id: eu-ai-act-art-27
    scenario_specific_note: FRIA where public-sector patient services.
- id: scn-eu-h
  name: Public-facing chatbot / customer-service assistant
  framework_specific_id: Scenario H
  description: PrivateBox is exposed to end-users (customers, citizens) as a chatbot or assistant.
  applies_to_business_models:
  - on-prem
  - ai-factory
  pb_role: provider
  customer_role: deployer
  risk_tier: limited
  legal_basis: Art 50(1) provider duty; Art 50(2) synthetic-output marking; Art 50(4) deepfake/public-interest
    text (deployer side).
  on_prem_note: 'Irrelevant to Art 50: duty travels with system and deployer''s use, not hosting model.'
  shared_responsibility: 'PrivateBox: in-product disclosure UI; machine-readable marking of generated
    outputs; persistent disclosure surface; technical guidance for deployer. Customer: deepfake labelling
    (Art 50(4)); ensuring users informed at first interaction (Art 50(5)).'
  common_misclassification: Treating 'obvious it's AI' as universal carve-out — burden of proof is on
    the provider.
  sales_safe_wording: PrivateBox surfaces a clear and persistent indication that users are interacting
    with an AI system, and where it generates synthetic content, marks outputs in a machine-readable format.
    The product is designed in alignment with Article 50, applicable from 2 August 2026.
  triggered_requirements:
  - requirement_id: eu-ai-act-art-50
    scenario_specific_note: Art 50(1) provider duty + Art 50(2) marking.
- id: scn-eu-i
  name: Content generation / synthetic media features
  framework_specific_id: Scenario I
  description: PrivateBox produces drafts, summaries, images, audio, or video.
  applies_to_business_models:
  - on-prem
  - ai-factory
  pb_role: provider
  customer_role: deployer
  risk_tier: limited
  legal_basis: Art 50(2) machine-readable marking; Art 50(4) deepfakes/public-interest text; Code of Practice
    on Marking and Labelling (voluntary).
  on_prem_note: Marking duty applies regardless of hosting topology.
  shared_responsibility: 'PrivateBox: marking pipeline (metadata, watermark, fingerprint depending on
    modality); provenance preservation; configurable export-time options. Customer: deepfake labelling
    at publication; editorial review for public-interest text.'
  common_misclassification: Stripping upstream provenance metadata. Skipping marking for 'low-risk' modalities.
    Misusing the assistive-editing carve-out.
  sales_safe_wording: PrivateBox marks AI-generated outputs in a machine-readable manner, in line with
    Article 50(2) of the EU AI Act and the technical approach reflected in the European Commission's draft
    Code of Practice on marking and labelling of AI-generated content (currently voluntary).
  triggered_requirements:
  - requirement_id: eu-ai-act-art-50
    scenario_specific_note: Art 50(2) provider duty for synthetic outputs.
- id: scn-eu-j
  name: PrivateBox-hosted model packaging / update delivery
  framework_specific_id: Scenario J
  description: 'PrivateBox ships periodic updates: model upgrades, fine-tunes, security patches, prompt-template
    changes. Updates are pushed (with customer consent) over a managed channel.'
  applies_to_business_models:
  - on-prem
  - ai-factory
  pb_role: provider
  customer_role: deployer
  risk_tier: minimal
  legal_basis: Art 16 provider obligations; Art 18 record-keeping; Art 20 corrective actions; Art 72 post-market
    monitoring.
  on_prem_note: 'On-prem update channels often use signed packages and outbound-only fetch — *reduces*
    attack surface but creates evidence requirement: integrity, provenance, change-control traceability.'
  shared_responsibility: 'PrivateBox: change-control pipeline, signed releases, release notes describing
    AI-functional changes, regression tests, rollback. Customer: receive, test, deploy, log.'
  common_misclassification: Silent 'improvement' pushes that change behaviour without notice. Treating
    prompt-template changes as not material.
  sales_safe_wording: PrivateBox uses a controlled, signed update channel. Each release includes versioned
    release notes that describe AI-functional changes, supporting deployer-side change-control and post-market
    obligations under Article 72 of the AI Act where applicable.
  triggered_requirements:
  - requirement_id: eu-ai-act-art-72
    scenario_specific_note: Update channel is part of post-market monitoring.
- id: scn-eu-k
  name: Remote support / temporary access by PrivateBox personnel
  framework_specific_id: Scenario K
  description: A PrivateBox engineer remotely accesses a customer's environment to diagnose. Access may
    include logs, prompts, outputs, system parameters.
  applies_to_business_models:
  - on-prem
  - ai-factory
  pb_role: provider
  customer_role: deployer
  risk_tier: minimal
  legal_basis: Art 4 (literacy for support staff); Art 20 (corrective actions); Art 21 (cooperation with
    authorities); Art 72 (post-market monitoring); GDPR Art 28.
  on_prem_note: Strongest selling point of on-prem is undermined if support access is broad and routine.
    Build narrow, audited, time-limited, customer-initiated access.
  shared_responsibility: 'PrivateBox: support access is opt-in, just-in-time, logged, scoped, masked-by-default
    for prompts/outputs; AI literacy training for support staff; DPA with customer. Customer: approves
    each session; reviews logs.'
  common_misclassification: '''Support staff are background contractors so AI literacy doesn''t apply''
    — wrong; Art 4 covers persons dealing with operation/use on behalf. Allowing standing access.'
  sales_safe_wording: Remote support access to a PrivateBox deployment is opt-in, time-bounded, customer-initiated,
    and audit-logged. PrivateBox personnel involved in supporting the system receive AI literacy training
    in line with Article 4.
  triggered_requirements:
  - requirement_id: eu-ai-act-art-4
    scenario_specific_note: Support staff in scope of literacy duty.
  - requirement_id: eu-ai-act-art-72
    scenario_specific_note: Support data feeds PMM; preserve evidence.
- id: scn-eu-l
  name: Optional cloud telemetry / monitoring
  framework_specific_id: Scenario L
  description: Customer enables anonymous telemetry / health monitoring that streams metadata to PrivateBox-hosted
    services.
  applies_to_business_models:
  - on-prem
  - ai-factory
  pb_role: provider
  customer_role: deployer
  risk_tier: minimal
  legal_basis: Art 72 post-market monitoring; Art 20 corrective-action duty (non-high-risk); GDPR.
  on_prem_note: Default-off telemetry preserves the on-prem promise.
  shared_responsibility: 'PrivateBox: telemetry inventory, schema, retention, off-by-default switch. Customer:
    opt-in.'
  common_misclassification: Sneaking prompt/output telemetry into 'anonymous' feed.
  sales_safe_wording: Telemetry is off by default. When enabled by the customer, telemetry is limited
    to system-health metadata; prompts and outputs are not transmitted.
  triggered_requirements:
  - requirement_id: eu-ai-act-art-72
    scenario_specific_note: Telemetry feeds PMM.
- id: scn-eu-m
  name: Optional web search / external retrieval (RAG over the live web)
  framework_specific_id: Scenario M
  description: Customer enables an optional connector that lets the assistant fetch live web content.
  applies_to_business_models:
  - on-prem
  - ai-factory
  pb_role: provider
  customer_role: deployer
  risk_tier: minimal
  legal_basis: Art 13 transparency (high-risk); Art 50 transparency duties; Art 53(1)(c) copyright (GPAI
    providers, not runtime web fetch — but customers will ask).
  on_prem_note: Web access is the **biggest single dilution** of the on-prem story. Treat as opt-in, with
    explicit purpose.
  shared_responsibility: 'PrivateBox: domain allow-list, citation surfacing, robots.txt observance, no
    scraping bypass, audit logs. Customer: opt-in, lawful use.'
  common_misclassification: Treating web RAG as harmless because outputs are 'summaries'. Stripping citations.
  sales_safe_wording: Web retrieval is an opt-in, explicitly enabled connector. When enabled, retrieved
    content is cited at the point of use to preserve provenance, and access is restricted by allow-list.
  triggered_requirements:
  - requirement_id: eu-ai-act-art-50
    scenario_specific_note: Citations surface output provenance.
- id: scn-eu-n
  name: Cross-border support and EU market placement (PrivateBox vendor outside the EU)
  framework_specific_id: Scenario N
  description: PrivateBox is a non-EU entity. EU customers buy and deploy. Support is delivered from outside
    the EU.
  applies_to_business_models:
  - on-prem
  - ai-factory
  pb_role: provider
  customer_role: deployer
  risk_tier: minimal
  legal_basis: Art 2(1)(a) provider placing on EU market; Art 2(1)(c) outputs used in EU; Art 22 AR for
    high-risk; Art 54 AR for GPAI.
  on_prem_note: Irrelevant to extraterritoriality.
  shared_responsibility: 'PrivateBox: appoint AR; preserve technical documentation; cooperate with market
    surveillance authorities. Customer: deployer obligations.'
  common_misclassification: Believing EU rules don't apply because PB is HQ'd elsewhere.
  sales_safe_wording: PrivateBox treats EU customer deployments as in scope of the EU AI Act regardless
    of where PrivateBox itself is established. Where a high-risk variant is delivered, PrivateBox appoints
    an authorised representative under Article 22.
  triggered_requirements:
  - requirement_id: eu-ai-act-art-2
    scenario_specific_note: Extraterritorial reach explicit.
  - requirement_id: eu-ai-act-art-22
    scenario_specific_note: AR mandate required if any high-risk variant.
  - requirement_id: eu-ai-act-art-54
    scenario_specific_note: AR for GPAI provider role if triggered.
requirements:
- id: eu-ai-act-art-2
  kind: article
  native_id: Article 2
  group: Articles
  group_name: EU AI Act Articles
  title: Scope
  requirement: The Regulation applies to providers placing AI systems on the EU market or putting them
    into service in the EU; deployers established or located in the EU; providers and deployers in third
    countries where output is used in the EU; importers, distributors, product manufacturers under their
    name; authorised representatives of non-EU providers; affected persons in the EU.
  pb_interpretation: EU geography is not what matters; EU presence of the system, the deployer, or the
    output is what matters. Being headquartered outside the EU is not a defence. PB almost certainly has
    EU customers, EU outputs, or both. Extraterritorial reach is presumed.
  owner: PB
  applies: Y
  applies_rationale: Treats EU as in scope by default; verifies per customer.
  triggered_by_scenarios:
  - scn-eu-a
  - scn-eu-b
  - scn-eu-c
  - scn-eu-d
  - scn-eu-e
  - scn-eu-f
  - scn-eu-g
  - scn-eu-h
  - scn-eu-i
  - scn-eu-j
  - scn-eu-k
  - scn-eu-l
  - scn-eu-m
  - scn-eu-n
  documented_evidence:
  - Customer register with EU flag
  - Scope memo
  - AR mandate (where applicable)
  operational_evidence: EU customer list maintained current; AR mandate text reachable in EU.
  audit_methods:
  - Insp
  - Int
  cadence: Per significant product change
  failure_modes: '''We''re not EU; we''re not in scope.'' Excluding EU output cases.'
  pitfall: Treating non-EU HQ as exempting status.
  maturity_target: AR
  remediation: Customer register exists, current, reviewed at every significant product change.
  external_safe_claim: PrivateBox treats EU deployments and EU-bound outputs as fully in scope of Regulation
    (EU) 2024/1689.
  crosswalk: []
  source_authority: binding
  source_refs:
  - Reg 2024/1689 Art 2
  business_models:
  - on-prem
  - ai-factory
- id: eu-ai-act-art-3
  kind: article
  native_id: Article 3
  group: Articles
  group_name: EU AI Act Articles
  title: Definitions
  requirement: 'Defined terms include: AI system (Art 3(1)) — software with autonomy and adaptiveness
    producing outputs from inputs; GPAI model (Art 3(63)) — model with significant generality, capable
    of competently performing a wide range of distinct tasks (Commission threshold ≥10²³ FLOP plus generative
    output for text/image/video); provider (Art 3(3)) — places on market under own name; deployer (Art
    3(4)) — uses on its own responsibility; intended purpose (Art 3(12)); substantial modification (Art
    3(23)).'
  pb_interpretation: Almost every other duty under the Act flips on these definitions. Maintain a Definition
    Register that maps every PB SKU and every customer scenario to the relevant defined terms. Each model
    packaged classified as GPAI / not-GPAI. Each scenario tagged with intended-purpose. Substantial-modification
    policy documents what counts as 'substantial'.
  owner: PB
  applies: Y
  applies_rationale: Foundational classification work for all subsequent articles.
  triggered_by_scenarios:
  - scn-eu-c
  - scn-eu-d
  documented_evidence:
  - Definitions register
  - Intended-purpose statements
  - Substantial-modification policy
  operational_evidence: Register reviewed quarterly; tied to release process.
  audit_methods:
  - Insp
  - Int
  cadence: Quarterly + on release
  pitfall: Loosely calling everything 'AI' without checking the definition; treating the GPAI threshold
    as a compliance threshold rather than a classification threshold.
  maturity_target: AR
  external_safe_claim: PrivateBox classifies its components as AI systems and (where applicable) general-purpose
    AI models in line with the definitions in Article 3 of Regulation (EU) 2024/1689 and the European
    Commission's guidelines on the AI system definition (February 2025) and on GPAI scope (July 2025).
  crosswalk: []
  source_authority: binding
  source_refs:
  - Reg 2024/1689 Art 3
  - Commission AI System Definition Guidelines Feb 2025 [G]
  - Commission GPAI Scope Guidelines Jul 2025 [G]
  business_models:
  - on-prem
  - ai-factory
- id: eu-ai-act-art-4
  kind: article
  native_id: Article 4
  group: Articles
  group_name: EU AI Act Articles
  title: AI Literacy
  requirement: Providers and deployers shall take measures to ensure, to their best extent, a sufficient
    level of AI literacy of their staff and other persons dealing with the operation and use of AI systems
    on their behalf, taking into account technical knowledge, experience, education, training, the context
    of use, and the persons or groups on whom the systems are used.
  pb_interpretation: Already binding since 2 February 2025. People using or running AI on PB's behalf
    must be educated about it. 'On behalf' includes contractors, support staff, integration partners.
    Tier the training by role. Easy to fail because it requires PB's own programme, not just customer-facing
    materials.
  owner: PB/SH
  applies: Y
  applies_rationale: Provider duty (PB staff) AND deployer duty (customer staff). Each side owns its own.
  role_applicability:
    provider: Y
    deployer: Y
    provider_note: PB's own internal literacy programme.
    deployer_note: Customer's literacy programme; PB provides supporting materials.
  triggered_by_scenarios:
  - scn-eu-a
  - scn-eu-b
  - scn-eu-k
  documented_evidence:
  - AI literacy programme document
  - Curriculum tiers
  - Training material
  - Completion records
  - Deployer-facing training pack
  operational_evidence: Pick a random PB employee in scope; verify they completed the appropriate tier
    within 12 months.
  audit_methods:
  - Insp
  - Samp
  cadence: Induction + annual refresh
  pitfall: Treating Art 4 as customer duty only; one-off training without refresh; ignoring contractors
    and support engineers.
  maturity_target: AR
  remediation: Curriculum integrated into onboarding; refresh tracked; deployer-facing version maintained.
  external_safe_claim: PrivateBox operates an AI literacy programme for its own personnel and provides
    training resources to customers, in line with Article 4 of the EU AI Act, applicable since 2 February
    2025.
  crosswalk:
  - framework: iso-27001
    refs:
    - iso-27001-cl-7.2
    note: >-
      Competence — AI literacy is the AI-specific instance of competence requirement
  - framework: iso-27001
    refs:
    - iso-27001-cl-7.3
    note: >-
      Awareness — AI literacy programme is the AI awareness instance
  - framework: iso-27701
    refs:
    - iso-27701-cl-7.2
    note: >-
      Competence — AI literacy programme parallels privacy competence
  - framework: iso-27701
    refs:
    - iso-27701-cl-7.3
    note: >-
      Awareness — AI literacy and privacy awareness share form
  source_authority: binding
  source_refs:
  - Reg 2024/1689 Art 4
  - AI Office Q&A on AI Literacy [G]
  - Commission Living Repository of AI Literacy Practices [G]
  effective_from: '2025-02-02'
  business_models:
  - on-prem
  - ai-factory
- id: eu-ai-act-art-5
  kind: article
  native_id: Article 5
  group: Articles
  group_name: EU AI Act Articles
  title: Prohibited AI Practices
  requirement: 'Article 5 prohibits, inter alia: (a) subliminal/manipulative/deceptive techniques materially
    distorting behaviour and causing significant harm; (b) exploitation of vulnerabilities; (c) social-scoring
    by public authorities; (d) predictive policing based solely on profiling; (e) untargeted scraping
    of facial images for facial-recognition databases; (f) emotion- recognition in workplace and education
    contexts (with narrow safety/medical exceptions); (g) biometric categorisation inferring sensitive
    attributes; (h) real-time remote biometric identification in publicly accessible spaces for law enforcement
    (with strict carve-outs).'
  pb_interpretation: Already binding since 2 February 2025. Highest penalty tier (€35M / 7%). Even an
    apparently benign assistant can be configured by a customer to support a prohibited practice (e.g.,
    emotion-recognition in workplace setting through 'sentiment analysis' of e-mails). Must be screened
    in design AND in deployer guidance.
  owner: PB/SH
  applies: Y
  applies_rationale: Provider duty (do not place such a system on market) and deployer duty (do not use).
  tier: prohibited
  role_applicability:
    provider: Y
    deployer: Y
  triggered_by_scenarios:
  - scn-eu-a
  - scn-eu-b
  - scn-eu-c
  - scn-eu-d
  - scn-eu-e
  - scn-eu-f
  - scn-eu-g
  - scn-eu-h
  - scn-eu-i
  - scn-eu-j
  - scn-eu-k
  - scn-eu-l
  - scn-eu-m
  - scn-eu-n
  documented_evidence:
  - Article 5 screening checklist
  - AUP
  - Sales-intake form
  - Design-review template
  - Customer onboarding form
  operational_evidence: Pick a recent feature release and trace the Article 5 review. Pick a customer
    and check the onboarding screening.
  audit_methods:
  - Insp
  - Samp
  cadence: Per feature release / per customer
  pitfall: Treating Art 5 as solely a 'biometrics' issue. Failing to flag features that *enable* a prohibited
    use even if PB doesn't itself perform it. Missing the workplace + education emotion-recognition prohibition.
  maturity_target: AR
  remediation: Article 5 review is a stage gate, not a checkbox.
  external_safe_claim: PrivateBox's Acceptable Use Policy and onboarding screening expressly exclude the
    prohibited AI practices defined in Article 5 of the EU AI Act, applicable since 2 February 2025.
  crosswalk: []
  source_authority: binding
  source_refs:
  - Reg 2024/1689 Art 5
  - Commission Guidelines on Prohibited AI Practices Feb 2025 [G]
  effective_from: '2025-02-02'
  business_models:
  - on-prem
  - ai-factory
- id: eu-ai-act-art-6
  kind: article
  native_id: Article 6
  group: Articles
  group_name: EU AI Act Articles
  title: Classification of high-risk AI systems
  requirement: A system is high-risk if (1) it is a safety component of a product covered by Annex I Union
    harmonisation legislation that is required to undergo third-party conformity assessment; or (2) it
    falls within Annex III, unless the Article 6(3) carve-out applies (narrow procedural task; improves
    prior human activity; detects patterns/deviations not meant to replace human assessment; preparatory
    task) — and the system does not perform profiling, in which case it is always high-risk.
  pb_interpretation: High-risk = product-safety route (Annex I) OR listed use-case (Annex III). The narrow
    Article 6(3) exit door exists, but profiling kills it. PB does not naturally land in Annex I. Annex
    III risk is driven by the customer's intended purpose, not PB's design. The role-flip mechanism in
    Article 25(1)(c) is the dominant scenario.
  owner: PB/SH
  applies: C
  applies_rationale: Conditional — high-risk classification typically attaches to customer-driven use,
    with role-flip consequences.
  na_justification_template: N/A only where intended purpose is provably non-Annex-III and AUP enforces
    this contractually.
  tier: high-risk
  triggered_by_scenarios:
  - scn-eu-e
  - scn-eu-f
  - scn-eu-g
  documented_evidence:
  - Intended-purpose statement
  - AUP
  - High-risk routing decision tree
  - Classification memo per customer
  operational_evidence: Audit a sample of customer deployments. Are any inadvertently in Annex III categories
    without contractual acknowledgement?
  audit_methods:
  - Insp
  - Samp
  cadence: Per customer onboarding + annual
  pitfall: '''Article 6(3) means we''re never high-risk.'' Ignoring profiling. Letting customers assume
    Annex III use without flipping role.'
  maturity_target: AR
  external_safe_claim: PrivateBox is not intended for use as a high-risk AI system under Annex III of
    the EU AI Act. Customers proposing such use will be routed through a separate contract and configuration;
    otherwise such use is contractually out of scope and subject to the role-flip rules in Art 25(1)(c).
  crosswalk: []
  source_authority: binding
  source_refs:
  - Reg 2024/1689 Art 6 + Annex III
  - Commission Article 6 Guidelines (forthcoming) [G]
  effective_from: '2026-08-02'
  business_models:
  - on-prem
  - ai-factory
- id: eu-ai-act-art-22
  kind: article
  native_id: Article 22
  group: Articles
  group_name: EU AI Act Articles
  title: Authorised Representatives of Providers (high-risk)
  requirement: Non-EU providers of high-risk systems must, prior to placing on the market, appoint an
    authorised representative in the EU by written mandate. AR keeps documentation, declaration of conformity,
    conformity-assessment certificate; cooperates with authorities; can terminate if provider non-compliant.
  pb_interpretation: 'Required only if/when PB provides a high-risk system from outside the EU. Note:
    GPAI providers also need an AR under Article 54.'
  owner: PB
  applies: C
  applies_rationale: Triggers if (and only if) PB ships a high-risk variant from outside the EU.
  triggered_by_scenarios:
  - scn-eu-n
  documented_evidence:
  - AR mandate template
  - AR contact register
  audit_methods:
  - Insp
  cadence: On high-risk-variant launch
  pitfall: Forgetting the GPAI-specific AR under Art 54 if PB triggers GPAI provider status.
  maturity_target: SA/AR
  crosswalk:
  - framework: iso-27701
    refs:
    - iso-27701-a1-6
    note: >-
      Contracts with processors — AR mandate is contractual instrument
  source_authority: binding
  source_refs:
  - Reg 2024/1689 Art 22
  effective_from: '2026-08-02'
  business_models:
  - on-prem
  - ai-factory
- id: eu-ai-act-art-23-24
  kind: article
  native_id: Article 23-24
  group: Articles
  group_name: EU AI Act Articles
  title: Importers and Distributors
  requirement: Importers verify CE marking, conformity declaration, technical documentation, AR appointment,
    instructions for use, before placing on EU market. Distributors verify CE marking and that provider/importer
    have done their job. Both must keep records and act on non-conformities.
  pb_interpretation: PB can become an 'importer' if it imports an upstream third-party model packaged
    as a separate AI product. Or PB's resellers/MSPs become distributors of PB.
  owner: PB
  applies: C
