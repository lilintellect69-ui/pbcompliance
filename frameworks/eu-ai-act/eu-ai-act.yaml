  operational_evidence: Inspect a deployment's log schema; verify ≥6-month retention configurable; review
    log-export interface.
  audit_methods:
  - Insp
  - Obs
  cadence: Per release / on schema change
  pitfall: Logs that auto-rotate at 30 days. Log volume so high that retention becomes infeasible.
  maturity_target: AR
  external_safe_claim: PrivateBox provides default-on, structured logging with configurable retention
    of at least six months, and a documented log schema, in alignment with Articles 12 and 26(6) of the
    EU AI Act.
  crosswalk:
