pb_application:
  why_chosen: EU customers in regulated sectors (legal, financial, healthcare, public sector) will require
    AI Act alignment as a procurement gate from mid-2026 onwards. On-prem reduces some risks but does
    not remove provider duties, prohibited-practice screening, AI literacy obligations, or transparency
    duties. Non-compliance penalties are the highest of any AI regulation globally (€35M / 7% turnover
    for Art 5 breaches).
  scope_decisions:
    on_prem:
      coverage: partial
      rationale: 'Customer hardware in EU customer environments = putting into service in the EU. Outputs
        used in EU = extraterritorial reach (Art 2(1)(c)). PB role: typically provider of AI system. Customer
        role: deployer. Customer-driven Annex III use triggers role-flip (Art 25(1)(c)) where customer
        becomes provider of high-risk system.'
    ai_factory:
      coverage: partial
      rationale: Partner DC may or may not be in EU jurisdiction. If non-EU PB serves EU customers, authorised
        representative required for high-risk variants (Art 22). PB acts as provider; customer as deployer;
        partner DC as supplier governed contractually.
  top_risks:
  - Sales rep saying 'yes you can use it for HR ranking' triggers Art 25(1)(c) role-flip exposure for
    both PB and customer
  - Skipping AI literacy programme (Art 4) — already binding since Feb 2025
  - Failing to screen prohibited practices (Art 5) — €35M / 7% penalty tier
  - Stripping upstream GPAI documentation when integrating third-party models (Art 53 pass-through)
  - Telemetry/support access undermining the on-prem story without contractual scoping
  - Treating on-prem as 'exempt' — Act applies regardless of hosting topology
  - Missing Art 50(2) machine-readable marking for generative outputs from Aug 2026
