- id: eu-ai-act-art-10
  kind: article
  native_id: Article 10
  group: Articles
  group_name: EU AI Act Articles
  title: Data and Data Governance (high-risk)
  requirement: 'Training, validation, and testing data sets shall be subject to data-governance and management
    practices: design choices; data-collection processes and data origin; relevant data-preparation (annotation,
    labelling, cleaning, updating, enrichment, aggregation); assumptions; assessment of availability,
    quantity, suitability; bias examination; mitigation; gap analysis. Datasets must be relevant, sufficiently
    representative, free of errors, complete, and have appropriate statistical properties.'
  pb_interpretation: Article 10 is high-risk-only on its face, but PB's posture toward fine-tuning data
    and customer RAG corpora needs to be defensible. If PB does not train on customer data, that is a
    powerful, evidenceable claim — subject to highest penalty tier (€35M / 7%) for breaches.
  owner: PB/SH
  applies: C
  applies_rationale: Conditional (binding) for high-risk; defensible posture for all SKUs.
  tier: high-risk
  triggered_by_scenarios:
  - scn-eu-d
  - scn-eu-e
  - scn-eu-f
  - scn-eu-g
  documented_evidence:
