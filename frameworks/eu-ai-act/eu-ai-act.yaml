  kind: article
  native_id: Article 56
  group: Articles
  group_name: EU AI Act Articles
  title: Codes of Practice (legal status)
  requirement: The AI Office facilitates codes of practice. The Commission may approve a code by implementing
    act. Adherence is voluntary. Non-signatories must demonstrate compliance by other adequate means.
  pb_interpretation: 'Codes are a route to compliance, not the compliance itself. PB can choose to align
    with codes (GPAI CoP if Scenario D triggers; Marking and Labelling CoP for Article 50(2)/(4)). Not
    legally required. Trade-off: signing creates presumption of compliance but binds PB to the code''s
    terms; non-signing keeps flexibility but puts evidence burden on ''demonstrate by other means''.'
