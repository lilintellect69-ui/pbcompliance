- id: eu-ai-act-art-11
  kind: article
  native_id: Article 11
  group: Articles
  group_name: EU AI Act Articles
  title: Technical Documentation (high-risk)
  requirement: 'Technical documentation shall be drawn up before placing on the market and kept up to
    date; it shall demonstrate compliance with Articles 9-15. Annex IV specifies contents: general description,
    detailed description (development methods, design choices, system architecture, computational resources),
    description of monitoring/control/oversight, validation and testing procedures, risk-management documentation,
    list of harmonised standards/common specifications applied, EU declaration of conformity, post-market
    monitoring plan.'
  pb_interpretation: Required for high-risk; an Annex IV-aligned skeleton is best practice for non-high-risk
    too — speeds customer due-diligence and any future high-risk SKU.
