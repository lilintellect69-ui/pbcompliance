- id: eu-ai-act-art-12
  kind: article
  native_id: Article 12
  group: Articles
  group_name: EU AI Act Articles
  title: Record-Keeping / Logs (high-risk)
  requirement: High-risk systems shall technically allow for the automatic recording of events ('logs')
    over their lifetime. Logging capabilities shall enable identification of situations that may result
    in the system presenting a risk or causing a substantial modification, facilitate post-market monitoring,
    and (for biometric ID) record specified parameters. Providers keep logs under their control. Deployers
    keep logs at least 6 months (Art 26(6)).
  pb_interpretation: 'PB ships with comprehensive, configurable logging by default — even outside high-risk:
    prompt timestamps, model identifiers, response identifiers, session metadata, retrieval citations.
    On-prem means logs sit with deployer, which is privacy-positive AND satisfies Art 26(6) deployer duty.'
  owner: PB/SH
  applies: C
  applies_rationale: Conditional (binding) for high-risk; default-on for all SKUs.
  tier: high-risk
  triggered_by_scenarios:
  - scn-eu-e
  - scn-eu-f
  - scn-eu-g
  documented_evidence:
  - Log schema
