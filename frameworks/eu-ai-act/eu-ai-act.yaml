- id: eu-ai-act-art-50
  kind: article
  native_id: Article 50
  group: Articles
  group_name: EU AI Act Articles
  title: Transparency Obligations (chat, synthetic content, deepfakes, public-interest text)
  requirement: (1) Providers must inform persons interacting with the AI system that they are interacting
    with AI, unless this is obvious or use is for permitted criminal-law purposes. (2) Providers of generative
    AI systems must mark synthetic outputs in a machine-readable format and detectable as artificially
    generated, with technical solutions effective, interoperable, robust, reliable as far as technically
    feasible — except where the system performs only assistive editing or does not substantially alter
    input. (3) Deployers of emotion-recognition or biometric-categorisation systems must inform exposed
    natural persons. (4) Deployers of deepfake-generating systems must disclose; deployers of AI-generated
    text published with the purpose of informing the public on matters of public interest must disclose,
    with editorial-review carve-out. (5) Information must be provided in a clear and distinguishable manner
    at the latest at first interaction.
  pb_interpretation: Article 50 is the obligation that DOES apply broadly — including to PB's typical
    office assistant. Persistent in-product disclosure, machine-readable marking of generated content,
    and deployer guidance for deepfake and public-interest text are all PB-side workstreams. Binding from
    2 August 2026.
  owner: PB/SH
  applies: Y
  applies_rationale: Provider duties under 50(1) and 50(2); customer-side under 50(3)/(4)/(5).
  tier: limited
  role_applicability:
    provider: Y
    deployer: Y
    provider_note: 50(1) AI disclosure + 50(2) machine-readable marking are provider duties.
    deployer_note: 50(3) emotion/biometric disclosure + 50(4) deepfake/public-interest text labelling
      are deployer duties.
  triggered_by_scenarios:
  - scn-eu-a
  - scn-eu-b
  - scn-eu-h
  - scn-eu-i
  - scn-eu-m
  documented_evidence:
  - Article 50 design document
  - UI screenshots
  - Marking technical specification
  - Deployer transparency manual
  - Sample disclosures in supported languages
  operational_evidence: Live demonstration of marking and verification; UX review against accessibility
    standards.
  audit_methods:
  - Insp
  - Obs
  cadence: Per release
  pitfall: Treating disclosure as a one-time pop-up. Stripping upstream provenance metadata in pipelines.
    Skipping marking for 'assistive' features that actually do generate substantial content. Confusing
    the provider duty (50(2)) with the deployer duty (50(4)).
  maturity_target: AR
  external_safe_claim: PrivateBox surfaces a persistent indication that users are interacting with AI
    and marks generative outputs in a machine-readable format, in alignment with Article 50(1)-(2) of
    the EU AI Act, applicable from 2 August 2026, and the technical approaches reflected in the European
    Commission's voluntary draft Code of Practice on marking and labelling of AI-generated content.
  crosswalk:
  - framework: iso-27701
    refs:
    - iso-27701-a1-10
    note: >-
      Privacy notice — Art 50 disclosure parallels privacy transparency principle
  source_authority: binding
  source_refs:
  - Reg 2024/1689 Art 50
  - Code of Practice on Marking and Labelling of AI-generated Content (1st draft Dec 2025; 2nd draft Mar
    2026; final June 2026) [C]
  - Commission Article 50 Guidelines (forthcoming) [G]
  effective_from: '2026-08-02'
  business_models:
  - on-prem
  - ai-factory
- id: eu-ai-act-art-51-52-55
  kind: article
  native_id: Article 51-52-55
  group: Articles
  group_name: EU AI Act Articles
  title: GPAI models with systemic risk — classification, notification, additional duties
  requirement: 'Article 51 classifies GPAI models with ''systemic risk'' (presumption when training compute
    exceeds 10²⁵ FLOP or by Commission designation under Annex XIII). Article 52: notification procedure;
    provider can rebut presumption. Article 55: GPAI-with-systemic-risk additional duties — model evaluations
    including adversarial testing, mitigation of systemic risks, serious-incident reporting to AI Office,
    cybersecurity protection.'
  pb_interpretation: PB extremely unlikely to train a model crossing 10²⁵ FLOP. Systemic-risk regime applies
    to frontier-lab providers. Relevant to PB only as upstream-supplier diligence — verify whether any
    GPAI model PB integrates is itself a systemic-risk model, since systemic-risk models carry their own
    transparency and reporting cascade downstream.
  owner: PB
  applies: C
  applies_rationale: PB is downstream integrator; systemic-risk obligations attach to upstream providers.
    Upstream-provider diligence remains.
  tier: gpai
  triggered_by_scenarios:
  - scn-eu-c
  - scn-eu-d
  documented_evidence:
  - Per-model upstream supplier file flagging systemic-risk status
  operational_evidence: 'For each integrated GPAI model: capture systemic-risk flag, link to upstream
    provider''s compliance posture.'
  audit_methods:
  - Insp
  cadence: Per integrated model
  pitfall: Misreading the threshold as compliance-obligating rather than classification-triggering.
  maturity_target: SA
  external_safe_claim: PrivateBox tracks whether the third-party general-purpose AI models it integrates
    fall under the systemic-risk regime in Articles 51-52 and 55 of the EU AI Act and preserves the upstream
    provider's compliance documentation accordingly.
  crosswalk: []
  source_authority: binding
  source_refs:
  - Reg 2024/1689 Art 51, 52, 55
  - Annex XIII
  effective_from: '2025-08-02'
  business_models:
  - on-prem
  - ai-factory
- id: eu-ai-act-art-53
  kind: article
  native_id: Article 53
  group: Articles
  group_name: EU AI Act Articles
  title: GPAI Provider Obligations — documentation, copyright, training summary
  requirement: Every GPAI provider must keep technical documentation (Annex XI), provide downstream-provider
    documentation (Annex XII), have a copyright-compliance policy under EU copyright law, and publish
    a sufficiently detailed summary of training content using the AI Office's published template. Free-and-open-licence
    models are partially exempt (only copyright + summary), unless they are systemic-risk.
  pb_interpretation: 'Two sub-cases for PB: (i) downstream integrator of unmodified third-party GPAI (Scenarios
    A, B, C) — pass-through duty plus diligence on upstream provider; (ii) PB crosses the modification
    threshold (Scenario D) and becomes GPAI provider in respect of modifications — limited but real duties
    (Annex XI internal docs + Annex XII downstream pack + copyright policy + training-data summary, all
    specific to the fine-tune). Binding since 2 August 2025 for new GPAI models.'
  owner: PB
  applies: C
  applies_rationale: Pass-through duty in all GPAI-touching scenarios; full GPAI-provider duty only in
    Scenario D.
  tier: gpai
  triggered_by_scenarios:
  - scn-eu-c
  - scn-eu-d
  documented_evidence:
  - Per-model upstream supplier file (Annex XII pass-through)
  - Copyright-compliance policy
  - Training-data summary (where PB triggers GPAI provider role)
  - Annex XI internal documentation (where PB triggers GPAI provider role)
  operational_evidence: 'Pick a model; trace the chain: upstream provider → PB pass-through → customer
    deployer pack.'
  audit_methods:
  - Insp
  cadence: Per integrated model + per fine-tune
  pitfall: Confusing GPAI **model** obligations (Articles 51-55) with AI **system** obligations. Over-claiming
    open-source exemption (does not apply if systemic-risk).
  maturity_target: AR
  external_safe_claim: PrivateBox documents the third-party GPAI models it integrates, preserves the downstream
    documentation those providers supply under Article 53 of the EU AI Act, and where it materially modifies
    a model, prepares its own GPAI documentation in respect of the modifications.
  crosswalk:
  - framework: iso-27701
    refs:
    - iso-27701-a1-13
    note: >-
      Transfer basis — Annex XII downstream documentation
  - framework: iso-27701
    refs:
    - iso-27701-a2-11
    note: >-
      Transfer basis (processor scope)
  source_authority: binding
  source_refs:
  - Reg 2024/1689 Art 53
  - Annex XI
  - Annex XII
  - Commission GPAI Scope Guidelines Jul 2025 [G]
  - GPAI Code of Practice Jul 2025 [C]
  effective_from: '2025-08-02'
