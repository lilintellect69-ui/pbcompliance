- id: eu-ai-act-art-72
  kind: article
  native_id: Article 72
  group: Articles
  group_name: EU AI Act Articles
  title: Post-Market Monitoring (high-risk)
  requirement: Providers of high-risk systems must operate a post-market monitoring system, with a documented
    plan, that actively and systematically collects, documents, and analyses data on system performance
    throughout its lifetime. Evidence used to update the risk-management system, the system itself, and
    to enable corrective actions.
  pb_interpretation: Conditional on high-risk status. Even non-high-risk products need a de-facto incident
    response process covering AI-specific failure modes (model degradation, prompt injection, hallucinated
    outputs leading to harm, data leakage). PB designs PMM as default operational discipline.
  owner: PB
  applies: C
  applies_rationale: Binding for high-risk; recommended as default operational discipline.
  tier: high-risk
  triggered_by_scenarios:
