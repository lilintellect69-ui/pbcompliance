  - Per-dataset data card
  - Bias-evaluation reports
  - '''No training on customer data'' technical/contractual assurance'
  operational_evidence: Walk through dataset-card index; trace bias-examination methodology; check controls
    preventing customer-data leakage into training.
  audit_methods:
  - Insp
  - Int
  cadence: Per dataset release / per fine-tune
  pitfall: Inheriting a third-party model whose training data is opaque without flagging the dependency.
    Vague 'no training' claims without contractual or technical anchors.
  maturity_target: AR
  external_safe_claim: PrivateBox documents the provenance, processing, and bias examination of any training
    or fine-tuning data it controls, and provides technical and contractual assurances that customer data
    is not used for model training, in alignment with Article 10 of the EU AI Act.
  crosswalk:
