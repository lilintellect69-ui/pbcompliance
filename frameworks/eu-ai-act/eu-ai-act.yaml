- id: eu-ai-act-art-26
  kind: article
  native_id: Article 26
  group: Articles
  group_name: EU AI Act Articles
  title: Deployer Obligations (high-risk)
  requirement: 'Deployers must: (1) use the system per instructions; (2) assign human oversight to competent
    natural persons; (3) ensure relevance/appropriateness of input data they control; (4) monitor operation
    and notify provider/authorities of risks or serious incidents; (5) keep automatically generated logs
    at least 6 months; (6) inform workers'' representatives and affected workers before workplace use;
    (7) public authorities register in EU database; (8) use Art 13 information for DPIAs; (9) inform affected
    natural persons subject to a high-risk AI system; (10) cooperate with authorities. Article 27 layers
    a Fundamental Rights Impact Assessment for specific deployer categories.'
  pb_interpretation: Customer obligation, but PB must enable it — Instructions for Use, oversight tooling,
    log retention, worker-information templates. PB ships a Deployer Pack that gives the customer everything
    they need to discharge Art 26 with documented support.
  owner: SH/CL
  applies: C
  applies_rationale: Customer is the addressee; PB enables.
  tier: high-risk
  role_applicability:
    provider: C
    deployer: Y
    provider_note: PB enables but is not the addressee.
    deployer_note: Customer is the legal addressee for high-risk variants.
  triggered_by_scenarios:
  - scn-eu-e
  - scn-eu-f
  - scn-eu-g
  documented_evidence:
  - Instructions for use
  - Deployer onboarding pack
  - FRIA template
  - Worker-information template
  - Affected-person notification template
  operational_evidence: Sample customer can produce all artifacts on request; deployer pack version-controlled
    and updated per release.
  audit_methods:
  - Insp
  - Samp
  cadence: Per release
  pitfall: Logs that auto-rotate at 30 days. Forgetting workers'-information duty (Art 26(7)).
  maturity_target: AR
  external_safe_claim: PrivateBox supplies an Instructions for Use pack and configurable logging, oversight,
    and notification controls that enable deployers of high-risk variants to meet their obligations under
    Article 26 of the EU AI Act.
  crosswalk:
  - framework: iso-27701
    refs:
    - iso-27701-a2-2
    note: >-
      Customer agreement / instructions — deployer-as-controller direction-giving
  - framework: iso-27701
    refs:
    - iso-27701-a2-8
    note: >-
      Assist controller — analogous to deployer support obligations
  source_authority: binding
  source_refs:
  - Reg 2024/1689 Art 13, 14, 26, 27
  effective_from: '2026-08-02'
  business_models:
  - on-prem
  - ai-factory
- id: eu-ai-act-art-27
  kind: article
  native_id: Article 27
  group: Articles
  group_name: EU AI Act Articles
  title: Fundamental Rights Impact Assessment (deployer)
  requirement: 'Before deploying certain high-risk systems, deployers that are bodies governed by public
    law, private operators providing public services, or operators of certain Annex III systems (incl.
    credit/insurance for natural persons) must perform a FRIA covering: deployer''s processes, period
    and frequency of use, categories of natural persons affected, specific risks of harm, human oversight
    measures, internal governance, complaint procedures.'
  pb_interpretation: PB does not perform a FRIA (it is not the deployer). But PB provides a deployer-FRIA
    aid template pre-filled with PB's stated intended purpose, foreseeable risks, oversight controls,
    so customers can adapt rather than start from zero.
  owner: SH/CL
  applies: C
  applies_rationale: Customer obligation; PB supports.
  tier: high-risk
  role_applicability:
    provider: C
    deployer: Y
    provider_note: PB provides FRIA scaffolding.
    deployer_note: Customer carries out and signs FRIA.
  triggered_by_scenarios:
  - scn-eu-e
  - scn-eu-f
  - scn-eu-g
  documented_evidence:
  - FRIA template
  - Example FRIA for a fictional deployer
  - PB-side risk and oversight description (input to FRIA)
  audit_methods:
  - Insp
  cadence: Per significant deployment
  pitfall: Providing only a generic template that ignores the AI-specific risks customers actually face.
  maturity_target: SA
  crosswalk:
