- id: eu-ai-act-art-9
  kind: article
  native_id: Article 9
  group: Articles
  group_name: EU AI Act Articles
  title: Risk Management System (high-risk)
  requirement: 'Establish, implement, document, and maintain a risk-management system as a continuous,
    iterative process across the lifecycle: identify and analyse known and reasonably foreseeable risks;
    estimate and evaluate risks emerging from intended use and reasonably foreseeable misuse; evaluate
    other potentially arising risks based on post-market monitoring data; adopt risk-management measures;
    eliminate/reduce risks where possible; give clear information to the deployer.'
  pb_interpretation: Required only when high-risk; strongly recommended as scaffolding regardless. LLM-based
    products face known risk classes (prompt injection, hallucination, data leakage, model drift) that
    customers will ask about. PB maintains a living risk register tied to the release cycle, even outside
    high-risk scope.
  owner: PB
  applies: C
  applies_rationale: Conditional (binding) for high-risk variants; good practice for all SKUs.
  tier: high-risk
  triggered_by_scenarios:
  - scn-eu-e
  - scn-eu-f
  - scn-eu-g
  documented_evidence:
  - RMS document
  - Risk register
  - Foreseeable-misuse register
  - Mitigation map
  - Release-time risk-review records
  operational_evidence: Pick a recent release; verify risk-review record; trace one risk from identification
    to mitigation to deployer disclosure.
  audit_methods:
  - Insp
  - Samp
  cadence: Per release + on incident
  pitfall: RMS that is a one-off; missing foreseeable-misuse coverage; no link to post-market monitoring.
  maturity_target: AR
  external_safe_claim: PrivateBox maintains a documented risk-management process across the AI lifecycle,
    covering identified risks, foreseeable misuse, mitigation measures, and deployer-facing residual-risk
    information, in alignment with Article 9 of the EU AI Act for any high-risk variant.
  crosswalk:
  - framework: iso-27001
    refs:
    - iso-27001-cl-6.1
    note: >-
      ISMS risk planning — Art 9 RMS is the AI-specific risk discipline
  - framework: iso-27001
    refs:
    - iso-27001-a-5.7
    note: >-
      Threat intelligence — feeds AI risk identification
  - framework: iso-27701
    refs:
    - iso-27701-cl-6.1
    note: >-
      Privacy + security risk methodology — Art 9 RMS aligns to integrated risk discipline
  - framework: iso-27701
    refs:
    - iso-27701-cl-8.2
    note: >-
      Operational privacy risk assessment
