- id: eu-ai-act-art-14
  kind: article
  native_id: Article 14
  group: Articles
  group_name: EU AI Act Articles
  title: Human Oversight (high-risk)
  requirement: High-risk systems shall be designed and developed in such a way that they can be effectively
    overseen by natural persons during the period in which they are in use. Human oversight measures shall
    enable understanding of the system's capacities and limitations; awareness of automation bias; correct
    interpretation of output; ability to decide not to use the system or to override output; ability to
    intervene or interrupt operation. For remote biometric ID systems, two-person verification.
  pb_interpretation: PB designs oversight controls (sampling, override, escalation, refusal) into the
    product regardless of risk class. For high-risk variants, these are formalised; for standard SKUs,
    they support good operational hygiene and give deployers somewhere to plug in.
  owner: PB
  applies: C
  applies_rationale: Conditional (binding) for high-risk; built-in for all SKUs.
