- id: eu-ai-act-art-25
  kind: article
  native_id: Article 25
  group: Articles
  group_name: EU AI Act Articles
  title: Responsibilities along the AI value chain (role-flips)
  requirement: A distributor, importer, deployer, or other third party becomes a provider of a high-risk
    system if it (a) puts its name/trademark on it, (b) makes a substantial modification, or (c) modifies
    the intended purpose of an AI system (including a GPAI system) into a high-risk Annex III use. The
    original provider is then relieved of obligations for that new system but must cooperate. For Annex
    I safety-component cases, the product manufacturer is the provider. Providers and third parties must
    agree in writing on the information and technical access necessary for compliance.
  pb_interpretation: Single most important article for PB's commercial posture. Whenever a customer turns
    PB into a high-risk Annex III tool, Art 25(1)(c) flips the customer to provider — but only IF PB has
    been clear in instructions/contract that its system is not for that use. If PB is loose, both PB and
    customer can wind up co-liable. One sentence from a salesperson can flip the analysis.
  owner: PB/SH
  applies: Y
  applies_rationale: Rule applies to PB's contractual posture even when no high-risk use is happening.
  triggered_by_scenarios:
  - scn-eu-d
  - scn-eu-e
  - scn-eu-f
  - scn-eu-g
  documented_evidence:
  - MSA/Order Form clause set
  - AUP
  - Article 25 cooperation playbook
  - Supplier contract templates
  operational_evidence: Contract review; legal sign-off; sample customer file.
  audit_methods:
  - Insp
  - Samp
  cadence: Per contract / annual
  pitfall: Sales saying 'yes, you can use this for HR ranking' — that single sentence can flip role allocation.
  maturity_target: AR
  remediation: Standard contract language; sales staff trained on Article 25.
  external_safe_claim: PrivateBox is not placed on the market as a high-risk AI system. Customers who
    change the intended purpose of the system to a high-risk use case as defined in Annex III assume the
    provider obligations under Article 25(1)(c) of the EU AI Act, and PrivateBox provides reasonable cooperation
    in line with Article 25(2).
  crosswalk:
  - framework: iso-27001
    refs:
    - iso-27001-a-5.19
    note: >-
      Supplier relationships — Art 25(4) written agreements
  - framework: iso-27001
    refs:
