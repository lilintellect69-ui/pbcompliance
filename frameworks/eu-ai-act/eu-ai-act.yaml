- id: eu-ai-act-art-13
  kind: article
  native_id: Article 13
  group: Articles
  group_name: EU AI Act Articles
  title: Transparency and Provision of Information to Deployers (high-risk)
  requirement: 'High-risk systems shall be designed and developed in such a way as to ensure their operation
    is sufficiently transparent to enable deployers to interpret the system''s output and use it appropriately.
    Instructions for use must accompany the system, providing concise, complete, correct, clear information
    including: provider identity; characteristics, capabilities, and limitations; foreseeable misuse;
    technical capabilities; specifications of input data; performance metrics; risks; circumstances that
    may affect output reliability; human oversight measures; computational and hardware resources; expected
    lifetime; maintenance and care; logs.'
  pb_interpretation: '''Instructions for use'' is the central deployer-facing artifact. PB ships an Instructions
    for Use pack covering Art 13(3) topics. Even non-high-risk deployments benefit from this shape — it
    doubles as customer onboarding material.'
