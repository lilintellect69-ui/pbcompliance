  - Dual-role declaration
  - Teraco contingency note
  why_auditor_cares: Cl. 4.3 — defines what is and is not in PIMS scope.
  cadence: Annual + on change
  typical_owner: PB
- id: privacy_policy
  name: Internal privacy policy + public privacy notice
  examples:
  - Internal policy aligned to controls
  - Public layered notice
  - Dual-role disclosure
