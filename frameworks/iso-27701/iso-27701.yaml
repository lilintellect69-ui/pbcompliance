- id: iso-27701-a3-8.13
  kind: control_shared
  native_id: '8.13'
  group: A.3
  group_name: Shared security controls
  title: Backup integrity & access
  objective: Backup operations protect PII.
  applies: C
  applies_rationale: Conditional on backup-support service activation.
  pb_interpretation: When PB performs backups (optional service), full A.2 processor obligations attach.
    Encrypted backups; tested restore.
  owner: PB/SH
  role_applicability:
    controller: Y
    processor: Y
  implementation: Backup procedure; encryption; access control.
  evidence: Procedure; configuration.
  audit_methods:
  - Insp
  - Obs
  cadence: Per backup cycle + annual restore test
  pitfall: Untested backups; backups offshore without basis.
  maturity_target: AR
  external_safe_phrasing: Backup operations follow documented privacy-preserving procedures.
  business_models:
  - on-prem
  - ai-factory
  crosswalk:
  - framework: iso-27001
    refs:
    - iso-27001-a-8.13
    note: >-
      ISO/IEC 27701:2025 A.3 controls explicitly align to ISO/IEC 27002:2022 themes — same numbering,
      privacy lens.
  companion_refs:
  - iso-27002
  source_refs:
  - ISO/IEC 27701:2025 A.3 (8.13)
  - ISO/IEC 27002:2022 8.13
