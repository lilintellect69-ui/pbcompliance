  typical_owner: PB
- id: controller_processor_matrix
  name: Controller/Processor scenario matrix
  examples:
  - Per-activity role allocation
  - Why role allocation
  - Required clauses/controls per scenario
  why_auditor_cares: Demonstrates dual-role discipline; shows PB has thought through every processing
    flow.
  cadence: On change / annual
  typical_owner: PB
- id: dpa_template
  name: DPA template (Article 28 + POPIA s.21 + AI no-train + transfers + audit + termination)
