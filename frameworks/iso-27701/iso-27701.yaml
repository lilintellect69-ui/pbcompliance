scenarios:
- id: scn-27701-a
  name: Pure on-prem, no remote support — vendor never touches client data
  framework_specific_id: Scenario A
  description: PrivateBox is deployed on customer infrastructure with no support layers active. PB has
    no role for client data; PB is only a controller for its own corporate data.
  applies_to_business_models:
  - on-prem
  pb_role: controller
  customer_role: controller
  why_role_allocation: Vendor never accesses customer PII when no support layers active.
  contractual_implication: Customer-only DPA mostly N/A re client data; standard EULA + PB privacy notice
    for own data.
  required_clauses_or_terms: Standard EULA + privacy notice for PB-side data only.
  required_operational_control: None re client data.
  risk_if_misclassified: Treating PB as 'always processor' inflates obligations and complicates contracts.
  sales_safe_explanation: When deployed without optional support, PrivateBox does not process client data
    on the customer's behalf.
  triggered_requirements:
  - requirement_id: iso-27701-cl-4.3
    scenario_specific_note: Scope statement should distinguish this baseline mode.
- id: scn-27701-b
  name: On-prem with vendor update delivery
  framework_specific_id: Scenario B
  description: Update channel is vendor-driven; metadata may flow back. PB acts as processor (limited)
    for any PII in update telemetry, controller for diagnostics where it sets purposes.
  applies_to_business_models:
  - on-prem
  pb_role: processor
  customer_role: controller
  why_role_allocation: Update channel is vendor-driven; metadata flow makes PB processor for any PII.
  contractual_implication: DPA needed if any PII in update telemetry.
  required_clauses_or_terms: Article 28 + signed updates + telemetry minimisation.
  required_operational_control: Signed packages; allow-listed channels.
  required_evidence:
  - Update integrity standard
  - Telemetry specification
  risk_if_misclassified: If treated as 'no role', any PII leak becomes silent breach.
  sales_safe_explanation: Updates are delivered via signed channels under documented terms.
  triggered_requirements:
  - requirement_id: iso-27701-a2-2
    scenario_specific_note: Customer agreement covers update channel.
  - requirement_id: iso-27701-a2-3
    scenario_specific_note: Update telemetry must not be repurposed for own use.
  - requirement_id: iso-27701-a2-16
    scenario_specific_note: Update infra vendors registered as sub-processors.
- id: scn-27701-c
  name: On-prem with telemetry
  framework_specific_id: Scenario C
  description: 'Telemetry pipeline streams metadata back to PB. PB role depends on telemetry contents:
    controller for diagnostics PB defines purposes for, processor when customer content present.'
  applies_to_business_models:
  - on-prem
  pb_role: processor
  customer_role: controller
  why_role_allocation: Depends on what telemetry contains and who decides purposes.
  contractual_implication: Dual-role DPA; opt-out mechanism.
  required_clauses_or_terms: Define purposes; minimisation; opt-out.
  required_operational_control: Telemetry filter; redaction.
  required_evidence:
  - Telemetry minimisation specification
  - Sample data
  risk_if_misclassified: Misclassifying as controller-only when content present is a breach exposure.
  sales_safe_explanation: Telemetry is minimised, configurable, and governed by dual-role terms.
  triggered_requirements:
  - requirement_id: iso-27701-a1-2
    scenario_specific_note: Identify and document purposes for telemetry.
  - requirement_id: iso-27701-a1-3
    scenario_specific_note: Lawful basis for diagnostic processing.
  - requirement_id: iso-27701-a2-2
    scenario_specific_note: Customer instructions where telemetry contains customer data.
  - requirement_id: iso-27701-a2-3
    scenario_specific_note: No repurposing of customer content.
- id: scn-27701-d
  name: On-prem with support access
  framework_specific_id: Scenario D
  description: PB engineer accesses customer environment to diagnose; sessions may include access to prompts,
    outputs, system parameters, customer data.
  applies_to_business_models:
  - on-prem
  - ai-factory
  pb_role: processor
  customer_role: controller
  why_role_allocation: Vendor processes customer data on instruction during support sessions.
  contractual_implication: DPA with explicit support-access terms; per-session approval.
  required_clauses_or_terms: Confidentiality, JIT, recording, deletion.
  required_operational_control: Support access SOP; PAM logs; session recording.
  required_evidence:
  - Support access SOP
  - PAM logs
  - Per-session approval records
  risk_if_misclassified: Standing access without DPA = unauthorised processing exposure.
  sales_safe_explanation: Support sessions are time-boxed, recorded, and approved per request.
  triggered_requirements:
  - requirement_id: iso-27701-a2-2
    scenario_specific_note: Customer instructions cover support sessions.
  - requirement_id: iso-27701-a2-6
    scenario_specific_note: Confidentiality undertakings for support engineers.
  - requirement_id: iso-27701-a2-8
    scenario_specific_note: DSAR-assist obligations during support.
  - requirement_id: iso-27701-a2-14
    scenario_specific_note: Notify on disclosure requests.
- id: scn-27701-e
  name: Managed deployment support
  framework_specific_id: Scenario E
  description: PB performs initial deployment configuration touching customer PII (e.g., directory sync,
    initial ingestion).
  applies_to_business_models:
  - on-prem
  - ai-factory
  pb_role: processor
  customer_role: controller
  why_role_allocation: PB performs configuration touching PII on customer instruction.
  contractual_implication: DPA + specific deployment SOW.
  required_clauses_or_terms: Article 28 full; deletion at end.
  required_operational_control: Deployment SOP; deletion certificates.
  required_evidence:
  - Deployment SOP
  - Deletion certificates
  risk_if_misclassified: Treating as 'consulting' with no DPA = silent breach.
  sales_safe_explanation: Managed deployment is performed under a processor agreement.
  triggered_requirements:
  - requirement_id: iso-27701-a2-2
    scenario_specific_note: DPA covers deployment scope.
  - requirement_id: iso-27701-a2-10
    scenario_specific_note: Deletion at end of deployment engagement.
- id: scn-27701-f
  name: Troubleshooting sessions involving customer data
  framework_specific_id: Scenario F
  description: Live troubleshooting sessions where PB engineer interactively processes customer PII (reading
    logs, examining outputs).
  applies_to_business_models:
  - on-prem
  - ai-factory
  pb_role: processor
  customer_role: controller
  why_role_allocation: Direct PII processing on customer instruction during session.
  contractual_implication: Per-session terms; data-minimisation.
  required_clauses_or_terms: NDA; redaction; case file deletion.
  required_operational_control: Session log; deletion record; per-session approval.
  required_evidence:
  - Session logs
  - Deletion records
  risk_if_misclassified: Logs retained beyond session purpose = retention violation.
  sales_safe_explanation: Troubleshooting sessions follow documented privacy controls.
  triggered_requirements:
  - requirement_id: iso-27701-a2-9
    scenario_specific_note: Temp files and session captures must be deleted.
- id: scn-27701-g
  name: Document ingestion / RAG setup support
  framework_specific_id: Scenario G
  description: PB structures and ingests customer documents into RAG corpus; potentially involves sensitive
    PII at scale.
  applies_to_business_models:
  - on-prem
  - ai-factory
  pb_role: processor
  customer_role: controller
  why_role_allocation: PB processes customer documents on customer instruction; setup is processor activity.
  contractual_implication: DPA with RAG-specific data-handling annex.
  required_clauses_or_terms: No-train clause; deletion; minimisation.
  required_operational_control: RAG ingestion SOP; deletion runbook.
  required_evidence:
  - RAG ingestion SOP
  - Per-engagement deletion records
  risk_if_misclassified: RAG corpus retained for own model improvement = no-train violation.
  sales_safe_explanation: RAG setup is performed under processor terms with no-train commitment.
  triggered_requirements:
  - requirement_id: iso-27701-a2-2
    scenario_specific_note: Customer instructions define RAG corpus scope.
  - requirement_id: iso-27701-a2-3
    scenario_specific_note: No-train commitment for RAG content.
  - requirement_id: iso-27701-a1-12
    scenario_specific_note: Privacy by design in RAG architecture.
- id: scn-27701-h
  name: Backup support
  framework_specific_id: Scenario H
  description: PB performs backup operations on customer's behalf; storage and handling of backup data
    falls under PB's processor scope.
  applies_to_business_models:
  - on-prem
  - ai-factory
  pb_role: processor
  customer_role: controller
  why_role_allocation: PB stores/handles backups containing customer PII.
  contractual_implication: DPA + storage location + encryption commitments.
  required_clauses_or_terms: Encrypted backups; tested restore.
  required_operational_control: Backup procedure; encryption configuration.
  required_evidence:
  - Backup procedure
  - Restore test records
  risk_if_misclassified: Backups offshore without lawful basis = transfer violation.
  sales_safe_explanation: Backup support is governed by processor terms with regional storage options.
  triggered_requirements:
  - requirement_id: iso-27701-a2-2
    scenario_specific_note: DPA covers backup scope.
  - requirement_id: iso-27701-a2-10
    scenario_specific_note: Backup deletion at end of contract.
- id: scn-27701-i
  name: Integration / connector support
  framework_specific_id: Scenario I
  description: PB designs and deploys integrations / connectors between PrivateBox and customer systems
    (CRM, email, file shares); connector design touches PII flow.
  applies_to_business_models:
  - on-prem
  - ai-factory
  pb_role: processor
  customer_role: controller
  why_role_allocation: PB designs PII flows on customer instruction; connector implementation is processor
    activity.
  contractual_implication: DPA with connector annex.
  required_clauses_or_terms: Per-connector PIA; minimisation.
  required_operational_control: Connector PIA; design doc.
  required_evidence:
  - Connector PIA
  - Connector design doc
  risk_if_misclassified: Over-broad connector scope = excessive processing.
  sales_safe_explanation: Connectors are deployed after a privacy review.
  triggered_requirements:
  - requirement_id: iso-27701-a1-12
    scenario_specific_note: Privacy by design in connector architecture.
  - requirement_id: iso-27701-a2-2
    scenario_specific_note: Customer instructions define connector scope.
- id: scn-27701-j
  name: Hosted update repository / model package distribution
  framework_specific_id: Scenario J
  description: PB hosts an update / model-package repository serving customer deployments; metadata (deployment
    IDs, versions, last-checked timestamps) flows to PB.
  applies_to_business_models:
  - on-prem
  - ai-factory
  pb_role: processor
  customer_role: controller
  why_role_allocation: Processor for any PII in metadata; controller for repo-side telemetry purposes
    PB defines.
  contractual_implication: DPA + SCCs/IDTAs if outside region.
  required_clauses_or_terms: Signed packages; SBOM; transfer basis.
  required_operational_control: Repo telemetry spec; signed updates.
  required_evidence:
  - Repo telemetry specification
  - SBOM
  risk_if_misclassified: Implicit cross-border transfers without lawful basis.
  sales_safe_explanation: Update repository operations are governed and disclosed.
  triggered_requirements:
  - requirement_id: iso-27701-a1-13
    scenario_specific_note: Transfer basis for repo telemetry.
  - requirement_id: iso-27701-a2-11
    scenario_specific_note: Disclose processing locations to customer.
- id: scn-27701-k
  name: Future Teraco-hosted single-tenant deployment
  framework_specific_id: Scenario K
  description: PB activates Teraco hosting; customer deploys into a single-tenant ringfenced footprint
    in Teraco DC. PB acts as processor in full; ISO 27018:2025 obligations attach directly. POPIA s.72
    + GDPR Ch. V transfer rules become live for non-SA customers.
  applies_to_business_models:
  - ai-factory
  pb_role: processor
  customer_role: controller
  why_role_allocation: PB operates the host (single-tenant) — full processor scope.
  contractual_implication: Hosting DPA; SLA; section-72 evidence.
  required_clauses_or_terms: Customer-key option; data residency in SA; audit rights.
  required_operational_control: 27018-aligned controls; Teraco compliance pack inheritance.
  required_evidence:
  - Hosting DPA
  - 27018:2025 SoA delta
  - Teraco ISAE 3402 / PCI DSS attestation copies
  - Section-72 compliance memo
  risk_if_misclassified: Mistreating as 'still on-prem' = inheriting wrong controls.
  sales_safe_explanation: Teraco-hosted PrivateBox operates as a processor with cloud-PII protections
    aligned to ISO/IEC 27018:2025.
  notes: Activates 27018:2025 (companion standard). Cross-references oq-27701-teraco-activation.
  triggered_requirements:
  - requirement_id: iso-27701-a2-2
    scenario_specific_note: Hosting DPA covers entire processor scope.
  - requirement_id: iso-27701-a2-10
    scenario_specific_note: Exit and portability mechanism critical.
  - requirement_id: iso-27701-a2-11
    scenario_specific_note: POPIA s.72 + GDPR Ch. V transfer evidence.
requirements:
- id: iso-27701-cl-4.1
  kind: clause
  native_id: '4.1'
  group: '4'
  group_name: Context of the organization
  title: Understanding the organization and its context
  requirement: Determine internal and external issues including climate change, regulatory, technological
    context relevant to the PIMS.
  pb_interpretation: On-prem AI for confidential firms is highly contextual. Document understanding of
    legal-firm/finance customer pressures, SA/Teraco context, AI evolution context, and climate change
    considerations.
  owner: PB
  documented_evidence:
  - Context analysis document
  - PESTLE/SWOT
  - Regulatory horizon scan
  - AI-trend register
  operational_evidence: Cite specific regulations and risks; review minutes referencing context; reviewed
    by leadership ≥1×/year.
  audit_methods:
  - Insp
  - Int
  cadence: Annual + on regulatory or product change
  failure_modes: Generic context unrelated to AI/privacy; no climate/AI references.
  maturity_target: AR
  external_safe_claim: PrivateBox maintains a documented context analysis aligned with ISO/IEC 27701:2025
    Clause 4.1.
  business_models:
  - on-prem
  - ai-factory
  crosswalk:
  - framework: iso-27001
    refs:
    - iso-27001-cl-4.1
    note: >-
      Annex SL High-Level Structure — clauses 4-10 are 1:1 across ISO management-system standards.
  source_refs:
  - ISO/IEC 27701:2025 Cl. 4.1
- id: iso-27701-cl-4.2
  kind: clause
  native_id: '4.2'
  group: '4'
  group_name: Context of the organization
  title: Understanding the needs and expectations of interested parties
  requirement: Identify stakeholders including PII principals; their needs/expectations; legal and contractual
    obligations.
  pb_interpretation: Customer firms (controllers); regulators (ICO, IR-SA, EDPB); data subjects (employees
    of client firms); partners; certifiers. Customer is itself an interested party as both controller
    and operator of the host environment.
  owner: PB
  documented_evidence:
  - Stakeholder register
  - Customer expectation log
  - Regulator monitoring log
  operational_evidence: Register lists named parties and obligations; cross-checked with sales contract
    obligations.
  audit_methods:
  - Insp
  - Int
  cadence: On contract / regulatory change
  failure_modes: Lists only commercial customers; missing data subjects/regulators.
  maturity_target: AR
  external_safe_claim: PrivateBox maintains a documented interested-parties register including data subjects
    and regulators.
  business_models:
  - on-prem
  - ai-factory
  crosswalk:
  - framework: iso-27001
    refs:
    - iso-27001-cl-4.2
    note: >-
      Annex SL High-Level Structure — clauses 4-10 are 1:1 across ISO management-system standards.
  source_refs:
  - ISO/IEC 27701:2025 Cl. 4.2
- id: iso-27701-cl-4.3
  kind: clause
  native_id: '4.3'
  group: '4'
  group_name: Context of the organization
  title: Determining the scope of the PIMS
  requirement: Determine PIMS boundaries considering 4.1, 4.2, and processing of PII.
  pb_interpretation: 'Critical scope decisions: include product engineering, support operations, update
    infrastructure, telemetry pipelines, optional Teraco footprint. Exclude internal-HR-only systems if
    not relevant. Scope statement modelled on Slack/Salesforce/Orbita exemplars; explicit dual-role (controller
    AND processor) declaration.'
  owner: PB
  documented_evidence:
  - PIMS scope statement
  - SoA reference
  operational_evidence: Scope walkthrough with auditor; stable, justified, role-aware.
  audit_methods:
  - Insp
  cadence: Annual + on change
  failure_modes: Scope too narrow (excludes support); too broad (includes everything but resourced for
    nothing).
  maturity_target: AR
  external_safe_claim: Our PIMS covers PrivateBox product, support operations, update delivery and (when
    active) Teraco-hosted deployments.
  business_models:
  - on-prem
  - ai-factory
  crosswalk:
  - framework: iso-27001
    refs:
    - iso-27001-cl-4.3
    note: >-
      Annex SL High-Level Structure — clauses 4-10 are 1:1 across ISO management-system standards.
  source_refs:
  - ISO/IEC 27701:2025 Cl. 4.3
- id: iso-27701-cl-4.4
  kind: clause
  native_id: '4.4'
  group: '4'
  group_name: Context of the organization
  title: Privacy information management system
  requirement: Establish, implement, maintain, and continually improve the PIMS in accordance with the
    requirements of this document.
  pb_interpretation: 'Foundational: PIMS framework integrating ISMS (where 27001 held), AIMS (where 42001
    in scope). Not a paper-only management system.'
  owner: PB
  documented_evidence:
  - Top-level PIMS manual / framework document
  operational_evidence: Internal audit verifies integration, not bolt-on.
  audit_methods:
  - Insp
  - Int
  cadence: Annual
  failure_modes: Paper-only PIMS not integrated with operational reality.
  maturity_target: AR
  external_safe_claim: PrivateBox operates a documented Privacy Information Management System.
  business_models:
  - on-prem
  - ai-factory
  crosswalk:
  - framework: iso-27001
    refs:
    - iso-27001-cl-4.4
    note: >-
      Annex SL High-Level Structure — clauses 4-10 are 1:1 across ISO management-system standards.
  source_refs:
  - ISO/IEC 27701:2025 Cl. 4.4
- id: iso-27701-cl-5.1
  kind: clause
  native_id: '5.1'
  group: '5'
  group_name: Leadership
  title: Leadership and commitment
  requirement: Top management to demonstrate commitment, integrate PIMS into business processes, allocate
    resources.
  pb_interpretation: 'New 2025 emphasis: privacy is no longer subordinate to security. Leadership must
    approve on-prem privacy posture and shared-responsibility model.'
  owner: PB
  documented_evidence:
  - Privacy charter
  - Management endorsement
  - Resource commitment
  - Board minutes
  operational_evidence: Walkthrough with CEO/CTO; visible board engagement on privacy.
  audit_methods:
  - Insp
  - Int
  cadence: Annual
  failure_modes: Privacy delegated to IT only; leadership disengaged.
  maturity_target: AR
  external_safe_claim: Top management has formally established and resourced a PIMS.
  business_models:
  - on-prem
  - ai-factory
  crosswalk:
  - framework: iso-27001
    refs:
    - iso-27001-cl-5.1
    note: >-
      Annex SL High-Level Structure — clauses 4-10 are 1:1 across ISO management-system standards.
  source_refs:
  - ISO/IEC 27701:2025 Cl. 5.1
- id: iso-27701-cl-5.2
  kind: clause
  native_id: '5.2'
  group: '5'
  group_name: Leadership
  title: Privacy policy
  requirement: Establish a privacy policy with objectives, commitment to legal requirements, and continual
    improvement.
  pb_interpretation: Internal privacy policy + public privacy notice. Procurement reviewers ask for this
    first. Should explicitly describe on-prem-by-default and shared-responsibility.
  owner: PB
  documented_evidence:
  - Internal privacy policy
  - Public privacy notice
  operational_evidence: Compare published vs internal version; versioned, reviewed annually, signed by
    management.
  audit_methods:
  - Insp
  cadence: Annual
  failure_modes: Generic privacy policy lifted from a template.
  maturity_target: AR
  external_safe_claim: PrivateBox maintains a documented privacy policy reviewed at least annually.
  business_models:
  - on-prem
  - ai-factory
  crosswalk:
  - framework: iso-27001
    refs:
    - iso-27001-cl-5.2
    note: >-
      Annex SL High-Level Structure — clauses 4-10 are 1:1 across ISO management-system standards.
  source_refs:
  - ISO/IEC 27701:2025 Cl. 5.2
- id: iso-27701-cl-5.3
  kind: clause
  native_id: '5.3'
  group: '5'
  group_name: Leadership
  title: Roles, responsibilities and authorities
  requirement: Assign PIMS roles, including privacy lead/DPO equivalent.
  pb_interpretation: Required for procurement DDQs. DPO not legally mandatory in all cases but practically
    essential for AI/PII vendor. Independent privacy lead with reporting line to management.
  owner: PB
  documented_evidence:
  - Org chart
  - RACI matrix
  - DPO appointment letter / role description
  operational_evidence: Interview the role-holder; verify reporting line independence.
  audit_methods:
  - Insp
  - Int
  cadence: Annual + on appointment change
  failure_modes: Privacy 'owned' by CTO with no separation.
  maturity_target: AR
  external_safe_claim: PrivateBox has appointed a privacy lead with documented authority.
  business_models:
  - on-prem
  - ai-factory
  crosswalk:
  - framework: iso-27001
    refs:
    - iso-27001-cl-5.3
    note: >-
      Annex SL High-Level Structure — clauses 4-10 are 1:1 across ISO management-system standards.
  source_refs:
  - ISO/IEC 27701:2025 Cl. 5.3
