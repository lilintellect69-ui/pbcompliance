    audit_ready: Purposes tied to controls; reviewed annually; each entry traceable to lawful basis and
      retention rule.
  maturity_target: AR
  external_safe_phrasing: Each processing activity has a documented purpose and lawful basis.
  business_models:
  - on-prem
  - ai-factory
  crosswalk: []
  legacy_ref: A.7.2.1 (2019)
