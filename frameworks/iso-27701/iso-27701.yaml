- id: iso-27701-a1-2
  kind: control_ctrl
  native_id: '2'
  group: A.1
  group_name: Controller controls
  title: Identify and document purpose
  objective: Identify, document, and justify purpose for processing PII.
  applies: Y
  applies_rationale: PB acts as controller for own corporate, telemetry, and lead data.
  pb_interpretation: 'On-prem reduces purposes (no analytics-on-customer-content) but PB still has multiple
    controller-side purposes: telemetry, support metadata, leads, marketing comms. Each must have a documented
    purpose.'
  owner: PB
  role_applicability:
    controller: Y
    processor: N
    controller_note: PB's controller scope.
