  - Master DPA
  - Per-engagement annexes
  - AI-specific clauses (no-train)
  why_auditor_cares: Annex A.1.6 + A.2.x — processor contracts required.
  cadence: Annual + on regulatory change
  typical_owner: PB
- id: subprocessor_register
