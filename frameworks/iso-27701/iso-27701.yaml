- id: iso-27701-a3-7.x
  kind: control_shared
  native_id: 7.x
  group: A.3
  group_name: Shared security controls
  title: Physical security
  objective: Physical security of PII processing facilities.
  applies: C
  applies_rationale: Customer-owned in on-prem default; inherited from host in Teraco scenario.
  pb_interpretation: 'On-prem default: less directly applicable (customer-owned facility). Teraco scenario:
    inherits Teraco''s ISAE 3402 / PCI DSS attestations; PB documents the inheritance.'
  owner: SH
  role_applicability:
    controller: Y
    processor: Y
  implementation: Physical-security mapping document; Teraco compliance pack inheritance for hosted scenario.
  evidence: Mapping doc; Teraco attestation copies.
  audit_methods:
  - Insp
  cadence: Annual
  pitfall: Asserted but not documented; claiming Teraco's certifications as PB's own.
  maturity_target: AR
  external_safe_phrasing: Physical security relies on customer-owned facility or Teraco-attested colocation.
  business_models:
  - on-prem
  - ai-factory
  crosswalk:
  - framework: iso-27001
    refs:
    - iso-27001-a-7.1
    - iso-27001-a-7.2
    - iso-27001-a-7.3
    - iso-27001-a-7.4
    note: >-
      ISO/IEC 27701:2025 A.3 controls explicitly align to ISO/IEC 27002:2022 themes — same numbering,
      privacy lens.
  companion_refs:
  - iso-27002
  - iso-27018
  source_refs:
  - ISO/IEC 27701:2025 A.3 (7.x)
  - Teraco ISAE 3402 / PCI DSS
