# ISO/IEC 42001:2023 — PrivateBox alignment record (schema v2)
# Source-of-truth file for the GRC OS. Edits go in version control.
#
# Schema: see /docs/schema-v2.md
# PB-curated source pack: frameworks/iso-42001/source/privatebox-iso-ai-governance-architecture.md
# Pending crosswalks (NIST AI RMF, POPIA, King V): frameworks/iso-42001/PENDING-CROSSWALKS.md
#
# Companions: ISO/IEC 42005:2025 (impact-assessment guidance) and ISO/IEC 42006:2025 (CB requirements)
# are companion_standards, not separate frameworks. 42005 may be promoted to a separate YAML in a
# later milestone (oq-42001-42005-separate).

schema_version: '2.0'
id: iso-42001
version: '2023'
full_name: ISO/IEC 42001:2023 Information technology — Artificial intelligence — Management system
type: management_system_standard
issuer: ISO/IEC
audit_type: certification
certifiable: true
pb_interpretation_version: '1.0'
pb_interpretation_owner: null
pb_interpretation_last_reviewed: null
roles:
- ai_governance_lead
- model_risk_lead
- ai_security_lead
- data_rag_steward
- support_ai_liaison
- ai_governance_committee
- top_management
tiers: []
effective_dates: []

companion_standards:
- id: iso-42005
  name: AI System Impact Assessment
  version: '2025'
  role: >-
    Guidance standard (not certifiable). Provides 10-element AISIA methodology referenced from Clause
    6.1.4 and Annex A.5 controls. May be promoted to a separate framework YAML — see oq-42001-42005-separate.
- id: iso-42006
  name: Requirements for AI management system certification bodies
  version: '2025'
  role: >-
    Governs accreditation of certification bodies, not orgs. PB benchmarks audit-readiness against
    42006 expectations (auditor competence, audit-time calculation, sampling). Never claim "ISO 42006
    compliant" — it is for CBs.
- id: iso-22989
  name: Artificial intelligence concepts and terminology
  version: '2022'
  role: Normatively referenced from 42001 for definitions. Aligned terminology used throughout.
- id: iso-23894
  name: Information technology — Artificial intelligence — Guidance on risk management
  version: '2023'
  role: >-
    Reference methodology for Clause 6.1 AI risk assessment. Used to deepen Annex C-driven risk-source
    analysis.

pb_application:
  why_chosen: >-
    ISO/IEC 42001 is the foundational AI Management System (AIMS) standard for a vendor selling
    AI-platform technology to confidential firms. PrivateBox's on-premises architecture is a control,
    not a governance system; AIMS duties (policy, governance, impact assessment, lifecycle, supplier
    governance, transparency, oversight, incident handling, continual improvement) remain in scope
    regardless of deployment model. 42001 is the natural extension of PB's ISO 27001 ISMS and ISO 27701
    PIMS — it shares the Annex SL high-level structure, allowing a single integrated management system
    rather than three parallel systems. Commercially, 42001 is the AIMS standard buyers in legal,
    finance and healthcare procurement processes ask about (see Anthropic, AWS, Google, Microsoft,
    Workday, Cognizant accredited certifications listed in source pack §14). PB's positioning is
    "designed in alignment with ISO/IEC 42001:2023" pre-certification, with an accredited-certification
    roadmap benchmarked to ISO/IEC 42006:2025 audit expectations. Never claim "ISO 42001 certified"
    until and unless an accredited certification body issues a certificate against a defined AIMS scope.
  scope_decisions:
    on_prem:
      coverage: full
      rationale: >-
        AIMS scope statement (per source §2 target wording): "The design, development, packaging,
        distribution, support, and continual improvement of the PrivateBox on-premises single-tenant
        AI platform, including its model selection/evaluation pipeline, RAG and connector framework,
        update and telemetry services, and customer support operations. Excluded: customer-operated
        deployments after handover, customer fine-tuning of models inside their environment, and
        customer-provided data — these remain under the customer's own AIMS / governance." This scope
        is product-and-operations bounded, deliberately narrow enough to be defensible in a Stage-1
        audit, broad enough to cover every layer the customer touches at procurement.
    ai_factory:
      coverage: partial
      rationale: >-
        AIMS scope extends in principle to ringfenced multi-tenant deployments at a partner data
        centre. Several controls have divergent ownership pending partner-DC selection (see
        oq-partner-dc-selection): A.4.5 system/computing resources, A.6.2.5 deployment, A.10
        supplier programme. Where ownership genuinely differs, requirements carry owner_by_model with
        the AI Factory side flagged status:pending. Until partner DC is selected, PB cannot finalise
        Stage-1 audit scope for the AI Factory model. AI Factory remains aspirational; no AI Factory
        certification claim should be made.
  top_risks:
  - >-
    Misclassifying PB's AI role (provider vs deployer) — leads to wrong AIMS duties, wrong contract
    language, exposure to obligations the customer should bear (Annex C.2.1, A.10.4).
  - >-
    AIMS scope drift in marketing claims that imply PB governs customer AI use, creating joint-controller
    legal exposure under POPIA/GDPR (§2 A6, §10 red-flag list).
  - >-
    Foreseeable-misuse coverage in AISIA records (ISO 42005 6.8.3) — one of the most commonly
    under-implemented elements per source §6 caveat 8; mandatory in every AISIA, not best-practice
    add-on.
  - >-
    Bias methodology that is awareness-only rather than measurable — major nonconformity per
    Schellman/orbit.reconn.io findings (Annex C.2.5, A.6.1.4).
  - >-
    Third-party / open-weight model supply chain (Llama, Mistral) — A.10.2 supplier governance
    cannot be excluded; "pulled-from-Hugging-Face" model adoption without due diligence is a known
    finding pattern.
  - >-
    Hidden change management — silent retrains, RAG-corpus updates, prompt-template changes that
    bypass change control (Clause 6.3, A.6).
  - >-
    Telemetry boundary leakage — customer content (vs operational metadata) crossing trust boundary
    creates POPIA/GDPR exposure (A.7.5, §7 telemetry scenario).
  - >-
    Internal audit conducted by the AIMS team itself — auditor independence is required by Clause 9.2
    and emphasised by ISO/IEC 42006; failing this is a Stage-2 finding pattern.

soa_guidance:
  principles: >-
    The Statement of Applicability is the bridge between AIMS scope, AI risk treatment and Annex A
    control implementation. Auditors read it first. Per source §5 and §15, every Annex A control
    must appear in PB's SoA with: applicability decision (Y/Shared/Conditional/N/A), implementation
    status, owner, evidence pointer, and risk-based justification. SoA must reflect the published
    Annex A numbering — source §5 flags a known industry discrepancy (38 vs 39 vs 42 controls)
    tracked in oq-42001-annex-numbering. PB should add a deployment-model column showing whether
    each control is PB-owned, CL-owned or SH for on-prem vs AI Factory. That makes the SoA defensible
    in enterprise procurement and reduces audit-time per ISO/IEC 42006.
  na_justification_rules: >-
    Per Note 3 of Clause 6.1.3, exclusions are permitted with documented justification. Tie every
    exclusion to scope boundaries, architecture facts, accepted residual risk, or alternative controls.
    A.10.2 (suppliers) and A.7 (data) cannot be excluded by an org that uses third-party models
    or processes any data — these are always in scope for PB. Empty justifications are a known
    Schellman finding pattern.
  honesty_rules: >-
    The SoA must not imply controls are implemented when they are planned, customer-owned or out of
    scope. Show the implemented/planned state honestly. External-facing SoA summaries follow the
    safe-claim language in source §10 and §17 — never claim "100% covered" without showing exclusion
    justifications. Preserve a line back to the AI risk register and AISIA records.

shared_responsibility_model:
- area: AIMS governance (the management system itself)
  pb_owned: PB AIMS — covering PB's design/build/distribution/support of the platform.
  cl_owned: Customer AIMS — covering customer's deployment, use, fine-tuning, customer-data governance.
  shared_note: >-
    Per source §2 A6, PB does NOT govern the customer's AI use. Two AIMS, one trust interface.
- area: AI Policy
  pb_owned: PB AI Policy v1.x (top-management approved).
  cl_owned: Customer's own AI policy for their internal AI use.
  shared_note: PB provides a policy-template starter; customer adapts to sector and context.
- area: AI risk methodology
  pb_owned: PB AI risk methodology (product-level risks, supply chain, lifecycle).
  cl_owned: Customer-side AI risk register for their use cases.
  shared_note: Methodologies aligned to ISO 23894 + Annex C; cross-readable.
- area: AI System Impact Assessment (AISIA)
  pb_owned: AISIA at product / feature level; PB provides 42005-aligned methodology.
  cl_owned: AISIA at customer use-case level (sector, decision context, affected populations).
  shared_note: Per A.5 and §12. PB provides Annex-E-style template; customer adapts per use case.
- area: AI lifecycle / SDLC
  pb_owned: SDLC for the product, integrating NIST SP 800-218A; build, train, V&V, package, deploy.
  cl_owned: Customer change management for their deployment, fine-tuning, RAG corpus.
  shared_note: NIST 800-218A used as overlay on the build pipeline.
- area: Deployment approval
  pb_owned: PB pre-deployment gate before shipping a build/release.
  cl_owned: Customer's own go/no-go for installing into their environment.
  shared_note: Per A.6.2.5. PB ships, customer accepts; both retain approval records.
- area: Operation / monitoring
  pb_owned: Product-level KPIs, drift detectors in the product, vendor-side incident triage.
  cl_owned: Customer operates the deployed system; primary monitoring of their use.
  shared_note: Telemetry boundary defines what PB sees (operational metadata only by default).
- area: Incident handling
  pb_owned: Vulnerability triage, product-side advisories, EU AI Act Art. 73 serious-incident notifications for product flaws.
  cl_owned: Incident handling for customer's use-case-side incidents.
  shared_note: 15-day serious-incident window (EU AI Act); 72-hour breach window (POPIA s.22).
- area: Telemetry
  pb_owned: Telemetry pipeline; data dictionary; PII-free guarantee.
  cl_owned: Customer accepts/declines telemetry per opt-in.
  shared_note: Default-off or strictly-bounded; customer-content never in telemetry.
- area: Support access
  pb_owned: Just-in-time access workflow; session recording; access reviews.
  cl_owned: Customer approves each session; session is fully logged.
  shared_note: Standing access is forbidden — a known §7 pitfall.
- area: Update / package distribution
  pb_owned: Cryptographically signed updates; SBOM; vulnerability disclosures; staged rollout.
  cl_owned: Customer-controlled update windows; rollback authority.
  shared_note: Aligned to NIST SSDF / SLSA-equivalent supply-chain controls.
- area: Third-party model approval
  pb_owned: Approved-models list; model-card review; bias/safety eval; licence due diligence.
  cl_owned: Customer-side acceptance of models proposed for their deployment.
  shared_note: A.10.2. "Pulled-from-Hugging-Face" model adoption without DD is forbidden.
- area: RAG / data ingestion
  pb_owned: Ingestion framework, quality gates, sensitive-data handling controls.
  cl_owned: Customer owns the corpus, content rights, end-of-life data handling.
  shared_note: PB provides controls; customer attests rights and PII handling.

evidence_families:
- id: aims_scope_and_policy
  name: AIMS Scope Statement and AI Policy
  examples:
  - 1-page AIMS Scope Statement (top-management signed)
  - PrivateBox AI Policy v1.x with principles, prohibited uses, exceptions
  - Cross-policy alignment map (AI/InfoSec/Privacy/HR/Procurement)
  - Policy review log
  why_auditor_cares: Foundation of the AIMS; without it, every downstream control lacks anchor.
  cadence: Annual + on material change
  typical_owner: PB
- id: governance_and_roles
  name: Governance Charter and RACI
  examples:
  - AI Governance Charter
  - RACI matrix (AI Gov Lead, Model Risk Lead, AI Security Lead, Data/RAG Steward, Support AI Liaison)
  - AI Governance Committee Terms of Reference + minutes
  - Whistleblower / concern-reporting SOP and concern log
  why_auditor_cares: Tests whether AI governance is real (cross-functional + executive) or rubber-stamped.
  cadence: Annual + on org change
  typical_owner: PB
- id: ai_risk_artefacts
  name: AI Risk Methodology and Risk Register
  examples:
  - AI risk methodology document (aligned with ISO 23894 + Annex C)
  - AI risk register (per system in scope; treatments traceable to SoA)
  - Annex C risk-source coverage check
  why_auditor_cares: Pre-emptive against the "renamed InfoSec methodology" finding pattern.
  cadence: Quarterly review; per-system on change
  typical_owner: PB
- id: aisia_methodology_and_records
  name: AISIA Methodology (42005-aligned) and per-system AISIA records
  examples:
  - AISIA methodology covering 10 elements per ISO 42005:2025
  - Harm/benefit taxonomy aligned to 42005 Annex C
  - Annex-E-style AISIA template
  - Per-system AISIA records with foreseeable-misuse section completed
  - AISIA approval records
  why_auditor_cares: Compulsory under A.5 and Clause 6.1.4; foreseeable-misuse coverage is a common gap.
  cadence: Pre-deployment + on material change + scheduled review
  typical_owner: PB
- id: ai_system_inventory
  name: AI System Inventory
  examples:
  - Inventory of every model / system / version / dataset / owner / status / deployment locations
  - Approved-Models List with approval workflow
  - Intended-use and Prohibited-use Register (sector-specific)
  why_auditor_cares: Without an inventory, the SoA scope is indefensible.
  cadence: Continuous
  typical_owner: PB
- id: data_artefacts
  name: Data Provenance, Datasheets and RAG controls
  examples:
  - Datasheets per training/evaluation dataset (provenance, demographics, rights, labelling)
  - Data quality criteria and remediation records
  - RAG / data-ingestion controls SOP (rights, quality, sensitive-data handling)
  - Customer-data telemetry data dictionary + opt-in statement
  why_auditor_cares: Data provenance is consistently raised by orbit.reconn.io as a top finding pattern.
  cadence: Per dataset + per RAG corpus update + annual policy review
  typical_owner: PB
- id: bias_and_fairness
  name: Bias Assessment Methodology and reports
  examples:
  - Bias methodology with baselines + retest cadence
  - Pre-release bias evaluation reports
  - Drift / fairness monitoring reports
  - Sector-specific fairness criteria (hiring, credit, health)
  why_auditor_cares: A.6.1.4 is an EU AI Act gap area; awareness statements are not methodologies.
  cadence: Per release + drift-trigger
  typical_owner: PB
- id: vv_and_robustness
  name: V&V, Robustness and Adversarial Test artefacts
  examples:
  - Test plans (functional + adversarial + edge + drift + fairness + security)
  - V&V reports per release
  - Red-team / pen-test reports
  - Sign-off records
  why_auditor_cares: A.6.1.5; functional-only testing is a known weakness.
  cadence: Per release + drift-trigger
  typical_owner: PB
- id: lifecycle_and_change
  name: Lifecycle SOP and change management
  examples:
  - AI lifecycle SOP (cradle-to-grave; integrates NIST SP 800-218A)
  - Change-control templates including model-swap / RAG / prompt-template / environment changes
  - Decommissioning / sunset records
  - Pre-deployment approval-gate checklist + records
  why_auditor_cares: Long on-prem deployments amplify lifecycle and decommissioning gaps.
  cadence: Annual SOP review + per change
  typical_owner: PB
- id: human_oversight
  name: Human Oversight design and records
  examples:
  - Human Oversight SOP (override authority + monitoring + concern channel)
  - Per-system oversight design (where humans-in-the-loop sit, what they can stop)
  - Sector-specific oversight rules (healthcare, legal, finance default to human-in-the-loop)
  why_auditor_cares: A.6.2.3 + EU AI Act Art. 14; rubber-stamp oversight is an audit failure.
  cadence: Annual + per system release
  typical_owner: PB-SH
- id: logging_and_monitoring
  name: AI event logging, monitoring and KPIs
  examples:
  - AI Event-Logging Standard (schema, retention, integrity, customer-control)
  - Monitoring & KPI Dashboard Specification (drift, fairness, incidents, support tickets)
  - Drift detectors and threshold definitions
  why_auditor_cares: A.6.2.4 + 9.1; logs that exist but don't link to AIMS elements fail audit.
  cadence: Annual SOP review + continuous operation
  typical_owner: PB-SH
- id: incident_response
  name: Incident response and notification
  examples:
  - IR plan with severity tiers
  - 15-day EU AI Act Art. 73 serious-incident workflow
  - 72-hour POPIA s.22 breach pathway
  - Past incident records with cause/closure trace
  why_auditor_cares: Late notification is a regulatory exposure, not just a finding.
  cadence: Annual exercise + per incident
  typical_owner: PB
- id: supplier_and_model_dd
  name: Supplier and model-vendor due diligence
  examples:
  - Supplier / Model-Vendor DD pack including open-weight model evaluation
  - Approved-Models List
  - Per-model approval records (eval results, accepted residual risks, approver)
  - Contractual AI clauses with suppliers
  why_auditor_cares: A.10.2; cannot be excluded; "pulled-from-Hugging-Face syndrome" is a known finding.
  cadence: Per onboarding + annual review
  typical_owner: PB
- id: transparency_pack
  name: Customer-facing transparency / user information
  examples:
  - Transparency / User Information Pack (capabilities, limitations, conditions of non-use, change log)
  - Intended-use / Prohibited-use disclosures
  - Customer Shared-Responsibility Matrix (productised version of source §7)
  - Update-delivery / change-notification records
  why_auditor_cares: A.8 + EU AI Act Art. 13/50/52; sales-driven inflation is a typical risk.
  cadence: Per release + annual policy review
  typical_owner: PB
- id: support_and_telemetry
  name: Support access SOP and Telemetry data dictionary
  examples:
  - Support-Access SOP (just-in-time, customer-approved, fully logged)
  - Bastion / session recording records
  - Telemetry data dictionary + default-off / opt-in statement
  - Telemetry sampling proof
  why_auditor_cares: Hidden personal-data egress via telemetry is a POPIA/GDPR risk; standing support access is forbidden.
  cadence: Annual SOP review + continuous operation
  typical_owner: SH
- id: update_delivery
  name: Update delivery and supply-chain attestation
  examples:
  - Update-Delivery Standard (signing, SBOM, vulnerability disclosure, staged rollout)
  - Cryptographic signing manifests
  - SBOM per release
  - SLSA-equivalent supply-chain attestation
  why_auditor_cares: A.10.2 + NIST SSDF; software supply chain is a top vector.
  cadence: Per release
  typical_owner: PB
- id: internal_audit_and_review
  name: Internal Audit programme and Management Review
  examples:
  - Internal Audit Programme (independent of AIMS team)
  - Internal Audit Reports
  - Management Review pack (inputs/outputs template + minutes)
  - Annual review cycle records
  why_auditor_cares: 9.2 + 9.3; same team auditing itself fails impartiality requirement (42006).
  cadence: At least annual; more often during early maturity
  typical_owner: PB
- id: nc_and_capa
  name: Nonconformity and CAPA log
  examples:
  - NC / CAPA log entries (each with cause, action, effectiveness review, closure date)
  - Trend analysis across NCs
  - Lessons-learned writeups
  why_auditor_cares: 10.2; an NC log that records issues but never closes them is a finding pattern.
  cadence: Continuous
  typical_owner: PB
- id: soa_and_crosswalks
  name: Statement of Applicability and crosswalks
  examples:
  - SoA covering every Annex A control (applicability + status + owner + evidence pointer + justification)
  - Crosswalk Pack (42001 × 27001 × 27701 × NIST AI RMF × EU AI Act × POPIA × King V)
  - SoA with deployment-model annotations (PB / SH / CL per business model)
  why_auditor_cares: 6.1.3; auditor reads SoA first.
  cadence: At least annual + per scope change
  typical_owner: PB
- id: trust_pack_and_external_claims
  name: Trust Pack language guide and external claims log
  examples:
  - Trust-Pack Language Guide (pre-approved phrasing, red-flag list)
  - Public Trust Centre content
  - Procurement-response boilerplates (per source §17)
  - External-claims register (where each claim is made + supporting evidence pointer)
  why_auditor_cares: External overclaim creates regulatory and reputation exposure independent of audit.
  cadence: Quarterly + per major external event
  typical_owner: PB
- id: training_and_competence
  name: Competence matrix and training records
  examples:
  - Competence matrix (AI ethics, ML risk, AI secure SDLC, data governance, model evaluation, jurisdictional law)
  - Training plans and completion records
  - Awareness records (all staff, including support engineers)
  - External certifications held
  why_auditor_cares: 7.2; auditor samples randomly — staff who can't describe AI policy fail.
  cadence: Annual + on hire/role-change
  typical_owner: PB
- id: certification_readiness
  name: Certification readiness pack (42006-benchmarked)
  examples:
  - Stage-1-ready document set
  - Stage-2 evidence pack (operating effectiveness)
  - CB selection record (impartiality check — separation of advisory and audit)
  - Audit-time scope statement
  - Surveillance and recertification cycle plan
  why_auditor_cares: 42006 expectations shape what auditors will demand; pre-mapped evidence reduces audit time.
  cadence: Per audit cycle
  typical_owner: PB
- id: aisia_template_library
  name: AISIA template library (42005 Annex E-style)
  examples:
  - PB AISIA template covering 10 elements
  - Sector-specific AISIA addenda (healthcare safety case, finance fairness, legal privilege)
  - Threshold table for AISIA triggering
  - Foreseeable-misuse worksheet
  why_auditor_cares: AISIA quality varies wildly; templated approach reduces variance and gap risk.
  cadence: Annual template review + per-system AISIA
  typical_owner: PB
- id: connector_and_integration
  name: Connector security and integration controls
  examples:
  - Connector inventory + permission matrix
  - Least-privilege configuration baseline
  - Pen-test evidence per integration
  - RAG configuration baseline
  why_auditor_cares: A.10 + complexity-of-environment risk source (Annex C); connector misconfig is a top vector.
  cadence: Per release + annual
  typical_owner: SH
- id: backup_and_dr
  name: Backup and disaster recovery for AI systems
  examples:
  - Backup configuration (encryption, location, retention, customer-keyed)
  - DR / failover procedures appropriate to on-prem
  - KMS / HSM evidence
  why_auditor_cares: Backups carry data; cross-jurisdictional storage exposure is a POPIA/GDPR risk.
  cadence: Annual + per change
  typical_owner: SH

scenarios:
- id: scn-42001-pure-on-prem
  name: Pure on-prem deployment, no remote support
  framework_specific_id: PB-Deploy-1
  description: >-
    Customer runs PrivateBox entirely within their own infrastructure with no PB telemetry, support
    access, or remote operations. PB's role is provider/producer; customer is sole operator.
  applies_to_business_models: [on-prem]
  pb_role: provider
  customer_role: deployer
  triggered_requirements:
  - requirement_id: iso-42001-a-10.4
    scenario_specific_note: Customer-facing obligations dominate; runbook + handover record required.
  - requirement_id: iso-42001-a-10.3
    scenario_specific_note: Supplier-side obligations limited to model providers and update channel.
  - requirement_id: iso-42001-a-9.4
    scenario_specific_note: Intended-use enforcement is largely customer-side; PB documentation is the lever.
  notes: Lowest PB operational liability; highest documentation rigour required.
- id: scn-42001-on-prem-update-delivery
  name: On-prem with vendor-managed update delivery
  framework_specific_id: PB-Deploy-2
  description: >-
    PrivateBox controls the model/code supply chain via signed updates, SBOMs, change notifications,
    and rollback authority. Customer accepts or defers updates. PB role: provider with software
    supply chain responsibility.
  applies_to_business_models: [on-prem, ai-factory]
  pb_role: provider
  customer_role: deployer
  triggered_requirements:
  - requirement_id: iso-42001-a-6.1.3
    scenario_specific_note: Documentation of changes; update integrity required.
  - requirement_id: iso-42001-a-10.2
    scenario_specific_note: PB is supplier of updates; customer's supplier-DD applies to PB.
  - requirement_id: iso-42001-cl-6.3
    scenario_specific_note: Update is a planned change to AIMS-governed system.
  notes: Cryptographic signing + SBOM are non-negotiable.
- id: scn-42001-on-prem-telemetry
  name: On-prem with operational-metadata telemetry
  framework_specific_id: PB-Deploy-3
  description: >-
    Telemetry pipeline returns operational metadata to PB (no customer content). Telemetry is opt-in,
    bounded by a published data dictionary, and PII-free by design.
  applies_to_business_models: [on-prem, ai-factory]
  pb_role: provider
  customer_role: deployer
  triggered_requirements:
  - requirement_id: iso-42001-a-6.2.4
    scenario_specific_note: Event log scope explicitly bounds what is in telemetry.
  - requirement_id: iso-42001-a-7.5
    scenario_specific_note: Telemetry must not carry personal information; technical evidence required.
  - requirement_id: iso-42001-a-8.2
    scenario_specific_note: Customer transparency on what telemetry collects and why.
  notes: Hidden payloads are the risk — data dictionary is the control.
- id: scn-42001-on-prem-support-access
  name: On-prem with just-in-time PB support access
  framework_specific_id: PB-Deploy-4
  description: >-
    PB engineers gain time-bounded access to customer environment for troubleshooting. Each session is
    customer-approved, fully recorded, and bounded by a documented data-handling protocol. Standing
    access is prohibited.
  applies_to_business_models: [on-prem, ai-factory]
  pb_role: shared
  customer_role: deployer
  triggered_requirements:
  - requirement_id: iso-42001-a-6.2.3
    scenario_specific_note: Support engineer becomes part of the oversight surface.
  - requirement_id: iso-42001-a-10.4
    scenario_specific_note: Customer relationship terms govern session approval.
  - requirement_id: iso-42001-a-7.5
    scenario_specific_note: Per-session data-handling protocol when customer data is in scope.
  notes: Insider data exposure risk — session recording is the audit hook.
- id: scn-42001-managed-deployment
  name: Managed deployment-time support engagement
  framework_specific_id: PB-Deploy-5
  description: >-
    PB engineers hands-on during the install of the platform into customer environment. Engagement is
    scope-bounded and time-boxed; a formal handover record terminates PB operational involvement.
  applies_to_business_models: [on-prem, ai-factory]
  pb_role: shared
  customer_role: deployer
  triggered_requirements:
  - requirement_id: iso-42001-a-6.2.5
    scenario_specific_note: Pre-deployment gate is jointly signed by PB and customer.
  - requirement_id: iso-42001-a-6.2.2
    scenario_specific_note: Pre-go-live testing performed per documented plan.
  notes: Risk is PB perceived as joint controller — handover record is the boundary.
- id: scn-42001-customer-data-troubleshooting
  name: Troubleshooting requiring access to customer data
  framework_specific_id: PB-Deploy-6
  description: >-
    Exception-only — PB engineers access customer data to diagnose an issue. Default is no access;
    activated case-by-case with explicit customer authorisation and data-minimisation discipline.
  applies_to_business_models: [on-prem, ai-factory]
  pb_role: conditional
  customer_role: deployer
  triggered_requirements:
  - requirement_id: iso-42001-a-7.5
    scenario_specific_note: PII processing context — POPIA/GDPR exposure if mishandled.
  - requirement_id: iso-42001-a-10.4
    scenario_specific_note: Customer authorisation per incident is contractual.
  - requirement_id: iso-42001-a-6.2.4
    scenario_specific_note: Access is logged in the event log per A.6.2.4.
  notes: Privilege/confidentiality risk in legal sector — preferred path is no access.
- id: scn-42001-rag-setup
  name: Document ingestion and RAG corpus setup support
  framework_specific_id: PB-Deploy-7
  description: >-
    PB advises customer on RAG corpus structure, ingestion pipeline, quality gates. Customer owns
    the corpus, content rights, and PII handling decisions. PB provides controls and templates only.
  applies_to_business_models: [on-prem, ai-factory]
  pb_role: shared
  customer_role: deployer
  triggered_requirements:
  - requirement_id: iso-42001-a-7.2
    scenario_specific_note: Data governance frame for the corpus.
  - requirement_id: iso-42001-a-7.4
    scenario_specific_note: Quality criteria for ingested content.
  - requirement_id: iso-42001-a-7.3
    scenario_specific_note: Provenance, rights, demographics for ingested data.
  notes: Customer attestation of rights and PII handling is the legal-defensibility hook.
- id: scn-42001-backup-support
  name: Backup support
  framework_specific_id: PB-Deploy-8
  description: >-
    Backup infrastructure carries customer data; encryption, location, retention, and customer-managed
    keys must be defined.
  applies_to_business_models: [on-prem, ai-factory]
  pb_role: shared
  customer_role: deployer
  triggered_requirements:
  - requirement_id: iso-42001-a-7.5
    scenario_specific_note: Backup data may contain PII; encryption + key management apply.
  - requirement_id: iso-42001-a-6.2.4
    scenario_specific_note: Backup operations logged per event-log standard.
  notes: Cross-jurisdictional storage is the POPIA/GDPR exposure.
- id: scn-42001-connector-integration
  name: Integration / connector security
  framework_specific_id: PB-Deploy-9
  description: >-
    PB-built or PB-advised connectors that link PrivateBox to customer systems (SharePoint, Slack,
    document repositories, etc.). Least-privilege, documented permission scope, pen-tested.
  applies_to_business_models: [on-prem, ai-factory]
  pb_role: shared
  customer_role: deployer
  triggered_requirements:
  - requirement_id: iso-42001-a-10.2
    scenario_specific_note: Each connector is a third-party integration with supplier-DD implications.
  - requirement_id: iso-42001-a-7.5
    scenario_specific_note: Connector may surface PII into AI context; minimisation rules apply.
  notes: Over-broad credentials is the typical pitfall.
- id: scn-42001-package-distribution
  name: Hosted update repository / model package distribution
  framework_specific_id: PB-Deploy-10
  description: >-
    PB serves software supply chain — signed updates, model packages, SBOMs, vulnerability disclosure.
    Customer pulls on schedule.
  applies_to_business_models: [on-prem, ai-factory]
  pb_role: provider
  customer_role: deployer
  triggered_requirements:
  - requirement_id: iso-42001-a-10.2
    scenario_specific_note: PB is the supplier; customer's supplier programme tests PB's controls.
  - requirement_id: iso-42001-a-6.1.3
    scenario_specific_note: Build / package documentation is PB's artefact.
  notes: SLSA-equivalent attestation is the bar.
- id: scn-42001-customer-fine-tuning
  name: Customer fine-tuning / adaptation of models
  framework_specific_id: PB-Deploy-11
  description: >-
    Customer changes model behaviour via fine-tuning or LoRA-style adaptation in their environment.
    PB provides safe-tuning guidance, guardrails, and post-tune evaluation templates. Outcome of
    fine-tuning is customer-owned.
  applies_to_business_models: [on-prem, ai-factory]
  pb_role: customer
  customer_role: producer
  triggered_requirements:
  - requirement_id: iso-42001-a-6.1.4
    scenario_specific_note: Fine-tuning may introduce or amplify bias; post-tune eval required.
  - requirement_id: iso-42001-a-10.4
    scenario_specific_note: Customer obligations for fine-tuned outputs.
  - requirement_id: iso-42001-a-9.4
    scenario_specific_note: Intended-use scope may shift after fine-tuning.
  notes: PB blamed for customer-induced bias is the risk — guardrails + guidance are PB's controls.
- id: scn-42001-third-party-models
  name: Customer use of third-party models within PrivateBox
  framework_specific_id: PB-Deploy-12
  description: >-
    PB hosts the integration layer; customer chooses among approved third-party models (open-weight
    or proprietary). Approved-models list and addition workflow govern.
  applies_to_business_models: [on-prem, ai-factory]
  pb_role: shared
  customer_role: deployer
  triggered_requirements:
  - requirement_id: iso-42001-a-10.2
    scenario_specific_note: Each model is a supplier; DD pack required.
  - requirement_id: iso-42001-a-6.1.5
    scenario_specific_note: Robustness testing is per-model.
  notes: Unsanctioned models is the risk — approved-list discipline is the control.
- id: scn-42001-ai-factory-ringfenced
  name: AI Factory — ringfenced multi-tenant deployment in partner DC
  framework_specific_id: PB-Deploy-13
  description: >-
    Aspirational deployment shape. Partner DC hosts ringfenced multi-tenant infrastructure for
    PrivateBox. Multi-tenant isolation, partner-DC supplier governance, and physical-security
    distinctions all in play. Pending partner-DC selection.
  applies_to_business_models: [ai-factory]
  pb_role: provider
  customer_role: deployer
  triggered_requirements:
  - requirement_id: iso-42001-a-4.5
    scenario_specific_note: Computing resources owned by partner DC; PB integrates.
  - requirement_id: iso-42001-a-10.2
    scenario_specific_note: Partner DC is a supplier subject to DD.
  - requirement_id: iso-42001-cl-4.3
    scenario_specific_note: Scope statement extends to ringfenced multi-tenant deployment.
  notes: Blocked on oq-partner-dc-selection. Until partner DC chosen, this scenario is conditional.

