# ── A.5 — Assessing impacts of AI systems (companion: ISO/IEC 42005) ──

- id: iso-42001-a-5.2
  kind: control_aims
  native_id: A.5.2
  group: A.5
  group_name: Assessing impacts of AI systems
  title: AI system impact assessment process
  objective: >-
    Maintain a documented, repeatable AISIA methodology applicable across AI systems in scope.
  pb_interpretation: >-
    Mandatory. Cannot be excluded from SoA even by orgs using only third-party models. AISIA
    methodology aligned with ISO/IEC 42005:2025 covering 10 elements; 42005 Annex E template
    operationalised.
