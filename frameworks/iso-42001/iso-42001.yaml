requirements:

# ─────────────────────────────────────────────────────────────────────────────
# Clause 4 — Context of the Organisation
# ─────────────────────────────────────────────────────────────────────────────

- id: iso-42001-cl-4.1
  kind: clause
  native_id: '4.1'
  group: '4'
  group_name: Context of the organisation
  title: Understanding the organisation and its context
  requirement: >-
    Determine internal and external issues relevant to the AIMS purpose and ability to achieve intended
    outcomes. Determine PrivateBox's role in the AI ecosystem (provider, producer, customer, partner —
    for PB: provider + producer).
  auditor_intent: >-
    Auditor verifies the AIMS scope traces from documented internal/external context, including the
    PB-as-provider-and-producer role declaration.
  pb_interpretation: >-
    PrivateBox must explicitly position itself as an AI system provider and component producer to
    confidential firms; not a deployer of AI on behalf of those firms. Customer environment is external
    context; PB R&D / support environment is internal context. Both must be captured. Refresh annually
    and on material change (new jurisdiction, new sector, new model class, regulatory change).
  owner: PB
  documented_evidence:
  - Context register
  - PESTLE / SWOT-style register
  - AI role declaration (provider + producer)
  operational_evidence: >-
    Dated, version-controlled context register signed off by top management; traceable to AIMS scope
    and risk criteria.
  audit_methods:
  - Insp
  - Int
  cadence: Annual + on material change
  failure_modes: >-
    Generic boilerplate that doesn't reflect PB; not refreshed; ignores POPIA/EU AI Act/King V;
    doesn't name PB's AI role; AIMS scope can't be derived from context.
  maturity_target: AR
  external_safe_claim: >-
    PrivateBox's AIMS is contextualised for confidential-firm AI in legal, finance and healthcare
    across ZA, EU, US and UK.
  scope_note: >-
    Customer environment is external context input; PB R&D and support environments are internal.
  business_models:
  - on-prem
  - ai-factory
  crosswalk:
  - framework: iso-27001
    refs:
    - iso-27001-cl-4.1
    note: HLS-aligned. AIMS context extends ISMS context with AI-role declaration.
  - framework: iso-27701
    refs:
    - iso-27701-cl-4.1
    note: HLS-aligned. AIMS context complements PIMS context with AI scope.

- id: iso-42001-cl-4.2
  kind: clause
  native_id: '4.2'
  group: '4'
  group_name: Context of the organisation
  title: Understanding the needs and expectations of interested parties
  requirement: >-
    Identify interested parties relevant to the AIMS, their relevant requirements, and which become
    AIMS requirements.
  auditor_intent: >-
    Auditor verifies stakeholder requirements are captured and traceable to AIMS controls.
  pb_interpretation: >-
    Interested parties include: customers (legal/finance/healthcare CISOs, DPOs, GCs), data subjects
    (clients of customers), regulators (Information Regulator ZA, EU AI Office, UK ICO, US sectoral),
    employees, third-party model providers, support partners, investors. Maintain a stakeholder register
    with documented expectations and requirement-traceability matrix.
  owner: PB
  documented_evidence:
  - Interested-Parties Register
  - Requirements traceability matrix
  - Interview / feedback logs
  operational_evidence: >-
    Evidence that interested-party requirements map to specific Annex A controls and AIMS objectives.
  audit_methods:
  - Insp
  - Int
  - Samp
  cadence: Annual + on contract / regulatory change
  failure_modes: >-
    Customer-only view; missing data subjects and regulators; no traceability to controls; static
    register that doesn't update on regulatory change.
  maturity_target: AR
  external_safe_claim: >-
    PrivateBox's AIMS systematically captures and addresses the requirements of customers, data
    subjects, regulators and supply-chain partners.
  business_models:
  - on-prem
  - ai-factory
  crosswalk:
  - framework: iso-27001
    refs:
    - iso-27001-cl-4.2
    note: HLS-aligned. AIMS adds AI-specific stakeholders (regulators, data subjects in AI context).
  - framework: iso-27701
    refs:
    - iso-27701-cl-4.2
    note: HLS-aligned; PIMS interested-party identification extends to AI-context data subjects.

- id: iso-42001-cl-4.3
  kind: clause
  native_id: '4.3'
  group: '4'
  group_name: Context of the organisation
  title: Determining the scope of the AI management system
  requirement: >-
    Maintain a documented AIMS scope statement covering boundaries, products, services, locations
    and AI roles.
  auditor_intent: >-
    Auditor checks scope is precise, coherent and defensible — narrow enough to be defensible, broad
    enough to be credible.
  pb_interpretation: >-
    See target wording in pb_application.scope_decisions.on_prem.rationale. Scope is product-and-operations
    bounded; explicitly excludes customer-operated deployments after handover, customer fine-tuning
    inside their environment, and customer-provided data — these remain under the customer's own AIMS.
    Scope statement is 1 page, top-management-signed, referenced from policy. Scope expansion to AI
    Factory pending oq-partner-dc-selection.
  owner: PB
  documented_evidence:
  - 1-page AIMS Scope Statement (top-management signed)
  - Scope decision record
  operational_evidence: >-
    Signed scope statement traceable to context register and to AIMS objectives.
  audit_methods:
  - Insp
  - Int
  cadence: Annual + on scope change
  failure_modes: >-
    Scope drift in marketing; scope that seems to extend over customer environments (creates legal
    exposure); scope mismatched with what auditor sees in operations.
  maturity_target: Cert
  external_safe_claim: >-
    Our AIMS scope covers the design, build and support of PrivateBox; customer-operated deployments
    are governed by the customer's own AIMS, which we enable with documentation.
  scope_note: >-
    Stage-1 scope statement is the single most-read document in the audit.
  business_models:
  - on-prem
  - ai-factory
  owner_by_model:
    on_prem: PB
    ai_factory:
      status: pending
      open_question: oq-partner-dc-selection
  crosswalk:
  - framework: iso-27001
    refs:
    - iso-27001-cl-4.3
    note: HLS-aligned; AIMS scope is parallel to ISMS scope but distinct in coverage.
  - framework: iso-27701
    refs:
    - iso-27701-cl-4.3
    note: HLS-aligned; AIMS scope distinct from PIMS scope.

- id: iso-42001-cl-4.4
  kind: clause
  native_id: '4.4'
  group: '4'
  group_name: Context of the organisation
  title: AI management system
  requirement: >-
    Establish, implement, maintain and continually improve the AIMS.
  auditor_intent: >-
    Auditor expects to see a coherent AIMS architecture document showing how clauses 4–10 and Annex A
    connect, and how AIMS integrates with ISMS / PIMS.
  pb_interpretation: >-
    PDCA cycle integrated with PB's ISO 27001 ISMS and ISO 27701 PIMS. Single management system, three
    labels. AIMS Manual / Overview describes process architecture and integration points.
  owner: PB
  documented_evidence:
  - AIMS Manual / Overview
  - Integration map (ISMS / PIMS / AIMS)
  operational_evidence: >-
    Auditor walks the AIMS architecture; cross-references should resolve.
  audit_methods:
  - Insp
  - Int
  cadence: Annual review of AIMS architecture document
  failure_modes: >-
    Three parallel siloed management systems instead of one integrated; AIMS exists on paper only.
  maturity_target: AR
  external_safe_claim: >-
    AIMS architecture aligned to ISO/IEC 42001, integrated with our existing ISMS and PIMS.
  business_models:
  - on-prem
  - ai-factory
  crosswalk:
  - framework: iso-27001
    refs:
    - iso-27001-cl-4.4
    note: HLS-aligned; PB runs one integrated management system surface.
  - framework: iso-27701
    refs:
    - iso-27701-cl-4.4
    note: HLS-aligned.

# ─────────────────────────────────────────────────────────────────────────────
# Clause 5 — Leadership
# ─────────────────────────────────────────────────────────────────────────────

- id: iso-42001-cl-5.1
  kind: clause
  native_id: '5.1'
  group: '5'
  group_name: Leadership
  title: Leadership and commitment
  requirement: >-
    Top management demonstrates leadership and commitment to the AIMS — measurable, not delegable.
  auditor_intent: >-
    Auditor checks AIMS sponsorship is at executive level, with measurable commitment and resource
    allocation; AIMS sponsored only at IT manager level is a frequent Schellman finding.
  pb_interpretation: >-
    CEO and Board own AI accountability. Documented in board / Exco minutes; CEO sign-off on AI
    Policy and AIMS scope; visible budget allocation. AI Governance Committee has executive
    representation. King V Principle 1 (Ethical leadership) and POPIA accountability principle apply.
  owner: PB
  documented_evidence:
  - Board / Exco minutes referencing AIMS
  - CEO sign-off on AI Policy and AIMS Scope Statement
  - Budget allocation evidence (AI Gov function, audit)
  - AI Governance Committee Terms of Reference
  operational_evidence: >-
    Top management can describe AI Policy and AIMS in interview; resource decisions trace to AIMS
    objectives.
  audit_methods:
  - Insp
  - Int
  cadence: Annual review at management review
  failure_modes: >-
    AIMS sponsored only at IT-manager level; no executive interview readiness; no budget trace.
  maturity_target: Cert
  external_safe_claim: >-
    AIMS commitment is documented at top-management level with measurable resourcing.
  business_models:
  - on-prem
  - ai-factory
  crosswalk:
  - framework: iso-27001
    refs:
    - iso-27001-cl-5.1
    note: HLS-aligned; same leadership pattern across ISMS / PIMS / AIMS.
  - framework: iso-27701
    refs:
    - iso-27701-cl-5.1
    note: HLS-aligned.
  - framework: eu-ai-act
    refs:
    - eu-ai-act-art-26
    note: Deployer obligations under Art. 26 require designated humans and oversight at organisational level.
  - framework: popia
    refs:
    - popia-cond-1
    note: POPIA accountability principle (s 8) requires top-management oversight of personal-information processing; AIMS leadership scope covers PB-as-RP duties.

- id: iso-42001-cl-5.2
  kind: clause
  native_id: '5.2'
  group: '5'
  group_name: Leadership
  title: AI Policy
  requirement: >-
    Top management establishes, communicates and maintains an AI Policy framed by business strategy,
    ethics, risk environment and legal requirements, including a process for handling exceptions.
  auditor_intent: >-
    Auditor tests whether the AI Policy is documented, approved, communicated, available to interested
    parties, and understood by random employees on interview.
  pb_interpretation: >-
    Linked to A.2.2. PrivateBox AI Policy v1.x with principles, scope, prohibited uses, exceptions
    process, owner and version. Disseminated; staff can describe core principles. Reviewed annually
    and on trigger (new framework, regulatory change, material incident).
  owner: PB
  documented_evidence:
  - PrivateBox AI Policy v1.x (approved PDF)
  - Dissemination log
  - Policy review log
  operational_evidence: >-
    Random employee interviewed by auditor can describe AI Policy core principles.
  audit_methods:
  - Insp
  - Int
  - Samp
  cadence: Annual + on regulatory / material change
  failure_modes: >-
    Boilerplate policy not tailored to PB; sales team can't describe it; exceptions handled informally.
  maturity_target: Cert
  external_safe_claim: >-
    Our AI Policy, approved by top management, governs every PrivateBox AI activity.
  business_models:
  - on-prem
  - ai-factory
  crosswalk:
  - framework: iso-27001
    refs:
    - iso-27001-cl-5.2
    - iso-27001-a-5.1
    note: AI Policy parallels InfoSec Policy; cross-policy alignment required.
  - framework: iso-27701
    refs:
    - iso-27701-cl-5.2
    note: AI Policy aligns with PIMS Privacy Policy.
  - framework: popia
    refs:
    - popia-cond-1
    note: AI Policy operationalises POPIA accountability for AI-specific processing; cross-policy alignment with PB privacy notice required.

- id: iso-42001-cl-5.3
  kind: clause
  native_id: '5.3'
  group: '5'
  group_name: Leadership
  title: Roles, responsibilities and authorities
  requirement: >-
    Documented assignment of roles, responsibilities and authorities for AIMS conformance and reporting.
  auditor_intent: >-
    Auditor checks named owners exist for each AIMS function and that authority lines support
    reporting on AIMS performance.
  pb_interpretation: >-
    Linked to A.3.2. RACI plus AI Governance Charter naming AI Governance Lead, Model Risk Lead, AI
    Security Lead, Data/RAG Steward, Customer Support AI Liaison. Cross-functional AI Governance
    Committee meets on fixed cadence. Same person may not own development AND oversight (Annex A.3.2
    failure pattern).
  owner: PB
  documented_evidence:
  - AI RACI matrix
  - AI Governance Charter
  - Org chart with AI roles
  operational_evidence: >-
    Each AI role has a named individual who can speak to their responsibility in interview.
  audit_methods:
  - Insp
  - Int
  cadence: Annual + on org change
  failure_modes: >-
    Same person owns development and oversight; AI Governance Lead role exists but has no real authority.
