- id: iso-42001-cl-6.1.2
  kind: clause
  native_id: 6.1.2
  group: '6'
  group_name: Planning
  title: AI risk assessment
  requirement: >-
    Maintain a documented AI risk assessment methodology with criteria, acceptance, repeatability,
    informed by Annex C objectives / risk sources and ISO/IEC 23894.
  auditor_intent: >-
    Auditor verifies the methodology is AI-specific (not a renamed InfoSec methodology) and is
    actually used to populate an AI risk register per system in scope.
  pb_interpretation: >-
    Methodology must address AI-specific risk sources (bias, fairness, robustness, foreseeable misuse,
    automation level, ML-specific risks) per Annex C. Per-system AI risk register references the
    methodology. Reuse of 27001 methodology under a new label is a known failure pattern.
  owner: PB
  documented_evidence:
  - AI Risk Methodology document
  - AI Risk Register (per system in scope)
  - Annex C risk-source coverage check
  operational_evidence: >-
    Risk register entries trace to methodology criteria; treatments link to SoA controls.
  audit_methods:
  - Insp
  - Int
  - Samp
  cadence: Quarterly register review; annual methodology review
  failure_modes: >-
    Generic InfoSec methodology renamed; no Annex C coverage; static register.
  maturity_target: Cert
  external_safe_claim: >-
    AI-specific risk methodology consistent with ISO/IEC 42001 and ISO/IEC 23894, covering Annex C
    objectives and risk sources.
  business_models:
  - on-prem
  - ai-factory
  crosswalk:
  - framework: iso-27001
    refs:
    - iso-27001-cl-6.1.2
    note: HLS-aligned; AI risk methodology distinct from but integrated with InfoSec risk methodology.
  - framework: iso-27701
    refs:
    - iso-27701-cl-6.1
    note: AIMS risk integrates with PIMS risk for AI-with-PII contexts.
  - framework: eu-ai-act
    refs:
    - eu-ai-act-art-9
    note: EU AI Act Art. 9 risk-management system for high-risk AI is satisfied via AIMS risk methodology.
  - framework: popia
    refs:
    - popia-cond-7
    note: AI risk methodology must address POPIA s 19 security safeguards as a core risk class for any AI handling personal information.

- id: iso-42001-cl-6.1.3
  kind: clause
  native_id: 6.1.3
  group: '6'
  group_name: Planning
  title: AI risk treatment
  requirement: >-
    Document an AI risk treatment plan with control selection, and produce a Statement of Applicability
    comparing selected controls to Annex A. Note 3 permits exclusions with documented justification.
  auditor_intent: >-
    Auditor reads the SoA first; expects every Annex A control with applicability decision, owner,
    evidence pointer, justification.
  pb_interpretation: >-
    SoA is THE bridge document. One row per Annex A control: applicability (Y / Shared / Conditional /
    N/A), implementation status, control owner, evidence pointer, justification. Add deployment-model
    column (PB / SH / CL per business model). Empty justifications are a known Schellman finding pattern.
  owner: PB
  documented_evidence:
  - AI Risk Treatment Plan
  - Statement of Applicability (every Annex A control)
  - Exclusion justifications register
  operational_evidence: >-
    SoA is current with the deployed system inventory; treatments reference live controls.
  audit_methods:
  - Insp
  - Int
  - Samp
  cadence: At least annual + on scope change
  failure_modes: >-
    Excluding controls without written justification → major nonconformity; SoA stale; no
    deployment-model annotations.
  maturity_target: Cert
  external_safe_claim: >-
    Documented Statement of Applicability covering every Annex A control of ISO/IEC 42001.
  business_models:
  - on-prem
  - ai-factory
  crosswalk:
  - framework: iso-27001
    refs:
    - iso-27001-cl-6.1.3
    note: HLS-aligned; AIMS SoA mirrors ISMS SoA pattern.
  - framework: iso-27701
    refs:
    - iso-27701-cl-6.1
    note: PIMS extends 27001 SoA; AIMS adds the AI-specific Annex A.
  - framework: eu-ai-act
    refs:
    - eu-ai-act-art-9
    note: AI Act Art. 9 risk-management system implementation is the SoA equivalent for high-risk AI.

- id: iso-42001-cl-6.1.4
  kind: clause
  native_id: 6.1.4
  group: '6'
  group_name: Planning
  title: AI system impact assessment
  requirement: >-
    Maintain a documented process for assessing AI system impacts on individuals, groups and society —
    deepened by ISO/IEC 42005:2025.
  auditor_intent: >-
    Auditor expects 42005-aligned methodology covering 10 elements (process documentation, integration
    with mgmt system, timing/scope, roles, thresholds, conduct, harms/benefits incl. foreseeable misuse,
    measures, recording, approval, monitoring/review).
  pb_interpretation: >-
    PB AISIA Methodology aligned to ISO/IEC 42005:2025. Annex-E-style template applied per AI system.
    Foreseeable-misuse coverage (42005 6.8.3) is mandatory in every AISIA, not a best-practice add-on.
    Sector-specific AISIA addenda for healthcare safety, finance fairness, legal privilege.
  companion_refs:
  - iso-42005
  companion_note: >-
    Use ISO/IEC 42005 methodology, harm/benefit taxonomy (Annex C) and template (Annex E).
  owner: PB
  documented_evidence:
  - AISIA Methodology document (10 elements)
  - Per-system AISIA records
  - Sector-specific AISIA addenda (healthcare, finance, legal)
  - Foreseeable-misuse worksheet
  operational_evidence: >-
    Each in-scope AI system has a current AISIA with foreseeable-misuse section completed and approved.
  audit_methods:
  - Insp
  - Int
  - Samp
  cadence: Pre-deployment + on material change + scheduled review
  failure_modes: >-
    Hand-wave methodology; one-size-fits-all template; foreseeable-misuse section omitted; no approval workflow.
  maturity_target: Cert
  external_safe_claim: >-
    AI System Impact Assessment methodology aligned with ISO/IEC 42005:2025, including foreseeable-misuse
    coverage.
  business_models:
  - on-prem
  - ai-factory
  crosswalk:
  - framework: iso-27001
    refs:
    - iso-27001-cl-8.2
    note: AISIA conceptually parallel to risk assessment; ISMS does not have a direct equivalent.
  - framework: iso-27701
    refs:
    - iso-27701-cl-7.2
    note: PIMS DPIA is structurally adjacent; AISIA template should integrate DPIA where AI processes PII.
  - framework: eu-ai-act
    refs:
    - eu-ai-act-art-9
    - eu-ai-act-art-27
    note: AI Act Art. 9 risk mgmt + Art. 27 FRIA align with AISIA — single integrated template recommended.
  - framework: popia
    refs:
    - popia-s-automated-decisions
    note: AISIA covers POPIA s 71 automated decision-making analysis; integrated AISIA + DPIA template recommended.
  - framework: popia
    refs:
    - popia-cond-7
    note: AISIA security treatment maps to POPIA s 19 safeguards.

- id: iso-42001-cl-6.2
  kind: clause
  native_id: '6.2'
  group: '6'
  group_name: Planning
  title: AI objectives and planning to achieve them
  requirement: >-
    Establish AI objectives at relevant functions, levels and processes — measurable, time-bound,
    communicated, monitored and updated.
  auditor_intent: >-
    Auditor checks objectives are SMART (Specific, Measurable, Achievable, Relevant, Time-bound) and
    not aspirational platitudes.
  pb_interpretation: >-
    Aspirational statements ("we will be ethical") fail. Objectives are measurable: e.g., "100% of
    AI systems have current AISIA before deployment", "<2% drift threshold triggers re-eval",
    "Bias audit per release within sector criteria". Communicated to relevant functions; monitored
    in KPI dashboard.
  owner: PB
  documented_evidence:
  - AI Objectives register (SMART form)
  - KPI dashboard reflecting objectives
  operational_evidence: >-
    Objectives traced through risk register, AISIA, monitoring; reviewed at management review.
  audit_methods:
  - Insp
  - Int
  cadence: Annual; reviewed at management review
  failure_modes: >-
    Aspirational statements that cannot be measured; no KPI link; no time-boxing.
  maturity_target: AR
  external_safe_claim: >-
    PrivateBox sets and tracks measurable AI objectives at relevant functions.
  business_models:
  - on-prem
  - ai-factory
  crosswalk:
  - framework: iso-27001
    refs:
    - iso-27001-cl-6.2
    note: HLS-aligned.
  - framework: iso-27701
    refs:
    - iso-27701-cl-6.2
    note: HLS-aligned.

- id: iso-42001-cl-6.3
  kind: clause
  native_id: '6.3'
  group: '6'
  group_name: Planning
  title: Planning of changes
  requirement: >-
    AIMS changes are performed in a planned manner.
  auditor_intent: >-
    Auditor checks change-control procedure explicitly covers AI-specific changes (model swaps,
    RAG corpus changes, prompt-template changes, deployment-environment changes).
  pb_interpretation: >-
    Change-control procedure must explicitly enumerate AI-specific change types — model retrains,
    RAG corpus updates, prompt-template changes, hyperparameter changes. Silent retrains are a
    known failure pattern. Each change triggers re-AISIA where material.
  owner: PB
  documented_evidence:
  - Change-control procedure (with AI-specific change types)
  - Change records register
  - Re-AISIA trigger criteria
  operational_evidence: >-
    Recent changes traceable through CR records; re-AISIA executed where triggered.
  audit_methods:
  - Insp
  - Samp
  cadence: Annual SOP review + per change
  failure_modes: >-
    Silent retrains; RAG corpus changes outside CR; prompt-template changes treated as config.
  maturity_target: AR
  external_safe_claim: >-
    AI changes — including model swaps, RAG and prompt-template updates — go through documented
    change control with re-AISIA where material.
  business_models:
  - on-prem
  - ai-factory
  crosswalk:
  - framework: iso-27001
    refs:
    - iso-27001-cl-6.3
    note: HLS-aligned; AI-specific change types are the AIMS extension.
  - framework: iso-27701
    refs:
    - iso-27701-cl-6.3
    note: HLS-aligned.

