  group: '8'
  group_name: Operation
  title: AI system impact assessment (operational)
  requirement: >-
    Perform AI system impact assessments at planned intervals and on significant change. Pre-deployment
    AISIA is mandatory before any new system or material upgrade.
  auditor_intent: >-
    Auditor verifies pre-deployment AISIA was completed for every recent release; cadence on existing
    systems is held.
  pb_interpretation: >-
    Pre-deployment gate (A.6.2.5) blocks any release without current AISIA. Cadence: scheduled review
    plus on-significant-change. AISIA deferred is a fail; AISIA late is a finding.
  companion_refs:
  - iso-42005
  companion_note: >-
    AISIA conducted using the 42005 methodology and template per Clause 6.1.4.
  owner: PB
  documented_evidence:
  - Per-system AISIA records
  - Pre-deployment gate records (linked to AISIA)
  - AISIA review cadence log
  operational_evidence: >-
    Every recent release links to a current AISIA approved before go-live.
  audit_methods:
  - Insp
  - Samp
  cadence: Pre-deployment + scheduled review + on significant change
  failure_modes: >-
    AISIA done as a tickbox; foreseeable-misuse omitted; AISIA after deployment.
  maturity_target: Cert
  external_safe_claim: >-
    AISIA is conducted before every deployment and at scheduled intervals during operation, in line
    with ISO/IEC 42005:2025.
  business_models:
  - on-prem
  - ai-factory
  crosswalk:
  - framework: iso-27701
    refs:
    - iso-27701-cl-7.2
    note: PIMS DPIA cadence is structurally adjacent; integrated AISIA + DPIA template recommended.
  - framework: eu-ai-act
    refs:
    - eu-ai-act-art-9
    - eu-ai-act-art-27
    note: Continuous AI Act Art. 9 risk + Art. 27 FRIA align with operational AISIA cadence.

# ─────────────────────────────────────────────────────────────────────────────
# Clause 9 — Performance Evaluation
# ─────────────────────────────────────────────────────────────────────────────

- id: iso-42001-cl-9.1
  kind: clause
  native_id: '9.1'
  group: '9'
  group_name: Performance evaluation
  title: Monitoring, measurement, analysis and evaluation
  requirement: >-
    Determine what to monitor, how to measure, when, by whom, and how to analyse and evaluate AIMS
    performance and effectiveness.
  auditor_intent: >-
    Auditor expects a KPI dashboard with thresholds, monitoring records, evaluation cadence, and
    analysis findings reported to management review.
  pb_interpretation: >-
    KPI dashboard covers model performance drift, fairness/bias indicators, incident counts, support-
    ticket categorisation, concern-reporting volumes, SoA implementation health. Thresholds defined;
    runbooks for breach. EU AI Act Art. 72 post-market monitoring satisfied via this clause.
  owner: PB/SH
  documented_evidence:
  - KPI dashboard specification
  - Monitoring data archive
  - Threshold register
  - Drift detector reports
  operational_evidence: >-
    Live dashboard accessible; trends sampled at management review; threshold breaches trigger
    documented response.
  audit_methods:
  - Insp
  - Obs
  - Samp
  cadence: Continuous monitoring; quarterly trend analysis
  failure_modes: >-
    Dashboard exists but unmonitored; no thresholds; drift detection lagging.
  maturity_target: AR
  external_safe_claim: >-
    Continuous AIMS monitoring with documented KPIs, thresholds and trend analysis.
  business_models:
  - on-prem
  - ai-factory
  crosswalk:
  - framework: iso-27001
    refs:
    - iso-27001-cl-9.1
    note: HLS-aligned; AIMS adds AI-specific KPIs (drift, bias, fairness).
  - framework: iso-27701
    refs:
    - iso-27701-cl-9.1
    note: HLS-aligned.
  - framework: eu-ai-act
    refs:
    - eu-ai-act-art-72
    note: EU AI Act Art. 72 post-market monitoring satisfied through AIMS Clause 9.1 + 8.4.
  - framework: popia
    refs:
    - popia-cond-7
    note: AIMS monitoring includes POPIA s 19 security-safeguard verification and s 22 incident-detection cadence.

- id: iso-42001-cl-9.2
  kind: clause
  native_id: '9.2'
  group: '9'
  group_name: Performance evaluation
  title: Internal audit
  requirement: >-
    Conduct internal audits at planned intervals; impartial auditors; report to relevant management;
    track corrective actions.
  auditor_intent: >-
    Auditor checks audit team is independent of the AIMS team (ISO/IEC 42006 emphasis); findings
    are tracked through closure.
  pb_interpretation: >-
    Internal audit programme conducted by auditors not reporting into AI Gov. External audit advisor
    may augment. Findings tracked in NC/CAPA log; closure verified.
  owner: PB
  documented_evidence:
  - Internal audit programme
  - Audit reports
  - Auditor independence records
  - Findings tracker
  operational_evidence: >-
    Most recent audit report available; findings closure trace.
  audit_methods:
  - Insp
  - Int
  cadence: At least annual; more often during early maturity
  failure_modes: >-
    Same team auditing itself; findings open forever; programme exists but no audits conducted.
  maturity_target: Cert
  external_safe_claim: >-
    Independent internal audit programme covers the AIMS at least annually.
  business_models:
  - on-prem
  - ai-factory
  crosswalk:
  - framework: iso-27001
    refs:
    - iso-27001-cl-9.2.1
    - iso-27001-cl-9.2.2
    note: 27001 splits into programme + execution; 42001 collapses to single clause.
  - framework: iso-27701
    refs:
    - iso-27701-cl-9.2
    note: HLS-aligned.

- id: iso-42001-cl-9.3
  kind: clause
  native_id: '9.3'
  group: '9'
  group_name: Performance evaluation
  title: Management review
  requirement: >-
    Top management reviews the AIMS at planned intervals; inputs include audit results, KPI data,
    nonconformities, status of actions, changes in external/internal issues, feedback from interested
    parties, and opportunities for continual improvement; outputs include decisions, resource changes
    and improvement opportunities.
  auditor_intent: >-
    Auditor expects management review minutes covering all required inputs and outputs, signed by
    top management, with traceable follow-through on decisions.
  pb_interpretation: >-
    Annual at minimum; more often during early maturity. Standardised inputs/outputs template; minutes
    distributed; decisions tracked.
  owner: PB
  documented_evidence:
  - Management review pack (inputs/outputs template)
  - Management review minutes
  - Decision tracker
  operational_evidence: >-
    Most recent management review covered all inputs; decisions trace forward.
  audit_methods:
  - Insp
  - Int
  cadence: At least annual; more often during early maturity
  failure_modes: >-
    Lunch meeting with no minutes; inputs partial; decisions not tracked.
  maturity_target: Cert
  external_safe_claim: >-
    Documented management review of the AIMS conducted at least annually with full inputs and outputs.
  business_models:
  - on-prem
  - ai-factory
  crosswalk:
  - framework: iso-27001
    refs:
    - iso-27001-cl-9.3.1
    - iso-27001-cl-9.3.2
    - iso-27001-cl-9.3.3
    note: 27001 splits into general / inputs / outputs; 42001 collapses to single clause.
  - framework: iso-27701
    refs:
    - iso-27701-cl-9.3
    note: HLS-aligned.

