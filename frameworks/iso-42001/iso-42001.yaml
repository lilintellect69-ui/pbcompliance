  - Telemetry data dictionary (PII-free statement)
  - Support-access PII-handling protocol
  - DPIA / PIA cross-reference
  operational_evidence: >-
    Sample telemetry confirms PII-free; sample support session confirms case-by-case authorisation
    for PII access.
  audit_methods:
  - Insp
  - Samp
  - Obs
  cadence: Annual + per change to data flows
  failure_modes: >-
    Telemetry leaks PII; standing support access; PII processing not flowed; DPIA missing for AI-with-PII.
  maturity_target: AR
  triggered_by_scenarios:
